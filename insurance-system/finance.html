<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>บันทึกการเงิน</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- เพิ่มใหม่: สไตล์ปุ่มกลับ / Dashboard / ปุ่มตัวกรอง / กล่องกราฟ (ไม่แตะ style.css เดิม) -->
<style>

*{ box-sizing:border-box; }

body{
    font-family:"Kanit",sans-serif;
    background:#F3F6FC;
}

table{
    width:90%;
    margin:20px auto;
}

.main{
    padding-top:80px;
    padding-bottom:40px;
}

.main h2{
    margin-top:-20px;
    text-align:center;
    color:#152A54;
}

/* ปุ่มกลับมุมซ้ายบน */
.finance-back-btn{
    position:fixed;
    top:16px;
    left:16px;
    z-index:1000;

    display:inline-flex;
    align-items:center;
    gap:6px;

    background:#EAF1FF;
    color:#1E4FC4;

    border:none;
    padding:10px 18px;
    border-radius:999px;

    font-family:"Kanit",sans-serif;
    font-weight:600;
    font-size:14px;

    cursor:pointer;
    box-shadow:0 6px 18px rgba(21,42,84,.12);
    transition:.2s;
}

.finance-back-btn:hover{
    background:#DCE9FF;
}

/* Dashboard */
.finance-dashboard{
    max-width:1100px;
    margin:0 auto 20px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
}

.dash-card{
    background:#fff;
    border:1px solid #E4EAF5;
    border-radius:16px;
    padding:16px;
    text-align:center;
    box-shadow:0 6px 18px rgba(21,42,84,.06);
}

.dash-label{
    font-size:12.5px;
    color:#6B7A99;
    font-weight:600;
    margin-bottom:6px;
}

.dash-value{
    font-size:17px;
    color:#152A54;
    font-weight:700;
}

/* Filter panel */
.finance-summary-panel{
    max-width:1100px;
    margin:0 auto 20px;
    background:#f8f9fb;
    border:1px solid #e3e6ec;
    border-radius:12px;
    padding:16px 18px;
}

.finance-filter-group{
    margin-bottom:12px;
}

.finance-filter-group:last-of-type{
    margin-bottom:0;
}

.filter-label{
    font-size:13px;
    color:#002d72;
    font-weight:bold;
    margin-bottom:6px;
}

.btn-group{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.chip-btn{
    border:1.5px solid #cfd6e2;
    background:#fff;
    color:#152A54;
    padding:7px 14px;
    border-radius:999px;
    font-family:"Kanit",sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:.2s;
    white-space:nowrap;
}

.chip-btn:hover{
    background:#EAF1FF;
}

.chip-btn.active{
    background:#2F6FED;
    border-color:#2F6FED;
    color:#fff;
}

.view-btn{
    border:1.5px solid #cfd6e2;
    background:#fff;
    color:#152A54;
    padding:8px 18px;
    border-radius:999px;
    font-family:"Kanit",sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    transition:.2s;
}

.view-btn.active{
    background:#152A54;
    border-color:#152A54;
    color:#fff;
}

.finance-filter-group select{
    padding:6px 10px;
    border-radius:8px;
    border:1px solid #cfd6e2;
    font-family:"Kanit",sans-serif;
    font-size:13px;
    margin-right:14px;
}

.finance-summary-total{
    font-size:16px;
    font-weight:bold;
    color:#002d72;
    margin-top:10px;
}

/* Chart box */
.finance-chart-box{
    max-width:1100px;
    margin:0 auto 10px;
    background:#fff;
    border:1px solid #e3e6ec;
    border-radius:12px;
    padding:18px;
}

.finance-chart-box h3{
    text-align:center;
    color:#152A54;
    margin-bottom:14px;
    font-size:16px;
}

.finance-chart-box canvas{
    max-height:340px;
}

</style>

</head>

<body>

<!-- เพิ่มใหม่: ปุ่มกลับมุมซ้ายบน ไปหน้า account_menu.html ตามที่ต้องการ -->
<button class="finance-back-btn" onclick="location.href='account_menu.html'">
    ← กลับ
</button>

<div class="main">

<h2>💵 บันทึกการเงิน</h2>

<!-- เพิ่มใหม่: Dashboard สรุปภาพรวม อัปเดตแบบ Real-time ตามตัวกรองที่เลือก -->
<div class="finance-dashboard" id="financeDashboard"></div>

<!-- เพิ่มใหม่: แผงตัวกรอง บริษัท/พนักงาน (ปุ่มจากข้อมูลจริงแบบ Real-time) + ปี/เดือน + มุมมองกราฟ
     เลือกพร้อมกันได้ทั้งหมด เปลี่ยนแล้วอัปเดตทันทีโดยไม่รีเฟรชหน้า -->
<div class="finance-summary-panel">

    <div class="finance-filter-group">
        <div class="filter-label">🏢 บริษัท</div>
        <div class="btn-group" id="companyButtons"></div>
    </div>

    <div class="finance-filter-group">
        <div class="filter-label">👤 พนักงาน</div>
        <div class="btn-group" id="employeeButtons"></div>
    </div>

    <div class="finance-filter-group">
        <div class="filter-label">🗓️ ปี / 📅 เดือน (สำหรับตารางรายการ)</div>
        <select id="financeFilterYear"></select>
        <select id="financeFilterMonth"></select>
    </div>

    <div class="finance-filter-group">
        <div class="filter-label">📊 มุมมองกราฟรายได้</div>
        <div class="btn-group" id="viewModeButtons">
            <button type="button" class="view-btn active" data-mode="month">รายเดือน</button>
            <button type="button" class="view-btn" data-mode="year">รายปี</button>
        </div>
    </div>

    <div id="financeSummaryTotal" class="finance-summary-total"></div>

</div>

<!-- เพิ่มใหม่: กราฟรายได้ สลับรายเดือน/รายปีได้ -->
<div class="finance-chart-box">
    <h3 id="chartTitle">📈 กราฟรายได้รายเดือน</h3>
    <canvas id="revenueChart"></canvas>
</div>

<table>
<thead>
<tr>
    <th>ลำดับ</th>
    <th>วันที่แจ้งงาน</th>
    <th>บริษัท</th>
    <th>พนักงาน</th>
    <th>ชื่อผู้เอาประกัน</th>
    <th>เบอร์โทร</th>
    <th>ทะเบียน</th>
    <th>วันเริ่ม</th>
    <th>รวม</th>
</tr>
</thead>

<tbody id="financeTable">

</tbody>

</table>

    <div style="text-align:center; margin-top:30px;">
    <a href="index.html" class="back-btn">
        ← กลับหน้าหลัก
    </a>

</div>

</div>

<!-- ไลบรารีกราฟ (โหลดจาก cdnjs เหมือน html2canvas/jsPDF ที่ใช้อยู่แล้วในระบบ) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<!-- แก้ไข: เดิมอ่านข้อมูลจาก localStorage.getItem("insuranceData") ซึ่งไม่มีการเขียนคีย์นี้เลย
     (ทุกฟอร์มบันทึกลง Firebase Firestore) ทำให้ตาราง/กราฟ/ตัวกรองไม่ขึ้นเลย
     แก้ให้ดึงข้อมูล realtime จาก Firestore แหล่งเดียวกับ report.html / customer_debt.html
     พร้อมเพิ่มปุ่มกลับ, ปุ่มบริษัท/พนักงานแบบ real-time, มุมมองรายเดือน/รายปี,
     ตัวกรองรวมกันได้, และ Dashboard ตามที่ต้องการ -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNpaYlwrkJhBA-8tAax022PWWFYMRz7Kw",
  authDomain: "insurance-system-f26b0.firebaseapp.com",
  projectId: "insurance-system-f26b0",
  storageBucket: "insurance-system-f26b0.firebasestorage.app",
  messagingSenderId: "438698153100",
  appId: "1:438698153100:web:a553b97b59701883f057a9",
  measurementId: "G-XXWCQEMT0B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let chartInstance = null;

// state ของตัวกรองปุ่ม (บริษัท/พนักงาน/มุมมองกราฟ)
let selectedCompany = "all";
let selectedEmployee = "all";
let selectedViewMode = "month"; // "month" | "year"

const THAI_MONTHS = [
    "มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
    "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

const KNOWN_COMPANIES = ["วิริยะ","เมืองไทย","AIG"];

const YEAR_START = 2569;
const YEAR_END = 2575;

function getSortMillis(item){
    if(item && item.createdAt && typeof item.createdAt.toMillis === "function"){
        return item.createdAt.toMillis();
    }
    return 0;
}

function formatDate(date){

    if(!date) return "-";

    let d = new Date(date);

    if(isNaN(d)) return date;

    let day = String(d.getDate()).padStart(2,"0");
    let month = String(d.getMonth()+1).padStart(2,"0");
    let year = d.getFullYear() + 543;

    return `${day}/${month}/${year}`;

}

function parseCreateDate(createDate){
    if(!createDate) return { month:null, year:null };

    const parts = createDate.split("/");
    if(parts.length !== 3) return { month:null, year:null };

    const month = parseInt(parts[1],10);
    const year = parts[2];

    if(isNaN(month) || month < 1 || month > 12){
        return { month:null, year:null };
    }

    return { month:String(month).padStart(2,"0"), year:year };
}

/* =========================
   ตัวกรอง: ปุ่มบริษัท / พนักงาน (Real-time จากข้อมูลจริง)
========================= */
function renderCompanyButtons(){

    const container = document.getElementById("companyButtons");

    const companiesFromData = [...new Set(allData.map(i=>i.company).filter(Boolean))];
    const extraCompanies = companiesFromData.filter(c=>!KNOWN_COMPANIES.includes(c));
    const companies = [...KNOWN_COMPANIES, ...extraCompanies];

    let html = `<button type="button" class="chip-btn ${selectedCompany==="all"?"active":""}" data-value="all">ทั้งหมด</button>`;

    companies.forEach(c=>{
        html += `<button type="button" class="chip-btn ${selectedCompany===c?"active":""}" data-value="${c}">${c}</button>`;
    });

    container.innerHTML = html;

    container.querySelectorAll(".chip-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
            selectedCompany = btn.dataset.value;
            updateAll();
        });
    });
}

function renderEmployeeButtons(){

    const container = document.getElementById("employeeButtons");

    const employees = [...new Set(allData.map(i=>i.requestName).filter(Boolean))];

    let html = `<button type="button" class="chip-btn ${selectedEmployee==="all"?"active":""}" data-value="all">ทั้งหมด</button>`;

    employees.forEach(e=>{
        html += `<button type="button" class="chip-btn ${selectedEmployee===e?"active":""}" data-value="${e}">${e}</button>`;
    });

    container.innerHTML = html;

    container.querySelectorAll(".chip-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
            selectedEmployee = btn.dataset.value;
            updateAll();
        });
    });
}

/* =========================
   ตัวกรอง: ปี / เดือน (สำหรับตารางรายการ)
========================= */
function populateYearMonthSelects(){

    const yearSelect = document.getElementById("financeFilterYear");
    const monthSelect = document.getElementById("financeFilterMonth");

    const prevYear = yearSelect.value || "all";
    const prevMonth = monthSelect.value || "all";

    let years = [];
    for(let y = YEAR_START; y <= YEAR_END; y++) years.push(String(y));

    yearSelect.innerHTML = `<option value="all">ทุกปี</option>` +
        years.map(y=>`<option value="${y}">${y}</option>`).join("");
    yearSelect.value = years.includes(prevYear) ? prevYear : "all";

    let monthOptions = [`<option value="all">ทุกเดือน</option>`];
    for(let m = 1; m <= 12; m++){
        const key = String(m).padStart(2,"0");
        monthOptions.push(`<option value="${key}">${THAI_MONTHS[m-1]}</option>`);
    }
    monthSelect.innerHTML = monthOptions.join("");
    monthSelect.value = prevMonth;

    yearSelect.onchange = updateAll;
    monthSelect.onchange = updateAll;
}

/* =========================
   มุมมองกราฟ (รายเดือน / รายปี)
========================= */
function bindViewModeButtons(){

    document.querySelectorAll(".view-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
            selectedViewMode = btn.dataset.mode;

            document.querySelectorAll(".view-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");

            renderChart();
        });
    });
}

/* =========================
   ข้อมูลที่ผ่านตัวกรองทั้งหมด (บริษัท/พนักงาน/ปี/เดือน) — ใช้กับตารางและ Dashboard
========================= */
function getFilteredData(){

    const selectedYear = document.getElementById("financeFilterYear").value;
    const selectedMonth = document.getElementById("financeFilterMonth").value;

    const sorted = [...allData].sort((a,b)=> getSortMillis(a) - getSortMillis(b));

    return sorted.filter(item=>{

        const companyOK = selectedCompany === "all" || item.company === selectedCompany;
        const employeeOK = selectedEmployee === "all" || item.requestName === selectedEmployee;

        const parsed = parseCreateDate(item.createDate);
        const yearOK = selectedYear === "all" || parsed.year === selectedYear;
        const monthOK = selectedMonth === "all" || parsed.month === selectedMonth;

        return companyOK && employeeOK && yearOK && monthOK;
    });
}

/* =========================
   ตาราง
========================= */
function renderTable(){

    const table = document.getElementById("financeTable");
    table.innerHTML = "";

    const filtered = getFilteredData();

    filtered.forEach((item,index)=>{

        const row = `
        <tr>
            <td>${index + 1}</td>
            <td>${item.createDate || "-"}</td>
            <td>${item.company || "-"}</td>
            <td>${item.requestName || "-"}</td>
            <td>${item.customer || "-"}</td>
            <td>${item.phone || "-"}</td>
            <td>${item.plate || "-"}</td>
            <td>${formatDate(item.start)}</td>
            <td>${Number(item.total || 0).toLocaleString()}</td>
        </tr>
        `;

        table.innerHTML += row;
    });
}

/* =========================
   Dashboard สรุปภาพรวม
========================= */
function renderDashboard(){

    const filtered = getFilteredData();

    const revenueCollected = filtered.reduce((sum,i)=>
        sum
        + Number(i.installment1 || 0)
        + Number(i.installment2 || 0)
        + Number(i.installment3 || 0)
        + Number(i.installment4 || 0)
    , 0);

    const totalPremium = filtered.reduce((sum,i)=> sum + Number(i.total || 0), 0);

    const customerCount = new Set(filtered.map(i=>i.customer).filter(Boolean)).size;
    const policyCount = filtered.length;
    const companyCount = new Set(filtered.map(i=>i.company).filter(Boolean)).size;
    const employeeCount = new Set(filtered.map(i=>i.requestName).filter(Boolean)).size;

    document.getElementById("financeDashboard").innerHTML = `
        <div class="dash-card">
            <div class="dash-label">💰 รายได้ที่เก็บแล้ว</div>
            <div class="dash-value">${revenueCollected.toLocaleString()} บาท</div>
        </div>
        <div class="dash-card">
            <div class="dash-label">👥 จำนวนลูกค้า</div>
            <div class="dash-value">${customerCount.toLocaleString()}</div>
        </div>
        <div class="dash-card">
            <div class="dash-label">📄 จำนวนกรมธรรม์</div>
            <div class="dash-value">${policyCount.toLocaleString()}</div>
        </div>
        <div class="dash-card">
            <div class="dash-label">🧾 เบี้ยประกันรวม</div>
            <div class="dash-value">${totalPremium.toLocaleString()} บาท</div>
        </div>
        <div class="dash-card">
            <div class="dash-label">🏢 จำนวนบริษัท</div>
            <div class="dash-value">${companyCount.toLocaleString()}</div>
        </div>
        <div class="dash-card">
            <div class="dash-label">🧑‍💼 จำนวนพนักงาน</div>
            <div class="dash-value">${employeeCount.toLocaleString()}</div>
        </div>
    `;

    document.getElementById("financeSummaryTotal").innerText =
        `แสดงข้อมูล ${filtered.length} รายการ ตามตัวกรองที่เลือก`;
}

/* =========================
   คำนวณข้อมูลกราฟ
========================= */
function computeMonthlyTotals(){

    const year = document.getElementById("financeFilterYear").value;
    const totals = new Array(12).fill(0);

    allData.forEach(item=>{

        const companyOK = selectedCompany === "all" || item.company === selectedCompany;
        const employeeOK = selectedEmployee === "all" || item.requestName === selectedEmployee;

        const parsed = parseCreateDate(item.createDate);
        const yearOK = year === "all" || parsed.year === year;

        if(companyOK && employeeOK && yearOK && parsed.month){
            totals[parseInt(parsed.month,10) - 1] += Number(item.total || 0);
        }
    });

    return totals;
}

function computeYearlyTotals(){

    let years = [];
    for(let y = YEAR_START; y <= YEAR_END; y++) years.push(String(y));

    const totals = years.map(y=>{
        return allData
            .filter(item=>{
                const companyOK = selectedCompany === "all" || item.company === selectedCompany;
                const employeeOK = selectedEmployee === "all" || item.requestName === selectedEmployee;
                const parsed = parseCreateDate(item.createDate);
                return companyOK && employeeOK && parsed.year === y;
            })
            .reduce((sum,i)=> sum + Number(i.total || 0), 0);
    });

    return { years, totals };
}

/* =========================
   วาด/อัปเดตกราฟ
========================= */
function updateChartData(labels, data, label){

    if(typeof Chart === "undefined"){
        console.error("ไม่สามารถโหลด Chart.js ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
        return;
    }

    if(chartInstance){
        chartInstance.data.labels = labels;
        chartInstance.data.datasets[0].data = data;
        chartInstance.data.datasets[0].label = label;
        chartInstance.update();
        return;
    }

    const ctx = document.getElementById("revenueChart");

    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                backgroundColor: "#2F6FED",
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value){
                            return Number(value).toLocaleString();
                        }
                    }
                }
            }
        }
    });
}

function renderChart(){

    if(selectedViewMode === "month"){

        const data = computeMonthlyTotals();
        updateChartData(THAI_MONTHS, data, "รายได้รายเดือน (บาท)");
        document.getElementById("chartTitle").innerText = "📈 กราฟรายได้รายเดือน";

    } else {

        const { years, totals } = computeYearlyTotals();
        updateChartData(years, totals, "รายได้รายปี (บาท)");
        document.getElementById("chartTitle").innerText = "📈 กราฟรายได้รายปี";
    }
}

/* =========================
   อัปเดตทุกส่วนพร้อมกัน (ไม่รีเฟรชหน้า)
========================= */
function updateAll(){
    renderCompanyButtons();
    renderEmployeeButtons();
    renderDashboard();
    renderTable();
    renderChart();
}

/* ฟังข้อมูลจาก Firestore แบบ realtime — collection เดียวกับ report.html / customer_debt.html */
onSnapshot(collection(db, "insuranceData"), (snapshot) => {

    allData = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));

    populateYearMonthSelects();
    updateAll();
});

bindViewModeButtons();

</script>

</body>
</html>
