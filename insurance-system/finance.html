<!-- เพิ่มใหม่: สไตล์ตัวกรอง + กล่องกราฟ (ไม่แตะ style.css เดิม) -->
<style>
.finance-summary-panel{
    max-width:1100px;
    margin:0 auto 20px;
    background:#f8f9fb;
    border:1px solid #e3e6ec;
    border-radius:12px;
    padding:16px 18px;
}

.finance-summary-filters{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:12px;
}

.finance-summary-filters label{
    font-size:13px;
    color:#002d72;
    font-weight:bold;
    margin-right:6px;
}

.finance-summary-filters select{
    padding:6px 10px;
    border-radius:8px;
    border:1px solid #cfd6e2;
    font-family:"Kanit",sans-serif;
    font-size:13px;
}

.finance-summary-total{
    font-size:17px;
    font-weight:bold;
    color:#002d72;
}

.finance-chart-box{
    max-width:1100px;
    margin:0 auto 10px;
    background:#fff;
    border:1px solid #e3e6ec;
    border-radius:12px;
    padding:18px;
}

.finance-chart-box h3{
    text-align:center;
    color:#152A54;
    margin-bottom:14px;
    font-size:clamp(14px, 3.6vw, 16px);
}

.finance-chart-box canvas{
    max-height:340px;
}

/* เพิ่มใหม่: กล่องเลื่อนดูกราฟแนวนอนบนมือถือ กันกราฟล้นจอ/ตัวอักษรบีบจนอ่านไม่ออก
   กำหนดความสูงตายตัวไว้ (ปรับตาม breakpoint ด้านล่าง) เพื่อให้ Chart.js
   (ตั้งค่า maintainAspectRatio:false ในสคริปต์) ควบคุมความสูงของกราฟได้แม่นยำ
   ถ้าจอกว้างพอ (>=680px) กราฟจะเต็มความกว้างพอดีเหมือนเดิม ไม่มีสกอลล์แนวนอน */
.finance-chart-scroll{
    width:100%;
    height:340px;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
}

.finance-chart-scroll canvas{
    min-width:680px;
    height:100% !important;
}

/* เพิ่มใหม่: กล่องเลื่อนดูตารางแนวนอนบนมือถือ กันตารางบีบจนอ่านไม่ได้ */
.finance-table-scroll{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-x pan-y pinch-zoom;
    border-radius:10px;
}

.finance-table-scroll table{
    min-width:900px;
}

@media(max-width:768px){

    /* กราฟ: ลดความสูงลงบนมือถือ ให้พอดีจอโดยไม่ล้น */
    .finance-chart-box{
        padding:12px;
    }

    .finance-chart-scroll{
        height:240px;
    }

    .finance-chart-scroll canvas{
        min-width:560px;
    }

    /* ตาราง: ลดขนาดฟอนต์และ padding ให้อ่านง่ายขึ้นในพื้นที่จำกัด */
    .finance-table-scroll table{
        min-width:760px;
        font-size:11px;
    }

    .finance-table-scroll th,
    .finance-table-scroll td{
        padding:6px 8px;
        white-space:nowrap;
    }

    /* ตัวกรอง: ปุ่ม/กล่องเลือกไม่ให้ทับกัน ให้เรียงชิดกันแบบยืดหยุ่น */
    .finance-summary-filters{
        gap:10px;
    }

    .finance-summary-filters select{
        font-size:12px;
        padding:5px 8px;
    }

    .back-btn{
        width:100%;
        max-width:280px;
    }
}

@media(max-width:480px){

    .finance-chart-box h3{
        font-size:13px;
    }

    .finance-chart-scroll{
        height:200px;
    }

    .finance-table-scroll table{
        min-width:680px;
        font-size:10px;
    }

    .finance-summary-total{
        font-size:14px;
    }
}
</style>

<!-- เพิ่มใหม่: กราฟรายได้รายเดือน (แยกตามบริษัท/พนักงานที่เลือกกรอง) -->
<div class="finance-chart-box">

<!-- ไลบรารีกราฟ (โหลดจาก cdnjs เหมือน html2canvas/jsPDF ที่ใช้อยู่แล้วในระบบ) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<!-- แก้ไข: เดิมอ่านข้อมูลจาก localStorage.getItem("insuranceData") ซึ่งไม่มีการเขียนคีย์นี้เลย
     (ทุกฟอร์มบันทึกลง Firebase Firestore) ทำให้ตาราง/กราฟไม่ขึ้นเลย
     แก้ให้ดึงข้อมูล realtime จาก Firestore แหล่งเดียวกับ report.html / customer_debt.html
     พร้อมเพิ่มตัวกรองเดือน/บริษัท/พนักงาน และกราฟรายได้ตามที่ต้องการ -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNpaYlwrkJhBA-8tAax022PWWFYMRz7Kw",
  authDomain: "insurance-system-f26b0.firebaseapp.com",
  projectId: "insurance-system-f26b0",
  storageBucket: "insurance-system-f26b0.firebasestorage.app",
  messagingSenderId: "438698153100",
  appId: "1:438698153100:web:a553b97b59701883f057a9",
  measurementId: "G-XXWCQEMT0B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let chartInstance = null;

const THAI_MONTHS = [
    "มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
    "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

// เพิ่มใหม่: บริษัทที่ต้องการให้ขึ้นเป็นตัวเลือกในตัวกรองเสมอ แม้ยังไม่มีรายการบันทึกของบริษัทนั้น
// (บริษัทอื่นนอกเหนือจากนี้ที่พบใน insuranceData จริง จะถูกเพิ่มเข้ามาโดยอัตโนมัติเช่นเดิม
// ดูฟังก์ชัน populateFilters() ด้านล่าง)
const EXTRA_COMPANY_OPTIONS = ["วิริยะ","เมืองไทย","AIG","AXA","KWI","กรุงเทพ"];

function formatDate(date){

    if(!date) return "-";

    let d = new Date(date);

    if(isNaN(d)) return date;

    let day = String(d.getDate()).padStart(2,"0");
    let month = String(d.getMonth()+1).padStart(2,"0");
    let year = d.getFullYear() + 543;

    return `${day}/${month}/${year}`;

}

function parseCreateDate(createDate){
    if(!createDate) return { month:null, year:null };

    const parts = createDate.split("/");
    if(parts.length !== 3) return { month:null, year:null };

    const month = parseInt(parts[1],10);
    const year = parts[2];

    if(isNaN(month) || month < 1 || month > 12){
        return { month:null, year:null };
    }

    return { month:String(month).padStart(2,"0"), year:year };
}

function populateFilters(){

    const companySelect = document.getElementById("financeFilterCompany");
    const employeeSelect = document.getElementById("financeFilterEmployee");
    const yearSelect = document.getElementById("financeFilterYear");
    const monthSelect = document.getElementById("financeFilterMonth");

    const prevCompany = companySelect.value || "all";
    const prevEmployee = employeeSelect.value || "all";
    const prevYear = yearSelect.value || "all";
    const prevMonth = monthSelect.value || "all";

    // บริษัท
    // แก้ไข: เดิมดึงรายชื่อบริษัทจากข้อมูลจริงอย่างเดียว ทำให้บริษัทที่ยังไม่มีรายการบันทึกเลย
    // (เช่น AXA, KWI, กรุงเทพ ตอนที่ยังไม่มีใครบันทึกงานของบริษัทเหล่านี้) จะไม่ขึ้นในตัวกรอง
    // เพิ่ม EXTRA_COMPANY_OPTIONS ให้ปุ่มเลือกบริษัทเหล่านี้ขึ้นเสมอ ไม่ว่าจะมีข้อมูลหรือยัง
    // และยังคงรวมบริษัทอื่นๆ ที่มีข้อมูลจริงในระบบเข้ามาด้วยอัตโนมัติเหมือนเดิม (ไม่กำหนดตายตัวทั้งหมด)
    const companiesFromData = allData.map(i=>i.company).filter(Boolean);
    const companies = [...new Set([...EXTRA_COMPANY_OPTIONS, ...companiesFromData])]
        .sort((a,b)=>a.localeCompare(b,"th"));

    companySelect.innerHTML = `<option value="all">ทุกบริษัท</option>` +
        companies.map(c=>`<option value="${c}">${c}</option>`).join("");
    companySelect.value = companies.includes(prevCompany) ? prevCompany : "all";

    // พนักงาน
    const employees = [...new Set(allData.map(i=>i.requestName).filter(Boolean))];
    employeeSelect.innerHTML = `<option value="all">ทั้งหมด</option>` +
        employees.map(e=>`<option value="${e}">${e}</option>`).join("");
    employeeSelect.value = employees.includes(prevEmployee) ? prevEmployee : "all";

    // ปี
    const YEAR_START = 2569;
    const YEAR_END = 2575;
    let years = [];
    for(let y = YEAR_START; y <= YEAR_END; y++) years.push(String(y));

    yearSelect.innerHTML = `<option value="all">ทั้งหมด</option>` +
        years.map(y=>`<option value="${y}">${y}</option>`).join("");
    yearSelect.value = years.includes(prevYear) ? prevYear : "all";

    // เดือน
    let monthOptions = [`<option value="all">ทั้งหมด</option>`];
    for(let m = 1; m <= 12; m++){
        const key = String(m).padStart(2,"0");
        monthOptions.push(`<option value="${key}">${THAI_MONTHS[m-1]}</option>`);
    }
    monthSelect.innerHTML = monthOptions.join("");
    monthSelect.value = prevMonth;

    companySelect.onchange = updateAll;
    employeeSelect.onchange = updateAll;
    yearSelect.onchange = updateAll;
    monthSelect.onchange = updateAll;
}

function getFilteredData(){

    const selectedCompany = document.getElementById("financeFilterCompany").value;
    const selectedEmployee = document.getElementById("financeFilterEmployee").value;
    const selectedYear = document.getElementById("financeFilterYear").value;
    const selectedMonth = document.getElementById("financeFilterMonth").value;

    return allData.filter(item=>{

        const companyOK = selectedCompany === "all" || item.company === selectedCompany;
        const employeeOK = selectedEmployee === "all" || item.requestName === selectedEmployee;

        const parsed = parseCreateDate(item.createDate);
        const yearOK = selectedYear === "all" || parsed.year === selectedYear;
        const monthOK = selectedMonth === "all" || parsed.month === selectedMonth;

        return companyOK && employeeOK && yearOK && monthOK;
    });
}

function renderTable(){

    const table = document.getElementById("financeTable");
    table.innerHTML = "";

    const filtered = getFilteredData();
    let totalSum = 0;

    filtered.forEach((item,index)=>{

        totalSum += Number(item.total || 0);

        const row = `
        <tr>
            <td>${index + 1}</td>
            <td>${item.createDate || "-"}</td>
            <td>${item.company || "-"}</td>
            <td>${item.customer || "-"}</td>
            <td>${item.phone || "-"}</td>
            <td>${item.plate || "-"}</td>
            <td>${formatDate(item.start)}</td>
            <td>${Number(item.total || 0).toLocaleString()}</td>
            <!-- เพิ่มใหม่: แสดงผู้แจ้งงานจาก field employeeName (ระบบ login ใหม่)
                 รายการเก่าที่ยังไม่มี field นี้ จะ fallback ไปใช้ requestName แทน ไม่ error -->
            <td>${item.employeeName || item.requestName || "-"}</td>
        </tr>
        `;

        table.innerHTML += row;
    });

    document.getElementById("financeSummaryTotal").innerText =
        `💰 ยอดรวมรายได้ที่กรอง: ${totalSum.toLocaleString()} บาท (${filtered.length} รายการ)`;
}

function renderChart(){

    const selectedCompany = document.getElementById("financeFilterCompany").value;
    const selectedEmployee = document.getElementById("financeFilterEmployee").value;
    const selectedYear = document.getElementById("financeFilterYear").value;

    // กราฟสรุปยอดรวมรายเดือน (เคารพตัวกรองบริษัท/พนักงาน/ปี แต่ไม่เคารพตัวกรองเดือน
    // เพื่อให้เห็นแนวโน้มรายได้ทั้ง 12 เดือนพร้อมกัน)
    const monthlyTotals = new Array(12).fill(0);

    allData.forEach(item=>{

        const companyOK = selectedCompany === "all" || item.company === selectedCompany;
        const employeeOK = selectedEmployee === "all" || item.requestName === selectedEmployee;

        const parsed = parseCreateDate(item.createDate);
        const yearOK = selectedYear === "all" || parsed.year === selectedYear;

        if(companyOK && employeeOK && yearOK && parsed.month){
            const idx = parseInt(parsed.month,10) - 1;
            monthlyTotals[idx] += Number(item.total || 0);
        }
    });

    const ctx = document.getElementById("revenueChart");

    // เพิ่มใหม่: ปรับขนาดตัวอักษรบนกราฟให้เล็กลงอัตโนมัติเมื่อจอแคบลง (มือถือ)
    // เพื่อให้ตัวเลข/ป้ายกำกับแกน X-Y ยังอ่านง่าย ไม่ล้นทับกัน
    const isNarrowScreen = window.innerWidth <= 480;
    const isMobileScreen = window.innerWidth <= 768;
    const axisFontSize = isNarrowScreen ? 9 : (isMobileScreen ? 10.5 : 12);
    const legendFontSize = isNarrowScreen ? 10 : (isMobileScreen ? 11 : 13);

    if(chartInstance){
        chartInstance.data.datasets[0].data = monthlyTotals;
        chartInstance.options.scales.x.ticks.font.size = axisFontSize;
        chartInstance.options.scales.y.ticks.font.size = axisFontSize;
        chartInstance.update();
        return;
    }

    if(typeof Chart === "undefined"){
        console.error("ไม่สามารถโหลด Chart.js ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
        return;
    }

    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: THAI_MONTHS,
            datasets: [{
                label: "รายได้ (บาท)",
                data: monthlyTotals,
                backgroundColor: "#2F6FED",
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            // เพิ่มใหม่: ปิด maintainAspectRatio เพื่อให้กราฟใช้ความสูงตาม CSS ของ
            // .finance-chart-scroll (ปรับตามขนาดจอผ่าน media query) แทนการคำนวณสัดส่วนเอง
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    ticks: {
                        font: { size: axisFontSize },
                        // เพิ่มใหม่: เอียงป้ายกำกับเดือนบนจอแคบ ป้องกันตัวอักษรทับกัน
                        maxRotation: isMobileScreen ? 60 : 0,
                        minRotation: isMobileScreen ? 45 : 0
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        font: { size: axisFontSize },
                        callback: function(value){
                            return Number(value).toLocaleString();
                        }
                    }
                }
            }
        }
    });
}

function updateAll(){
    renderTable();
    renderChart();
}

/* ฟังข้อมูลจาก Firestore แบบ realtime — collection เดียวกับ report.html / customer_debt.html */
onSnapshot(collection(db, "insuranceData"), (snapshot) => {

    allData = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));

    populateFilters();
    updateAll();
});

/* เพิ่มใหม่: เมื่อผู้ใช้หมุนจอหรือปรับขนาดหน้าต่าง ให้คำนวณขนาดฟอนต์ของกราฟใหม่
   (debounce ด้วย setTimeout กันเรียกถี่เกินไประหว่างลาก resize) */
let financeResizeTimer = null;
window.addEventListener("resize", function(){
    clearTimeout(financeResizeTimer);
    financeResizeTimer = setTimeout(renderChart, 200);
});

</script>

<!-- เพิ่มใหม่: สคริปต์เปิด/ปิด sidebar เหมือนหน้าอื่นในระบบ (ไม่ใช่ type="module"
     เพราะปุ่มเมนูไม่เกี่ยวกับ Firestore ให้ทำงานได้ทันทีไม่ต้องรอโหลดข้อมูล) -->
<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(menuBtn && sidebar && overlay){

    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", () => {
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
    });
}
</script>

</body>
</html>
