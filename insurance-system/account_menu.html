<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>  เมนูบัญชี</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>


<body>


<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <h2>📋 ระบบประกันกับคุณพลอย</h2>

    <ul style="list-style:none;padding:0 10px;">
        <li>
            <a href="index.html" class="active">
                🏠 หน้าแรก
            </a>
        </li>
        <li>
            <a href="revenue.html">
                📈 กราฟรายได้
            </a>
        </li>
    </ul>

</div>

<div id="overlay"></div>

<!-- TOPBAR -->
<header class="topbar">
    <button id="menuBtn">☰</button>
    <img src="logo.png" class="toplogo" alt="logo">
    <span class="apptitle">เมนูบัญชี</span>
</header>


<!-- CONTENT -->

<main class="main account-page">


    <h2 class="title">
        📒 เมนูบัญชี
    </h2>
    <p class="subtitle">
        จัดการรายงาน ลูกหนี้ และบันทึกการเงินทั้งหมดได้จากที่นี่
    </p>



    <div class="cards">

        <a href="report.html" class="card account-card">

            <span class="icon">
                📊
            </span>

            <h3>
                รายงานข้อมูลประกัน
            </h3>
        </a>




        <a href="customer_debt.html" class="card">

            <span class="icon">
                💰
            </span>

            <h3>
                ลูกหนี้
            </h3>

        </a>




        <a href="finance.html" class="card">

            <span class="icon">
                💵
            </span>

            <h3>
                บันทึกการเงิน
            </h3>

        </a>


    </div>



    <div class="bottom-actions">

        <a href="index.html" class="back-btn">
            ⬅ กลับหน้าแรก
        </a>

    </div>



</main>




<script>


const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(menuBtn && sidebar){
    menuBtn.addEventListener("click",()=>{
        sidebar.classList.toggle("show");
        if(overlay) overlay.classList.toggle("show");
    });
}

if(overlay){
    overlay.addEventListener("click",()=>{
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
    });
}


</script>
</body>
</html>
