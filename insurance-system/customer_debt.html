<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ลูกหนี้</title>


<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">


<style>

:root{
    --navy:#152A54;
    --blue:#2F6FED;
    --blue-dark:#1E4FC4;
    --blue-light:#EAF1FF;
    --bg:#F3F6FC;
    --surface:#FFFFFF;
    --border:#E4EAF5;
    --text-soft:#6B7A99;

    --coral:#FF8A65;
    --mint:#2FBF9B;
    --sky:#3E7BFA;
}

*{
    box-sizing:border-box;
}

body{

    font-family:"Kanit",sans-serif;
    background:var(--bg);
    padding:30px 15px;

}


.debt-card{

    max-width:1400px;
    margin:0 auto;
    min-height:calc(100vh - 60px);

    background:var(--surface);
    border:1px solid var(--border);
    border-radius:26px;
    box-shadow:0 14px 34px rgba(21,42,84,.10);

    padding:32px;

    overflow-x:auto;

}



h1{

    text-align:center;
    color:var(--navy);
    font-size:24px;
    font-weight:700;
    margin-bottom:6px;

}

.debt-subtitle{
    text-align:center;
    color:var(--text-soft);
    font-size:14px;
    margin-bottom:10px;
}



table{

    width:100%;
    border-collapse:collapse;

    margin-top:25px;

    font-size:13px;

}



th{

    background:var(--navy);
    color:white;
    font-weight:600;

    padding:12px 10px;

    white-space:nowrap;

}



td{

    padding:10px;

    border-bottom:1px solid var(--border);

    text-align:center;

    white-space:nowrap;

}

tbody tr.overdue:hover,
tbody tr.not-overdue:hover,
tbody tr.paid-complete:hover{
    filter:brightness(.97);
}

tbody tr:not(.overdue):not(.not-overdue):not(.paid-complete):hover{
    background:var(--blue-light);
}

/* แถบสีทั้งแถวตามสถานะ */
tr.overdue td{
    background:#ff3737;
    color:#ffffff;
    font-weight:600;
}

tr.not-overdue td{
    background:#66ee61d5;
    color:#025c0e;
    font-weight:600;
}

tr.paid-complete td{
    background:var(--blue-light);
    color:var(--blue-dark);
    font-weight:600;
}

.status-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;

    padding:5px 14px;
    border-radius:999px;

    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    background:rgba(255,255,255,.6);
}




.debt-total{

    margin-top:18px;
    margin-bottom:6px;

    font-size:18px;

    font-weight:600;

    color:var(--navy);

    background:var(--blue-light);
    display:inline-block;
    padding:12px 22px;
    border-radius:16px;

}

/* เพิ่มใหม่: แถวบนสุดรวมปุ่มกลับ + ยอดลูกหนี้รวม ให้อยู่แถวเดียวกัน */
.debt-top-row{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:14px;
    margin-top:18px;
    margin-bottom:6px;
}

.debt-top-row .debt-total{
    margin-top:0;
    margin-bottom:0;
}



/* แก้ไข: ย้ายปุ่มกลับมาไว้ด้านบน ข้างยอดลูกหนี้รวม และเปลี่ยนเป็นโทนสีแดงเข้มขึ้น */
.back-btn-debt{

    display:inline-flex;
    align-items:center;
    gap:6px;

    background:#79797486;

    color:#fff;

    border:none;

    padding:12px 26px;

    border-radius:999px;

    cursor:pointer;

    font-family:"Kanit";
    font-weight:600;

    font-size:15px;

    transition:.2s;

}

.back-btn-debt:hover{
    background:#C62828;
}


</style>


</head>



<body>


<div class="debt-card">


<h1>
💰 รายงานลูกหนี้
</h1>

<!-- แก้ไข: ย้ายปุ่มกลับมาไว้ด้านบน ข้างยอดลูกหนี้รวม -->
<div class="debt-top-row">
    <button class="back-btn-debt"
    onclick="location.href='account_menu.html'">
    ← กลับเมนูบัญชี
    </button>

    <div class="debt-total" id="debtTotal"></div>
</div>



<table>


<thead>

<tr>

<th>ลำดับ</th>

<th>ชื่อผู้แจ้ง</th>

<th>วันที่แจ้งงาน</th>

<th>บริษัทประกันภัย</th>

<th>ชื่อผู้เอาประกัน</th>

<th>ยี่ห้อ</th>

<th>ทะเบียน</th>

<th>วันเริ่ม</th>

<th>วันสิ้นสุด</th>

<th>ทุนประกัน</th>

<th>รวม</th>

<th>กลุ่มสินค้า</th>

<th>งวดที่ 1</th>

<th>งวดที่ 2</th>

<th>งวดที่ 3</th>

<th>งวดที่ 4</th>

<th>ยอดค้าง</th>

<th>เบอร์โทร</th>

<th>วันที่ครบกำหนด</th>

<th>เกินกำหนด(วัน)</th>

<th>สถานะ</th>


</tr>

</thead>



<tbody id="debtTable">


</tbody>



</table>




</div>




<!-- แก้ไข: เดิมอ่านข้อมูลจาก localStorage.getItem("insuranceData") ซึ่งไม่มีการเขียนคีย์นี้
     ที่ไหนเลยในระบบ (ทุกฟอร์มบันทึกลง Firebase Firestore collection "insuranceData")
     ทำให้หน้านี้ว่างเปล่าเสมอ แก้ให้ดึงข้อมูล realtime จาก Firestore แหล่งเดียวกับ
     report.html / finance.html / script.js โดยไม่แตะตรรกะคำนวณยอดค้าง/สถานะเดิมเลย -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

/* ตั้งค่าเดียวกับ script.js / report.html เพื่ออ่าน collection "insuranceData" เดียวกัน */
const firebaseConfig = {
  apiKey: "AIzaSyCNpaYlwrkJhBA-8tAax022PWWFYMRz7Kw",
  authDomain: "insurance-system-f26b0.firebaseapp.com",
  projectId: "insurance-system-f26b0",
  storageBucket: "insurance-system-f26b0.firebasestorage.app",
  messagingSenderId: "438698153100",
  appId: "1:438698153100:web:a553b97b59701883f057a9",
  measurementId: "G-XXWCQEMT0B"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


function calculateOverdue(date){

    if(!date) return 0;


    // รองรับวันที่แบบ dd/mm/yyyy
    let parts = date.split("/");


    let due;


    if(parts.length === 3){

        due = new Date(
            Number(parts[2])-543,
            Number(parts[1])-1,
            Number(parts[0])
        );

    }
    else{

        due = new Date(date);

    }


    let today = new Date();


    today.setHours(0,0,0,0);
    due.setHours(0,0,0,0);



    let diff = today - due;


    let days = Math.floor(
        diff / (1000*60*60*24)
    );


    return days > 0 ? days : 0;

}



function renderDebt(data){


/*
 เอาเฉพาะรายการที่มียอดค้าง
*/

let debt = data;



debt.forEach(item=>{


    let total = Number(item.total || 0);


    let paid = 
        Number(item.installment1 || 0) +
        Number(item.installment2 || 0) +
        Number(item.installment3 || 0) +
        Number(item.installment4 || 0);



    item.debtAmount = total - paid;



    item.overdue =
    calculateOverdue(item.end);

});


/*
 เรียงเกินกำหนดมากสุดขึ้นก่อน
*/


debt.sort((a,b)=>{


return b.overdue-a.overdue;


});





let html="";



debt.forEach((item,index)=>{


let rowClass = "";

if(item.debtAmount <= 0){

    rowClass = "paid-complete";

}
else if(item.overdue > 0){

    rowClass = "overdue";

}
else{

    rowClass = "not-overdue";

}



let statusLabel = rowClass === "paid-complete"
    ? "🟦 จ่ายครบแล้ว"
    : rowClass === "overdue"
        ? "🟥 เกินกำหนด"
        : "🟩 ยังไม่เกินกำหนด";

html+=`

<tr class="${rowClass}">


<td>${index+1}</td>

<td>${item.requestName||"-"}</td>

<td>${item.createDate||"-"}</td>

<td>${item.company||"-"}</td>

<td>${item.customer||"-"}</td>

<td>${item.brand||"-"}</td>

<td>${item.plate||"-"}</td>

<td>${item.start||"-"}</td>

<td>${item.end||"-"}</td>


<td>
${Number(item.sumInsured||0).toLocaleString()}
</td>


<td>
${Number(item.total||0).toLocaleString()}
</td>


<td>${item.group||"-"}</td>


<td>${item.installment1||"-"}</td>

<td>${item.installment2||"-"}</td>

<td>${item.installment3||"-"}</td>

<td>${item.installment4||"-"}</td>



<td>
${item.debtAmount.toLocaleString()}
</td>


<td>
${item.phone||"-"}
</td>



<td>
${item.end||"-"}
</td>



<td>

${item.overdue}

</td>

<td>
<span class="status-badge">${statusLabel}</span>
</td>



</tr>


`;


});



document.getElementById("debtTable").innerHTML=html;



let totalDebt=debt.reduce(
(sum,item)=>sum+item.debtAmount,0
);



document.getElementById("debtTotal").innerText=

"ยอดลูกหนี้รวม : "+
totalDebt.toLocaleString()+
" บาท";



}


/* ฟังข้อมูลจาก Firestore แบบ realtime — อัปเดตอัตโนมัติทุกครั้งที่มีการบันทึก/แก้ไข/ลบ
   จากหน้า form_car.html / form_product.html / report.html / finance.html */
onSnapshot(collection(db, "insuranceData"), (snapshot) => {

    const data = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));

    renderDebt(data);

});


</script>


</body>

</html>
