/* =========================
   STORAGE
   (allData ตอนนี้มาจาก Firestore แบบ realtime ผ่าน onSnapshot ด้านล่าง ไม่ใช้ localStorage แล้ว)
========================= */
 
        let allData = [];
 
 
 
        /* =========================
        THAI MONTH
        ========================= */
 
 
        const THAI_MONTHS = [
 
            "มกราคม",
            "กุมภาพันธ์",
            "มีนาคม",
            "เมษายน",
            "พฤษภาคม",

            "กรกฎาคม",
            "สิงหาคม",

            "ตุลาคม",
            "พฤศจิกายน",
            "ธันวาคม"
 
        ];

        /* เพิ่มใหม่: helper แปลงวันที่แจ้งงาน (createDate เช่น "16/07/2569") ที่ผู้ใช้กรอก/ระบบบันทึกไว้
           ให้เป็นตัวเลข millisecond โดยแปลงปี พ.ศ. -> ค.ศ. (-543) ใช้เป็นตัวเรียงสำรอง
           สำหรับข้อมูลที่ไม่มี createdAt (Firestore Timestamp) จะได้ไม่ต้องยุบรวมเป็น 0 ทั้งหมด */
        function parseCreateDateMillis(createDate){

            if(!createDate) return 0;

            const parts = createDate.split("/");

            if(parts.length !== 3) return 0;

            const day = Number(parts[0]);
            const month = Number(parts[1]);
            const year = Number(parts[2]);

            if(isNaN(day) || isNaN(month) || isNaN(year)) return 0;

            const gregorianYear = year - 543;

            const d = new Date(gregorianYear, month - 1, day);

            return isNaN(d.getTime()) ? 0 : d.getTime();

        }

        /* เพิ่มใหม่: helper แปลง createdAt (Firestore Timestamp) เป็นตัวเลข millisecond
           เพื่อเรียงข้อมูลตามลำดับการบันทึกจริง (เก่า -> ใหม่ อยู่ล่างสุด) และคงลำดับ
           เดิมทุกครั้งที่รีเฟรชหน้า
           แก้ไข: เดิมข้อมูลที่ไม่มี field นี้จะได้ 0 ทั้งหมด (กองรวมกันไม่มีลำดับที่แน่นอน)
           เปลี่ยนเป็น fallback ไปใช้วันที่กรอก (createDate) แทน เพื่อให้เรียงตามวันเวลาที่กรอกจริงเสมอ */
        function getSortMillis(item){
            if(item && item.createdAt && typeof item.createdAt.toMillis === "function"){
                return item.createdAt.toMillis();
            }
            return parseCreateDateMillis(item && item.createDate);
        }
 
 
 
        /* =========================
        แปลงวันที่แจ้งงาน
        ========================= */
 
 
        function parseCreateDate(createDate){
            if(!createDate)
                return {
                    month:null,
                    year:null
                };
 
 
            const parts = createDate.split("/");
 
            if(parts.length !== 3)
                return {
                    month:null,
                    year:null
                };
 
            const month = parseInt(parts[1],10);
            const year = parts[2];
 
            if(
                isNaN(month) ||
                month < 1 ||
                month > 12
            ){
 
                return {
                    month:null,
                    year:null
                };
            }
 
            return {
                month:String(month).padStart(2,"0"),
                year:year
            };
 
 
        }
 
        /* =========================
        แสดงข้อมูลตาราง
        ========================= */
 
        function renderTable(){
 
            // แก้บั๊ก: เดิม populateFilters() ถูกเรียก "หลัง" กรองข้อมูล ทำให้รอบแรกที่เปิดหน้า
            // <select> ตัวกรองยังไม่มี <option> ค่า .value จึงเป็นค่าว่าง (ไม่ใช่ "all")
            // ส่งผลให้ getFilteredData() กรองข้อมูลหายไปหมดตั้งแต่รอบแรก (ตารางว่างจนกว่าจะเลือกตัวกรอง)
            // แก้โดยเรียก populateFilters() ก่อน เพื่อให้ทุกตัวกรองพร้อมค่า "all" ก่อนกรอง/แสดงข้อมูลเสมอ
            populateFilters();
 
            // allData มาจาก Firestore แบบ realtime (onSnapshot) ไม่อ่านจาก localStorage แล้ว
            let tbody = document.querySelector("tbody");
 
            tbody.innerHTML = "";
 
 
            getFilteredData().forEach((item,i)=>{
 
 
                tbody.innerHTML += `

        <tr>

        <!-- แก้ไข: ย้ายปุ่มจัดการมาไว้คอลัมน์แรกของแถว เพื่อให้กดง่ายขึ้น -->

        onclick="openDoc('${item.id}')">

        </button>


        <button 
        class="delete-btn"
        onclick="deleteItem('${item.id}')">
        🗑️
        </button>

        </td>

        <td>${i+1}</td>
        <td>${item.requestName || "-"}</td>
        <td>${item.createDate || "-"}</td>
        <td>${item.company || "-"}</td>
 
        <td>
 
        ${
            item.type === "car"
 
            ? "🚗 ประกันรถยนต์"
 
            : item.type === "product"
 
            ? "📦 ประกันสินค้า"
 
            : "-"
 
        }
 
        </td>
 
        <td>${item.customer || "-"}</td>
        <td>${item.phone || "-"}</td>
        <td>${item.address || "-"}</td>
        <td>${item.brand || "-"}</td>
        <td>${item.plate || "-"}</td>
        <td>${item.start || "-"}</td>
        <td>${item.end || "-"}</td>
 
        <td>
 
        ${Number(item.sumInsured || 0).toLocaleString()}
 
        </td>
 
        <td>
 
        ${Number(item.total || 0).toLocaleString()}
 
        </td>
        <td>${item.group || "-"}</td>
        <td>${item.installment1 || "-"}</td>
        <td>${item.installment2 || "-"}</td>
        <td>${item.installment3 || "-"}</td>
        <td>${item.installment4 || "-"}</td>
 
        <td>
        ${
        (
        Number(item.total || 0) -
        (
        Number(item.installment1 || 0) +
        Number(item.installment2 || 0) +
        Number(item.installment3 || 0) +
        Number(item.installment4 || 0)
        )
        ).toLocaleString()
        }
        </td>

        </tr>

        `;
 
            });
 
        }
 
        /* =========================
        รายชื่อบริษัท
        ========================= */
 
        const KNOWN_COMPANIES = [
 
            "วิริยะ",
            "เมืองไทย",
            "AIG"
 
        ];
 
 
        /* =========================
        สร้างตัวเลือก Filter
        ========================= */
 
 
        function populateFilters(){
 
            const companySelect =
                document.getElementById("filterCompany");
 
            const yearSelect =
                document.getElementById("filterYear");
 
            const monthSelect =
                document.getElementById("filterMonth");

            const employeeSelect =
                document.getElementById("filterEmployee");
 
            const prevCompany =
                companySelect.value || "all";

            const prevEmployee =
                employeeSelect.value || "all";
 
            const companiesFromData = [
 
                ...new Set(
                    allData
                    .map(item=>item.company)
                    .filter(c=>c)
                )
 
            ];
 
 
            const extraCompanies =
                companiesFromData.filter(
                    c => !KNOWN_COMPANIES.includes(c)
                );
 
            const companies = [
 
                ...KNOWN_COMPANIES,
 
                ...extraCompanies
 
            ];
 
            companySelect.innerHTML =
 
            `
 
            <option value="all">
                ทั้งหมด
            </option>
 
            `
 
            +
            companies.map(c=>`
 
                <option value="${c}">
                    ${c}
                </option>
 
            `).join("");
 
 
            companySelect.value =
 
                companies.includes(prevCompany)
 
                ? prevCompany
 
                : "all";

            /* เพิ่มใหม่: สร้างตัวเลือกรายชื่อพนักงาน (requestName) จากข้อมูลจริงแบบ Real-time
               เป็นตัวเลือกเสริม ค่าเริ่มต้น "ทั้งหมด" */
            const employeesFromData = [

                ...new Set(
                    allData
                    .map(item=>item.requestName)
                    .filter(e=>e)
                )

            ];

            employeeSelect.innerHTML =

            `

            <option value="all">
                ทั้งหมด
            </option>

            `

            +
            employeesFromData.map(e=>`

                <option value="${e}">
                    ${e}
                </option>

            `).join("");

            employeeSelect.value =

                employeesFromData.includes(prevEmployee)

                ? prevEmployee

                : "all";
 
            populateYearOptions();
 
            populateMonthOptions();
 
companySelect.onchange = function(){

    renderTable();
};
 
 
yearSelect.onchange = function(){

};
 
 
monthSelect.onchange = function(){

        }
 
 
 
/* =========================
   ปี
========================= */
 
 
function populateYearOptions(){
 
 
 
    const yearSelect =
        document.getElementById("filterYear");
 
 
 
    const prevYear =
        yearSelect.value || "all";
 
 
 
 
    const YEAR_START = 2569;
 
    const YEAR_END = 2575;
 
 
 
 
    let years = [];
 
 
 
    for(
        let y = YEAR_START;
        y <= YEAR_END;
        y++
    ){
 
        years.push(String(y));
 
    }
 
 
 
 
 
    yearSelect.innerHTML =
 
 
    `
 
    <option value="all">
        ทั้งหมด
    </option>
 
 
    `
 
    +
 
    years.map(y=>`
 
        <option value="${y}">
            ${y}
        </option>
 
    `).join("");
 
 
 
 
 
    yearSelect.value =
        years.includes(prevYear)
        ? prevYear
        : "all";
 
}
 
 
 
        /* =========================
        เดือน
        ========================= */
        function populateMonthOptions(){
 
            const monthSelect =
                document.getElementById("filterMonth");
 
            const prevMonth =
                monthSelect.value || "all";
 
 
            let options = [`<option value="all"> ทั้งหมด </option>` ];
 
 
            for(
                let m = 1;
                m <= 12;
                m++
            ){
 
                let key =
                    String(m).padStart(2,"0");
 
                options.push(`
 
                <option value="${key}">
                    ${THAI_MONTHS[m-1]}
                </option>
 
                `);
 
            }
 
 
            monthSelect.innerHTML =
                options.join("");
 
 
            monthSelect.value =
 
                prevMonth;
 
 
        }
 
 
            /* =========================
   กรองข้อมูลสำหรับตาราง
   (เพิ่มใหม่: เรียงตามลำดับการบันทึกจริงก่อน (เก่า->ใหม่) แล้วค่อยกรอง
   เพื่อให้ข้อมูลใหม่อยู่ล่างสุดเสมอ ไม่ว่าจะกรองเงื่อนไขใด)
========================= */
 
function getFilteredData(){
 
 
    const selectedCompany =
    document.getElementById("filterCompany").value;
 
 
    const selectedYear =
    document.getElementById("filterYear").value;
 
 
    const selectedMonth =
    document.getElementById("filterMonth").value;

    const selectedEmployee =
    document.getElementById("filterEmployee").value;

    const selectedType =
    document.getElementById("filterType").value;
 
 
    const sorted = [...allData].sort(
        (a,b)=> getSortMillis(a) - getSortMillis(b)
    );
 
    return sorted.filter(item=>{
 
 
        const companyOK =
        selectedCompany === "all"
        ||
        item.company === selectedCompany;
 
 
 
        const parsed =
        parseCreateDate(item.createDate);
 
 
 
        const yearOK =
        selectedYear === "all"
        ||
        parsed.year === selectedYear;
 
 
 
        const monthOK =
        selectedMonth === "all"
        ||
        parsed.month === selectedMonth;

        const employeeOK =
        selectedEmployee === "all"
        ||
        item.requestName === selectedEmployee;

        const typeOK =
        selectedType === "all"
        ||
        item.type === selectedType;
 
 
 
        return companyOK && yearOK && monthOK && employeeOK && typeOK;
 
 
    });
 
 
}
 
        /* =========================
        สรุปยอดรวม
        ========================= */
 
 
        function updateSummary(){
 
            const filtered = getFilteredData();
 
 
            const selectedCompany =
 
                document.getElementById(
                    "filterCompany"
                ).value;
 
 
 
            const selectedYear =
 
                document.getElementById(
                    "filterYear"
                ).value;
 
 
 
 
            const selectedMonth =
 
                document.getElementById(
                    "filterMonth"
                ).value;

            const selectedEmployee =

                document.getElementById(
                    "filterEmployee"
                ).value;

            const selectedType =

                document.getElementById(
                    "filterType"
                ).value;
 
 
 
 
 
 
            const total = filtered.reduce(
 
                (sum,item)=>
 
                sum + Number(item.total || 0),
 
                0
 
            );
 
 
 
 
 
 
            const companyLabel =
 
            selectedCompany === "all"
 
            ? "ทุกบริษัท"
 
            : selectedCompany;
 
 
 
 
            const yearLabel =
 
            selectedYear === "all"
 
            ? "ทุกปี"
 
            : "ปี " + selectedYear;
 
            const monthLabel =
 
            selectedMonth === "all"
 
            ?
 
            "ทุกเดือน"
 
            :
 
            THAI_MONTHS[
                parseInt(selectedMonth,10)-1
            ];

            const employeeLabel =

            selectedEmployee === "all"

            ?

            "ทุกพนักงาน"

            :

            selectedEmployee;

            const typeLabel =

            selectedType === "all"

            ? "ทุกประเภท"

            : selectedType === "car"

            ? "ประกันรถยนต์"

            : "ประกันสินค้า";
 
 
            document.getElementById(
                "summaryTotal"
            ).innerText =
 
            `💰 ยอดรวม (${companyLabel} · ${yearLabel} · ${monthLabel} · ${employeeLabel} · ${typeLabel}): ${total.toLocaleString()} บาท (${filtered.length} รายการ)`;
 
        }
 
 
        
/* =========================
   เริ่มทำงาน
========================= */
 
 
/* ฟังข้อมูลจาก Firestore แบบ realtime
   เมื่อมีใครเพิ่ม/แก้ไข/ลบข้อมูล จากเครื่องไหนก็ตาม ตารางนี้จะอัปเดตอัตโนมัติ
   เปิดหน้าแล้วแสดงข้อมูลทั้งหมดทันที (ตัวกรองทั้งหมด default = "ทั้งหมด") */
onSnapshot(collection(db, "insuranceData"), (snapshot) => {
 
    allData = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));
 
    renderTable();
    updateSummary();
 
});
 
 
 
 
/* =========================
   ลบข้อมูล
========================= */
 
 
async function deleteItem(id){
 
    if(!confirm("ลบข้อมูล?"))
        return;
 
    // ลบที่ Firestore โดยตรง — onSnapshot ด้านบนจะอัปเดตตารางให้อัตโนมัติทุกเครื่องที่เปิดหน้านี้อยู่
    await deleteDoc(doc(db, "insuranceData", id));
 
}
 
 
 
 
 
 
 
/* =========================
   แก้ไขข้อมูล
========================= */
 
 
function editItem(id){
 
    const item = allData.find(x => x.id === id);
 
    if(!item){
        alert("ไม่พบข้อมูล");
        return;
    }
 
    // ส่งข้อมูลชั่วคราวไปให้หน้าฟอร์มเติมค่าในช่องกรอก (id ที่แนบไปคือ Firestore document id)
    localStorage.setItem(
        "editData",
        JSON.stringify(item)
    );
 
    if(item.type === "product"){
 
        location.href =
            "form_product.html";
 
    }
 
    else{
 
        location.href =
            "form_car.html";
 
    }
 
}
 
 
 
 
 
 
 
 
/* =========================
   เปิดเอกสาร
========================= */
 
 
function openDoc(id){
 
    const item = allData.find(x => x.id === id);
 
    if(!item){
        alert("ไม่พบข้อมูล");
        return;
    }
 
    // ข้อมูลชั่วคราวสำหรับเปิดเอกสาร PDF เท่านั้น ไม่ใช่แหล่งข้อมูลหลัก
    localStorage.setItem(
        "pdfData",
        JSON.stringify(item)
    );
 
    location.href =
        "contract_print.html";
 
}
 
/* =========================
   SIDEBAR MENU
========================= */
 
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
 
 
/* =========================
   เปิดให้ onclick="" ในตาราง (inline HTML) เรียกใช้ได้
   จำเป็นเพราะ <script type="module"> ไม่ผูกฟังก์ชันเข้า window ให้อัตโนมัติ
========================= */
window.editItem = editItem;
window.openDoc = openDoc;
window.deleteItem = deleteItem;
 
if(menuBtn && sidebar && overlay){
 
    menuBtn.addEventListener("click",()=>{
 
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
 
    });
 
 
    overlay.addEventListener("click",()=>{
 
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
 
    });
 
}
 
 
 
</script>
 
 
 
</body>
 
</html>
