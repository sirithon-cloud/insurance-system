<!DOCTYPE html>
<html lang="th">
    <head>
 
    <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
            <title>รายงานข้อมูลประกัน</title>
 
            <link rel="stylesheet" href="style.css">
 
            <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
 
        <style>
            /* =========================
            REPORT PAGE
            ========================= */
            .report-card{
                    width:100%;
                    min-height:100vh;
                    margin:0;
 
                    display:flex;
                    flex-direction:column;
 
                    background:#fff;
 
                    padding:20px;
                    padding-top:90px;
 
                    overflow-x:auto;
                }
 
            .report-card h1{
    width:100%;
    text-align:center;
    color:#002d72;
}
            
            /* ========================
            TABLE
            ========================= */
 
            table{
                width:100%;
                border-collapse:collapse;
                font-size:12px;
            }
 
 
            th{
                background:#2c3e50;
                color:#fff;

            /* =========================
            ACTION BUTTON

                display:flex;

            .action-buttons button{

            }

                background:#dc3545;
                color:white;
            }
 
            .action-buttons button:hover{
                transform:scale(1.1);
 
            }
 
            /* =========================
            SUMMARY PANEL
            ========================= */
            .summary-panel{
                background:#f8f9fb;
                border:1px solid #e3e6ec;
                border-radius:12px;
                padding:16px 18px;
                margin-bottom:20px;
            }
 
 
            .summary-filters{
                display:flex;
                gap:15px;
                flex-wrap:wrap;
                align-items:center;
                margin-bottom:12px;
            }
 
            .summary-filters label{
                font-size:13px;
                color:#002d72;
                font-weight:bold;
                margin-right:6px;
            }
 
            .summary-filters select{
                padding:6px 10px;
                border-radius:8px;
                border:1px solid #cfd6e2;
                font-family:"Kanit",sans-serif;
                font-size:13px;
            }
 
            .summary-total{
                font-size:17px;
                font-weight:bold;
                color:#002d72;
            }
 
            
 
 
        </style>
 
    </head>
 
 
    <body>
        <!-- TOPBAR -->
        <div class="topbar">
            <button id="menuBtn">☰</button>
            <img src="logo.png" class="toplogo" alt="logo">
            <span class="apptitle">
                ระบบประกันรถยนต์กับคุณพลอย
            </span>
        </div>
 
                  <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <img src="logo.png" class="logo">
 
        <ul class="menu">
            <li><a href="index.html" class="menu-link">🏠 หน้าหลัก</a></li>
 
        </ul>
    </aside>
 
<!-- OVERLAY -->
<div id="overlay"></div>
 
 
 
        <div class="report-card">
 
        <h1>
        📊 รายงานข้อมูลประกันทั้งหมด
        </h1>
 
 
        <div class="summary-panel">
            <div class="summary-filters">
                <span>
                    <label for="filterCompany">
                        🏢 เลือกบริษัท
                    </label>
                    <select id="filterCompany"></select>
                </span>
 
 
                <span>
                    <label for="filterYear">
                        🗓️ เลือกปี
                    </label>
                    <select id="filterYear"></select>
                </span>
 
 
 
 
                <span>
 
                    <label for="filterMonth">
                        📅 เลือกเดือน
                    </label>
                    <select id="filterMonth"></select>
 
                </span>
 
            </div>
 
            <div id="summaryTotal" class="summary-total"></div>
 
        </div>
 
 
 
 
 
<table id="table">
 
        <thead>
        <tr>
        <th>ลำดับ</th>
        <th>ชื่อผู้แจ้ง</th>
        <th>วันที่แจ้งงาน</th>
        <th>บริษัท</th>
        <th>ประเภทประกัน</th>
        <th>ชื่อผู้เอาประกัน</th>
        <th>เบอร์โทร</th>
        <th>ที่อยู่</th>
        <th>ยี่ห้อ</th>
        <th>ทะเบียน</th>
        <th>วันเริ่ม</th>
        <th>วันสิ้นสุด</th>
        <th>ทุนประกัน</th>
        <th>รวม</th>
        <th>กลุ่มสินค้า</th>
        <th>งวด1</th>
        <th>งวด2</th>
        <th>งวด3</th>
        <th>งวด4</th>
        <th>ยอดค้าง</th>
        <th>จัดการ</th>
        </tr>
 
        </thead>
 
 
 
<tbody></tbody>
</table>
</div>
<script type="module">
 
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
 
/* =========================
   FIREBASE
   (ตั้งค่าเดียวกับ script.js เพื่อให้ทุกหน้าอ่าน/เขียน collection "insuranceData" เดียวกัน)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCNpaYlwrkJhBA-8tAax022PWWFYMRz7Kw",
  authDomain: "insurance-system-f26b0.firebaseapp.com",
  projectId: "insurance-system-f26b0",
  storageBucket: "insurance-system-f26b0.firebasestorage.app",
  messagingSenderId: "438698153100",
  appId: "1:438698153100:web:a553b97b59701883f057a9",
  measurementId: "G-XXWCQEMT0B"
};
 
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
 
/* =========================
   STORAGE
   (allData ตอนนี้มาจาก Firestore แบบ realtime ผ่าน onSnapshot ด้านล่าง ไม่ใช้ localStorage แล้ว)
========================= */
 
        let allData = [];
 
 
 
        /* =========================
        THAI MONTH
        ========================= */
 
 
        const THAI_MONTHS = [
 
            "มกราคม",
            "กุมภาพันธ์",
            "มีนาคม",
            "เมษายน",
            "พฤษภาคม",
            "มิถุนายน",
            "กรกฎาคม",
            "สิงหาคม",
            "กันยายน",
            "ตุลาคม",
            "พฤศจิกายน",
            "ธันวาคม"
 
        ];
 
 
 
 
 
        /* =========================
        แปลงวันที่แจ้งงาน
        ========================= */
 
 
        function parseCreateDate(createDate){
            if(!createDate)
                return {
                    month:null,
                    year:null
                };
 
 
            const parts = createDate.split("/");
 
            if(parts.length !== 3)
                return {
                    month:null,
                    year:null
                };
 
            const month = parseInt(parts[1],10);
            const year = parts[2];
 
            if(
                isNaN(month) ||
                month < 1 ||
                month > 12
            ){
 
                return {
                    month:null,
                    year:null
                };
            }
 
            return {
                month:String(month).padStart(2,"0"),
                year:year
            };
 
 
        }
 
        /* =========================
        แสดงข้อมูลตาราง
        ========================= */
 
        function renderTable(){
 
            // allData มาจาก Firestore แบบ realtime (onSnapshot) ไม่อ่านจาก localStorage แล้ว
            let tbody = document.querySelector("tbody");
 
            tbody.innerHTML = "";
 
 
            getFilteredData().forEach((item,i)=>{
 
 
                tbody.innerHTML += `
 
        <tr>
 
        <td>${i+1}</td>
        <td>${item.requestName || "-"}</td>
        <td>${item.createDate || "-"}</td>
        <td>${item.company || "-"}</td>
 
        <td>
 
        ${
            item.type === "car"
 
            ? "🚗 ประกันรถยนต์"
 
            : item.type === "product"
 
            ? "📦 ประกันสินค้า"
 
            : "-"
 
        }
 
        </td>
 
        <td>${item.customer || "-"}</td>
        <td>${item.phone || "-"}</td>
        <td>${item.address || "-"}</td>
        <td>${item.brand || "-"}</td>
        <td>${item.plate || "-"}</td>
        <td>${item.start || "-"}</td>
        <td>${item.end || "-"}</td>
 
        <td>
 
        ${Number(item.sumInsured || 0).toLocaleString()}
 
        </td>
 
        <td>
 
        ${Number(item.total || 0).toLocaleString()}
 
        </td>
        <td>${item.group || "-"}</td>
        <td>${item.installment1 || "-"}</td>
        <td>${item.installment2 || "-"}</td>
        <td>${item.installment3 || "-"}</td>
        <td>${item.installment4 || "-"}</td>
 
        <td>
        ${
        (
        Number(item.total || 0) -
        (
        Number(item.installment1 || 0) +
        Number(item.installment2 || 0) +
        Number(item.installment3 || 0) +
        Number(item.installment4 || 0)
        )
        ).toLocaleString()
        }
        </td>
 
 
<td class="action-buttons">
 
 
        <button 
        class="edit-btn"
        onclick="editItem('${item.id}')">
        ✏️
        </button>
 
 
        <button 
        class="doc-btn"
        onclick="openDoc('${item.id}')">
        📄
        </button>
 
 
        <button 
        class="delete-btn"
        onclick="deleteItem('${item.id}')">
        🗑️
        </button>
 
        </td>
 
        </tr>
 
        `;
 
            });
 
            populateFilters();
 
        }
 
        /* =========================
        รายชื่อบริษัท
        ========================= */
 
        const KNOWN_COMPANIES = [
 
            "วิริยะ",
            "เมืองไทย",
            "AIG"
 
        ];
 
 
        /* =========================
        สร้างตัวเลือก Filter
        ========================= */
 
 
        function populateFilters(){
 
            const companySelect =
                document.getElementById("filterCompany");
 
            const yearSelect =
                document.getElementById("filterYear");
 
            const monthSelect =
                document.getElementById("filterMonth");
 
            const prevCompany =
                companySelect.value || "all";
 
            const companiesFromData = [
 
                ...new Set(
                    allData
                    .map(item=>item.company)
                    .filter(c=>c)
                )
 
            ];
 
 
            const extraCompanies =
                companiesFromData.filter(
                    c => !KNOWN_COMPANIES.includes(c)
                );
 
            const companies = [
 
                ...KNOWN_COMPANIES,
 
                ...extraCompanies
 
            ];
 
            companySelect.innerHTML =
 
            `
 
            <option value="all">
                ทั้งหมด
            </option>
 
            `
 
            +
            companies.map(c=>`
 
                <option value="${c}">
                    ${c}
                </option>
 
            `).join("");
 
 
            companySelect.value =
 
                companies.includes(prevCompany)
 
                ? prevCompany
 
                : "all";
 
            populateYearOptions();
 
            populateMonthOptions();
 
companySelect.onchange = function(){
    updateSummary();
    renderTable();
};
 
 
yearSelect.onchange = function(){
    updateSummary();
    renderTable();
};
 
 
monthSelect.onchange = function(){
    updateSummary();
    renderTable();
};
 
 
        }
 
 
 
/* =========================
   ปี
========================= */
 
 
function populateYearOptions(){
 
 
 
    const yearSelect =
        document.getElementById("filterYear");
 
 
 
    const prevYear =
        yearSelect.value || "all";
 
 
 
 
    const YEAR_START = 2569;
 
    const YEAR_END = 2575;
 
 
 
 
    let years = [];
 
 
 
    for(
        let y = YEAR_START;
        y <= YEAR_END;
        y++
    ){
 
        years.push(String(y));
 
    }
 
 
 
 
 
    yearSelect.innerHTML =
 
 
    `
 
    <option value="all">
        ทั้งหมด
    </option>
 
 
    `
 
    +
 
    years.map(y=>`
 
        <option value="${y}">
            ${y}
        </option>
 
    `).join("");
 
 
 
 
 
    yearSelect.value =
        years.includes(prevYear)
        ? prevYear
        : "all";
 
}
 
 
 
        /* =========================
        เดือน
        ========================= */
        function populateMonthOptions(){
 
            const monthSelect =
                document.getElementById("filterMonth");
 
            const prevMonth =
                monthSelect.value || "all";
 
 
            let options = [`<option value="all"> ทั้งหมด </option>` ];
 
 
            for(
                let m = 1;
                m <= 12;
                m++
            ){
 
                let key =
                    String(m).padStart(2,"0");
 
                options.push(`
 
                <option value="${key}">
                    ${THAI_MONTHS[m-1]}
                </option>
 
                `);
 
            }
 
 
            monthSelect.innerHTML =
                options.join("");
 
 
            monthSelect.value =
 
                prevMonth;
 
 
        }
 
 
            /* =========================
   กรองข้อมูลสำหรับตาราง
========================= */
 
function getFilteredData(){
 
 
    const selectedCompany =
    document.getElementById("filterCompany").value;
 
 
    const selectedYear =
    document.getElementById("filterYear").value;
 
 
    const selectedMonth =
    document.getElementById("filterMonth").value;
 
 
 
    return allData.filter(item=>{
 
 
        const companyOK =
        selectedCompany === "all"
        ||
        item.company === selectedCompany;
 
 
 
        const parsed =
        parseCreateDate(item.createDate);
 
 
 
        const yearOK =
        selectedYear === "all"
        ||
        parsed.year === selectedYear;
 
 
 
        const monthOK =
        selectedMonth === "all"
        ||
        parsed.month === selectedMonth;
 
 
 
        return companyOK && yearOK && monthOK;
 
 
    });
 
 
}
 
        /* =========================
        สรุปยอดรวม
        ========================= */
 
 
        function updateSummary(){
 
 
 
            const selectedCompany =
 
                document.getElementById(
                    "filterCompany"
                ).value;
 
 
 
            const selectedYear =
 
                document.getElementById(
                    "filterYear"
                ).value;
 
 
 
 
            const selectedMonth =
 
                document.getElementById(
                    "filterMonth"
                ).value;
 
 
 
 
 
 
            const filtered = allData.filter(item=>{
 
 
 
                const companyOK =
 
                selectedCompany === "all"
 
                ||
 
                (item.company || "ไม่ระบุบริษัท")
                === selectedCompany;
 
 
 
 
 
                const parsed =
                    parseCreateDate(
                        item.createDate
                    );
 
 
 
 
 
                const yearOK =
 
                selectedYear === "all"
 
                ||
 
                parsed.year === selectedYear;
 
 
 
 
 
                const monthOK =
 
                selectedMonth === "all"
 
                ||
 
                parsed.month === selectedMonth;
 
 
 
 
 
 
                return (
 
                    companyOK
 
                    &&
 
                    yearOK
 
                    &&
 
                    monthOK
 
                );
 
 
 
            });
 
 
 
 
 
 
 
            const total = filtered.reduce(
 
                (sum,item)=>
 
                sum + Number(item.total || 0),
 
                0
 
            );
 
 
 
 
 
 
            const companyLabel =
 
            selectedCompany === "all"
 
            ? "ทุกบริษัท"
 
            : selectedCompany;
 
 
 
 
            const yearLabel =
 
            selectedYear === "all"
 
            ? "ทุกปี"
 
            : "ปี " + selectedYear;
 
            const monthLabel =
 
            selectedMonth === "all"
 
            ?
 
            "ทุกเดือน"
 
            :
 
            THAI_MONTHS[
                parseInt(selectedMonth,10)-1
            ];
 
 
            document.getElementById(
                "summaryTotal"
            ).innerText =
 
            `💰 ยอดรวม (${companyLabel} · ${yearLabel} · ${monthLabel}): ${total.toLocaleString()} บาท`;
 
        }
 
 
        
/* =========================
   เริ่มทำงาน
========================= */
 
 
/* ฟังข้อมูลจาก Firestore แบบ realtime
   เมื่อมีใครเพิ่ม/แก้ไข/ลบข้อมูล จากเครื่องไหนก็ตาม ตารางนี้จะอัปเดตอัตโนมัติ */
onSnapshot(collection(db, "insuranceData"), (snapshot) => {
 
    allData = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));
 
    renderTable();
    updateSummary();
 
});
 
 
 
 
/* =========================
   ลบข้อมูล
========================= */
 
 
async function deleteItem(id){
 
    if(!confirm("ลบข้อมูล?"))
        return;
 
    // ลบที่ Firestore โดยตรง — onSnapshot ด้านบนจะอัปเดตตารางให้อัตโนมัติทุกเครื่องที่เปิดหน้านี้อยู่
    await deleteDoc(doc(db, "insuranceData", id));
 
}
 
 
 
 
 
 
 
/* =========================
   แก้ไขข้อมูล
========================= */
 
 
function editItem(id){
 
    const item = allData.find(x => x.id === id);
 
    if(!item){
        alert("ไม่พบข้อมูล");
        return;
    }
 
    // ส่งข้อมูลชั่วคราวไปให้หน้าฟอร์มเติมค่าในช่องกรอก (id ที่แนบไปคือ Firestore document id)
    localStorage.setItem(
        "editData",
        JSON.stringify(item)
    );
 
    if(item.type === "product"){
 
        location.href =
            "form_product.html";
 
    }
 
    else{
 
        location.href =
            "form_car.html";
 
    }
 
}
 
 
 
 
 
 
 
 
/* =========================
   เปิดเอกสาร
========================= */
 
 
function openDoc(id){
 
    const item = allData.find(x => x.id === id);
 
    if(!item){
        alert("ไม่พบข้อมูล");
        return;
    }
 
    // ข้อมูลชั่วคราวสำหรับเปิดเอกสาร PDF เท่านั้น ไม่ใช่แหล่งข้อมูลหลัก
    localStorage.setItem(
        "pdfData",
        JSON.stringify(item)
    );
 
    location.href =
        "contract_print.html";
 
}
 
/* =========================
   SIDEBAR MENU
========================= */
 
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
 
 
/* =========================
   เปิดให้ onclick="" ในตาราง (inline HTML) เรียกใช้ได้
   จำเป็นเพราะ <script type="module"> ไม่ผูกฟังก์ชันเข้า window ให้อัตโนมัติ
========================= */
window.editItem = editItem;
window.openDoc = openDoc;
window.deleteItem = deleteItem;
 
if(menuBtn && sidebar && overlay){
 
    menuBtn.addEventListener("click",()=>{
 
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
 
    });
 
 
    overlay.addEventListener("click",()=>{
 
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
 
    });
 
}
 
 
 
</script>
 
 
 
</body>
 
</html>
