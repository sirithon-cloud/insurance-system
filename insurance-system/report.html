<script type="module">

/* =========================
   FIREBASE
   (ตั้งค่าเดียวกับ script.js เพื่อให้ทุกหน้าอ่าน/เขียน collection "insuranceData" เดียวกัน)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCNpaYlwrkJhBA-8tAax022PWWFYMRz7Kw",
  authDomain: "insurance-system-f26b0.firebaseapp.com",
  projectId: "insurance-system-f26b0",
  storageBucket: "insurance-system-f26b0.firebasestorage.app",
  messagingSenderId: "438698153100",
  appId: "1:438698153100:web:a553b97b59701883f057a9",
  measurementId: "G-XXWCQEMT0B"
};
 
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   [เพิ่มใหม่] ตั้งค่าลด Firestore Reads
   - LOGIN_NAME_STORAGE_KEY: คีย์ localStorage ที่ระบบ login เก็บ "ชื่อพนักงานที่ล็อกอินอยู่"
     *** สำคัญ: ถ้าระบบ login จริงของคุณเก็บชื่อผู้ใช้ไว้คนละคีย์ ให้แก้ค่านี้ให้ตรงกับของจริง ***
   - EMPLOYEE_CACHE_KEY: ใช้เก็บ cache รายชื่อพนักงานที่เคย query เจอไว้ใน localStorage
     เพื่อสร้าง dropdown "เลือกพนักงาน" โดยไม่ต้องโหลดข้อมูลทั้งหมดของ Firestore มาหาเอง
========================= */
const LOGIN_NAME_STORAGE_KEY = "employeeName";
const EMPLOYEE_CACHE_KEY = "report_known_employees_v1";

function getLoggedInEmployeeName(){
    try{
        return localStorage.getItem(LOGIN_NAME_STORAGE_KEY) || "";
    }catch(e){
        return "";
    }
}

function loadKnownEmployees(){
    try{
        const raw = localStorage.getItem(EMPLOYEE_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
    }catch(e){
        return [];
    }
}

function saveKnownEmployees(list){
    try{
        localStorage.setItem(EMPLOYEE_CACHE_KEY, JSON.stringify(list));
    }catch(e){
        /* localStorage ใช้งานไม่ได้ ข้ามไป ไม่กระทบการทำงานหลัก */
    }
}

/* สะสมรายชื่อพนักงานที่เจอจากผลลัพธ์ query แต่ละครั้งไว้ใน localStorage
   เพื่อให้ dropdown "เลือกพนักงาน" ค่อย ๆ ครบขึ้นเรื่อย ๆ โดยไม่ต้องอ่านทั้ง collection */
function addKnownEmployees(names){
    const set = new Set(loadKnownEmployees());
    let changed = false;
    (names || []).forEach(n=>{
        if(n && !set.has(n)){
            set.add(n);
            changed = true;
        }
    });
    const list = [...set];
    if(changed) saveKnownEmployees(list);
    return list;
}

/* ปีปัจจุบัน (พ.ศ.) และเดือนปัจจุบัน ใช้สำหรับตั้งค่า filter เริ่มต้นตอนเปิดหน้า */
function getCurrentBuddhistYear(){
    return String(new Date().getFullYear() + 543);
}

function getCurrentMonthKey(){
    return String(new Date().getMonth() + 1).padStart(2, "0");
}

const loggedInEmployee = getLoggedInEmployeeName();
if(loggedInEmployee){
    addKnownEmployees([loggedInEmployee]);
}

/* =========================
   STORAGE
   (allData มาจาก Firestore แบบ realtime ผ่าน onSnapshot ด้านล่าง
   [แก้ไข] เปลี่ยนจากการอ่านข้อมูลทั้ง collection มาเป็นการอ่านเฉพาะที่ตรงกับตัวกรอง
   ที่เลือกอยู่ผ่าน Firestore Query (where) เพื่อลดจำนวน Firestore Reads)
========================= */
 
        let allData = [];
        let filtersInitialized = false;
        let unsubscribeSnapshot = null;
 
 
 
        /* =========================
        THAI MONTH
        ========================= */
 
 
        const THAI_MONTHS = [
 
            "มกราคม",
            "กุมภาพันธ์",
            "มีนาคม",
            "เมษายน",
            "พฤษภาคม",
            "มิถุนายน",
            "กรกฎาคม",
            "สิงหาคม",
            "กันยายน",
            "ตุลาคม",
            "พฤศจิกายน",
            "ธันวาคม"
 
        ];

        /* เพิ่มใหม่: helper แปลงวันที่แจ้งงาน (createDate เช่น "16/07/2569") ที่ผู้ใช้กรอก/ระบบบันทึกไว้
           ให้เป็นตัวเลข millisecond โดยแปลงปี พ.ศ. -> ค.ศ. (-543) ใช้เป็นตัวเรียงสำรอง
           สำหรับข้อมูลที่ไม่มี createdAt (Firestore Timestamp) จะได้ไม่ต้องยุบรวมเป็น 0 ทั้งหมด */
        function parseCreateDateMillis(createDate){

            if(!createDate) return 0;

            const parts = createDate.split("/");

            if(parts.length !== 3) return 0;

            const day = Number(parts[0]);
            const month = Number(parts[1]);
            const year = Number(parts[2]);

            if(isNaN(day) || isNaN(month) || isNaN(year)) return 0;

            const gregorianYear = year - 543;

            const d = new Date(gregorianYear, month - 1, day);

            return isNaN(d.getTime()) ? 0 : d.getTime();

        }

        /* เพิ่มใหม่: helper แปลง createdAt (Firestore Timestamp) เป็นตัวเลข millisecond
           เพื่อเรียงข้อมูลตามลำดับการบันทึกจริง (เก่า -> ใหม่ อยู่ล่างสุด) และคงลำดับ
           เดิมทุกครั้งที่รีเฟรชหน้า
           แก้ไข: เดิมข้อมูลที่ไม่มี field นี้จะได้ 0 ทั้งหมด (กองรวมกันไม่มีลำดับที่แน่นอน)
           เปลี่ยนเป็น fallback ไปใช้วันที่กรอก (createDate) แทน เพื่อให้เรียงตามวันเวลาที่กรอกจริงเสมอ */
        function getSortMillis(item){
            if(item && item.createdAt && typeof item.createdAt.toMillis === "function"){
                return item.createdAt.toMillis();
            }
            return parseCreateDateMillis(item && item.createDate);
        }
 
 
 
        /* =========================
        แปลงวันที่แจ้งงาน
        ========================= */
 
 
        function parseCreateDate(createDate){
            if(!createDate)
                return {
                    month:null,
                    year:null
                };
 
 
            const parts = createDate.split("/");
 
            if(parts.length !== 3)
                return {
                    month:null,
                    year:null
                };
 
            const month = parseInt(parts[1],10);
            const year = parts[2];
 
            if(
                isNaN(month) ||
                month < 1 ||
                month > 12
            ){
 
                return {
                    month:null,
                    year:null
                };
            }
 
            return {
                month:String(month).padStart(2,"0"),
                year:year
            };
 
 
        }
 
        /* =========================
        แสดงข้อมูลตาราง
        ========================= */
 
        function renderTable(){
 
            // แก้บั๊ก: เดิม populateFilters() ถูกเรียก "หลัง" กรองข้อมูล ทำให้รอบแรกที่เปิดหน้า
            // <select> ตัวกรองยังไม่มี <option> ค่า .value จึงเป็นค่าว่าง (ไม่ใช่ "all")
            // ส่งผลให้ getFilteredData() กรองข้อมูลหายไปหมดตั้งแต่รอบแรก (ตารางว่างจนกว่าจะเลือกตัวกรอง)
            // แก้โดยเรียก populateFilters() ก่อน เพื่อให้ทุกตัวกรองพร้อมค่า "all" ก่อนกรอง/แสดงข้อมูลเสมอ
            populateFilters();
 
            // allData มาจาก Firestore แบบ realtime (onSnapshot) ไม่อ่านจาก localStorage แล้ว
            let tbody = document.querySelector("tbody");
 
            tbody.innerHTML = "";
 
 
            getFilteredData().forEach((item,i)=>{
 
 
                tbody.innerHTML += `

        <tr>

        <!-- แก้ไข: ย้ายปุ่มจัดการมาไว้คอลัมน์แรกของแถว เพื่อให้กดง่ายขึ้น -->
        <td class="action-buttons">


        <button 
        class="edit-btn"
        onclick="editItem('${item.id}')">
        ✏️
        </button>

        onclick="openDoc('${item.id}')">

        </button>


        <button 
        class="delete-btn"
        onclick="deleteItem('${item.id}')">
        🗑️
        </button>

        </td>

        <td>${i+1}</td>
        <td>${item.requestName || "-"}</td>
        <!-- เพิ่มใหม่: แสดงผู้แจ้งงานจาก field employeeName (ระบบ login ใหม่)
             รายการเก่าที่ยังไม่มี field นี้ จะ fallback ไปใช้ requestName แทน ไม่ error -->
        <td>${item.employeeName || item.requestName || "-"}</td>
        <td>${item.createDate || "-"}</td>
        <td>${item.company || "-"}</td>
 
        <td>
 
        ${
            item.type === "car"
 
            ? "🚗 ประกันรถยนต์"
 
            : item.type === "product"
 
            ? "📦 ประกันสินค้า"
 
            : "-"
 
        }
 
        </td>
 
        <td>${item.customer || "-"}</td>
        <td>${item.phone || "-"}</td>
        <td>${item.address || "-"}</td>
        <td>${item.brand || "-"}</td>
        <td>${item.plate || "-"}</td>
        <td>${item.start || "-"}</td>
        <td>${item.end || "-"}</td>
 
        <td>
 
        ${Number(item.sumInsured || 0).toLocaleString()}
 
        </td>
 
        <td>
 
        ${Number(item.total || 0).toLocaleString()}
 
        </td>
        <td>${item.group || "-"}</td>
        <td>${item.installment1 || "-"}</td>
        <td>${item.installment2 || "-"}</td>
        <td>${item.installment3 || "-"}</td>
        <td>${item.installment4 || "-"}</td>
 
        <td>
        ${
        (
        Number(item.total || 0) -
        (
        Number(item.installment1 || 0) +
        Number(item.installment2 || 0) +
        Number(item.installment3 || 0) +
        Number(item.installment4 || 0)
        )
        ).toLocaleString()
        }
        </td>

        </tr>

        `;
 
            });
 
        }
 
        /* =========================
        รายชื่อบริษัท
        ========================= */
 
        const KNOWN_COMPANIES = [
 
            "วิริยะ",
            "เมืองไทย",
            "AIG"
 
        ];
 
 
        /* =========================
        สร้างตัวเลือก Filter
        ========================= */
 
 
        function populateFilters(){
 
            const companySelect =
                document.getElementById("filterCompany");
 
            const yearSelect =
                document.getElementById("filterYear");
 
            const monthSelect =
                document.getElementById("filterMonth");

            const employeeSelect =
                document.getElementById("filterEmployee");
 
            const prevCompany =
                companySelect.value || "all";

                employeeSelect.value || "all";
 
            const companiesFromData = [
 
                ...new Set(

                )
 
            ];
 
 
            const extraCompanies =
                companiesFromData.filter(
                    c => !KNOWN_COMPANIES.includes(c)

            const companies = [
 
                ...KNOWN_COMPANIES,
 
                ...extraCompanies
 
            ];
 
            companySelect.innerHTML =
 
            `
 
            <option value="all">
                ทั้งหมด

            +
            companies.map(c=>`
 
                <option value="${c}">
                    ${c}
                </option>
 
            `).join("");
 
 
            companySelect.value =
 
                companies.includes(prevCompany)
 
                ? prevCompany
 
                : "all";

            /* เพิ่มใหม่: สร้างตัวเลือกรายชื่อพนักงาน (requestName) เป็นตัวเลือกเสริม ค่าเริ่มต้น "ทั้งหมด"
               [แก้ไข] เดิมดึงจาก allData ทั้งหมด (ต้องโหลดข้อมูลทั้ง collection ก่อนถึงจะรู้รายชื่อ)
               เปลี่ยนเป็นรวมจาก 3 แหล่ง: cache ที่เคย query เจอสะสมไว้ (localStorage)
               + ข้อมูลชุดที่ query ได้ในรอบปัจจุบัน + ชื่อผู้ล็อกอินปัจจุบัน
               เพื่อไม่ต้องอ่านข้อมูลทั้งหมดของ Firestore เพียงเพื่อสร้าง dropdown นี้ */
            const namesFromCurrentData = allData
                .map(item=>item.requestName)
                .filter(e=>e);

            const employeesFromData = addKnownEmployees([
                ...namesFromCurrentData,
                ...(loggedInEmployee ? [loggedInEmployee] : [])
            ]);

            employeeSelect.innerHTML =

            `

            <option value="all">
                ทั้งหมด
            </option>

            `

            +
            employeesFromData.map(e=>`

                <option value="${e}">
                    ${e}
                </option>

            `).join("");

            employeeSelect.value =

                employeesFromData.includes(prevEmployee)

                ? prevEmployee

                : "all";
 
            populateYearOptions();
 
            populateMonthOptions();

            /* [แก้ไข] ตั้งค่าตัวกรองเริ่มต้น "ครั้งแรกที่เปิดหน้า" เท่านั้น
               ตามที่ต้องการ: แสดงเฉพาะ "ชื่อผู้แจ้ง" กับ "เดือน" ขึ้นมาก่อน
               ส่วนบริษัทและปี ยังคงเป็น "ทั้งหมด" ตามค่าเริ่มต้นปกติ (ไม่ auto-select ปี)
               - เดือน = เดือนปัจจุบัน
               - ผู้แจ้งงาน = ผู้ใช้ที่ล็อกอินอยู่ (ถ้าระบบ login มีค่านี้)
               ใช้ flag filtersInitialized กันไม่ให้ค่าที่ผู้ใช้เลือกเองภายหลังถูก reset ทับ */
            if(!filtersInitialized){

                filtersInitialized = true;

                const currentMonth = getCurrentMonthKey();
                if([...monthSelect.options].some(o=>o.value === currentMonth)){
                    monthSelect.value = currentMonth;
                }

                if(
                    loggedInEmployee &&
                    [...employeeSelect.options].some(o=>o.value === loggedInEmployee)
                ){
                    employeeSelect.value = loggedInEmployee;
                }

            }

/* [แก้ไข] เดิมเมื่อเปลี่ยนตัวกรองจะแค่กรอง allData (ที่โหลดมาทั้งหมดแล้ว) ด้วย JS แล้ว render ใหม่
   เปลี่ยนเป็นเรียก subscribeToData() เพื่อสร้าง Firestore Query (where) ใหม่ตามตัวกรองล่าสุด
   แล้ว query ข้อมูลจาก Firestore เฉพาะส่วนที่ตรงเงื่อนไขเท่านั้น (ลด Reads ตามเงื่อนไขข้อ 3 และ 5) */

/* =========================

========================= */
 
 
function populateYearOptions(){
 
 
 
    const yearSelect =
        document.getElementById("filterYear");
 
 
 
    const prevYear =
        yearSelect.value || "all";
 
 
 
 
    const YEAR_START = 2569;
 
    const YEAR_END = 2575;
 
 
 
 
    let years = [];
 
 
 
    for(
        let y = YEAR_START;
        y <= YEAR_END;
        y++
    ){
 
        years.push(String(y));
 
    }
 
 
 
 
 
    yearSelect.innerHTML =
 
 
    `
 
    <option value="all">
        ทั้งหมด
    </option>
 
 
    `
 
    +
 
    years.map(y=>`
 
        <option value="${y}">
            ${y}
        </option>
 
    `).join("");
 
 
 
 
 
    yearSelect.value =
        years.includes(prevYear)
        ? prevYear
        : "all";
 
}
 
 
 
        /* =========================
        เดือน
        ========================= */
        function populateMonthOptions(){
 
            const monthSelect =
                document.getElementById("filterMonth");
 
            const prevMonth =
                monthSelect.value || "all";
 
 
            let options = [`<option value="all"> ทั้งหมด </option>` ];
 
 
            for(
                let m = 1;
                m <= 12;
                m++
            ){
 
                let key =
                    String(m).padStart(2,"0");
 
                options.push(`
 
                <option value="${key}">
                    ${THAI_MONTHS[m-1]}
                </option>
 
                `);
 
            }
 
 
            monthSelect.innerHTML =
                options.join("");
 
 
            monthSelect.value =
 
                prevMonth;
 
 
        }
 
 
            /* =========================
   กรองข้อมูลสำหรับตาราง
   (เพิ่มใหม่: เรียงตามลำดับการบันทึกจริงก่อน (เก่า->ใหม่) แล้วค่อยกรอง
   เพื่อให้ข้อมูลใหม่อยู่ล่างสุดเสมอ ไม่ว่าจะกรองเงื่อนไขใด)
========================= */
 
function getFilteredData(){
 
 
    const selectedCompany =
    document.getElementById("filterCompany").value;
 
 
    const selectedYear =
    document.getElementById("filterYear").value;
 
 
    const selectedMonth =
    document.getElementById("filterMonth").value;

    const selectedEmployee =
    document.getElementById("filterEmployee").value;

    const selectedType =
    document.getElementById("filterType").value;
 
 
    const sorted = [...allData].sort(
        (a,b)=> getSortMillis(a) - getSortMillis(b)
    );
 
    return sorted.filter(item=>{
 
 
        const companyOK =
        selectedCompany === "all"
        ||
        item.company === selectedCompany;
 
 
 
        const parsed =
        parseCreateDate(item.createDate);
 
 
 
        const yearOK =
        selectedYear === "all"
        ||
        parsed.year === selectedYear;
 
 
 
        const monthOK =
        selectedMonth === "all"
        ||
        parsed.month === selectedMonth;

        const employeeOK =
        selectedEmployee === "all"
        ||
        item.requestName === selectedEmployee;

        const typeOK =
        selectedType === "all"
        ||
        item.type === selectedType;
 
 
 
        return companyOK && yearOK && monthOK && employeeOK && typeOK;
 
 
    });
 
 
}

/* =========================
   [เพิ่มใหม่] สร้างช่วงวันที่ (createdAt) จากปี/เดือน พ.ศ. ที่เลือกอยู่
   ใช้สำหรับทำ Firestore range query บนฟิลด์ createdAt (Timestamp) เพื่อกรองข้อมูล
   ตั้งแต่ต้นทางที่ Firestore แทนการโหลดมาทั้งหมดแล้วกรองด้วย JavaScript

   หมายเหตุ: ถ้าเลือกปี = "ทั้งหมด" จะไม่ใส่ตัวกรองช่วงวันที่ในระดับ query เพราะ Firestore
   ไม่สามารถ range-query "เดือนเดียวกันแต่ทุกปี" ในคำสั่งเดียวได้อย่างมีประสิทธิภาพ
   กรณีนี้ (และกรณีเอกสารเก่าที่ไม่มีฟิลด์ createdAt) ระบบจะยังกรองซ้ำที่ฝั่ง client
   ด้วยฟังก์ชัน getFilteredData() ที่มีอยู่เดิม เพื่อไม่ให้ข้อมูลเดิมตกหล่น
========================= */
function buildDateRange(selectedYear, selectedMonth){

    if(selectedYear === "all"){
        return null;
    }

    const gregorianYear = Number(selectedYear) - 543;

    if(isNaN(gregorianYear)){
        return null;
    }

    if(selectedMonth === "all"){
        return {
            start: new Date(gregorianYear, 0, 1),
            end: new Date(gregorianYear + 1, 0, 1)
        };
    }

    const m = Number(selectedMonth);

    if(isNaN(m)){
        return null;
    }

    return {
        start: new Date(gregorianYear, m - 1, 1),
        end: new Date(gregorianYear, m, 1)
    };

}

/* =========================
   [เพิ่มใหม่] สร้าง Firestore Query ตามตัวกรอง (บริษัท/พนักงาน/ประเภท/ปี-เดือน) ที่เลือกอยู่ปัจจุบัน
   ใช้ where() ตั้งแต่ต้นทาง (เงื่อนไขข้อ 5) เพื่อให้ Firestore ส่งกลับมาเฉพาะเอกสารที่ตรงเงื่อนไข
   แทนที่จะอ่านทั้ง collection แล้วมากรองด้วย JavaScript (เงื่อนไขข้อ 4)
========================= */
function buildFirestoreQuery(){

    const selectedCompany = document.getElementById("filterCompany").value || "all";
    const selectedEmployee = document.getElementById("filterEmployee").value || "all";
    const selectedYear = document.getElementById("filterYear").value || "all";
    const selectedMonth = document.getElementById("filterMonth").value || "all";
    const selectedType = document.getElementById("filterType").value || "all";

    const base = collection(db, "insuranceData");
    const constraints = [];

    if(selectedCompany !== "all"){
        constraints.push(where("company", "==", selectedCompany));
    }

    /* ผู้แจ้งงาน: ใช้ฟิลด์ requestName ให้ตรงกับตัวกรอง "เลือกพนักงาน" เดิม
       *** ถ้าระบบ login จริงของคุณต้องการอิงจากฟิลด์ employeeName (ผู้แจ้งงานจาก Login) แทน
       ให้เปลี่ยน "requestName" ด้านล่างนี้เป็น "employeeName" ให้ตรงกับข้อมูลจริง *** */
    if(selectedEmployee !== "all"){
        constraints.push(where("requestName", "==", selectedEmployee));
    }

    if(selectedType !== "all"){
        constraints.push(where("type", "==", selectedType));
    }

    const range = buildDateRange(selectedYear, selectedMonth);

    if(range){
        constraints.push(where("createdAt", ">=", Timestamp.fromDate(range.start)));
        constraints.push(where("createdAt", "<", Timestamp.fromDate(range.end)));
    }

    return constraints.length ? query(base, ...constraints) : base;

}

/* =========================
   [เพิ่มใหม่] Subscribe ข้อมูลจาก Firestore ตาม Query ปัจจุบัน (realtime)
   ทุกครั้งที่ผู้ใช้เปลี่ยนตัวกรอง (พนักงาน/บริษัท/ปี/เดือน/ประเภท) ฟังก์ชันนี้จะถูกเรียกใหม่
   (เงื่อนไขข้อ 3) โดยจะยกเลิก listener เดิมก่อน แล้วค่อย query Firestore รอบใหม่ตามเงื่อนไขล่าสุด
========================= */
function subscribeToData(){

    if(unsubscribeSnapshot){
        unsubscribeSnapshot();
        unsubscribeSnapshot = null;
    }

    const q = buildFirestoreQuery();

    unsubscribeSnapshot = onSnapshot(q, (snapshot) => {

        allData = snapshot.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

        /* สะสมชื่อพนักงานที่เจอไว้ใช้สร้าง dropdown ในครั้งถัดไป โดยไม่ต้องโหลดข้อมูลทั้งหมด */
        addKnownEmployees(allData.map(item => item.requestName).filter(Boolean));

        renderTable();
        updateSummary();

    });

}

/* =========================
   เริ่มทำงาน
   [แก้ไข] เดิม subscribe อ่านข้อมูลทั้ง collection "insuranceData" ครั้งเดียว แล้วกรองทุกอย่างด้วย JS
   เปลี่ยนเป็น 2 ขั้นตอน:
   1) เรียก populateFilters() ก่อน เพื่อตั้งค่าตัวกรองเริ่มต้น
      (ผู้แจ้งงาน = ผู้ล็อกอิน, เดือน = ปัจจุบัน ส่วนบริษัท/ปี ยังคงเป็น "ทั้งหมด")
   2) เรียก subscribeToData() เพื่อ query Firestore เฉพาะข้อมูลที่ตรงกับตัวกรองเริ่มต้นนั้นทันที
      ตามเงื่อนไขข้อ 2
========================= */
populateFilters();
subscribeToData();

async function deleteItem(id){
 
    if(!confirm("ลบข้อมูล?"))
        return;
 
    // ลบที่ Firestore โดยตรง — onSnapshot ด้านบนจะอัปเดตตารางให้อัตโนมัติทุกเครื่องที่เปิดหน้านี้อยู่
    await deleteDoc(doc(db, "insuranceData", id));
 
}

function editItem(id){
 
    const item = allData.find(x => x.id === id);
 
    if(!item){
        alert("ไม่พบข้อมูล");
        return;
    }
 
    // ส่งข้อมูลชั่วคราวไปให้หน้าฟอร์มเติมค่าในช่องกรอก (id ที่แนบไปคือ Firestore document id)
    localStorage.setItem(
        "editData",
        JSON.stringify(item)
    );
 
    if(item.type === "product"){
 
        location.href =
            "form_product.html";
 
    }
 
    else{
 
        location.href =
            "form_car.html";
 
    }
 
}
