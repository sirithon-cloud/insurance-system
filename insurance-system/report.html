<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานข้อมูลประกัน</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:"Kanit",sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

.report-card{
    max-width:1400px;
    margin:auto;
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    overflow-x:auto;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}

th{
    background:#2c3e50;
    color:#fff;
    padding:8px;
    white-space:nowrap;
}

td{
    padding:6px;
    border-bottom:1px solid #eee;
    white-space:nowrap;
    text-align:center;
}

tr:hover{
    background:#f2f2f2;
}

@media(max-width:768px){
    table{
        font-size:10px;
    }
}
</style>

</head>


<body>

<div class="report-card">

<h1>📊 รายงานข้อมูลประกันทั้งหมด</h1>

<div id="summary" style="margin:10px 0;font-weight:bold;"></div>

<table id="table">

<thead>
<tr>
    <th>ลำดับ</th>
    <th>ชื่อผู้แจ้ง</th>
    <th>วันที่แจ้งงาน</th>
    <th>บริษัท</th>
    <th>ชื่อผู้เอาประกัน</th>
    <th>ที่อยู่</th>
    <th>ยี่ห้อ</th>
    <th>ทะเบียน</th>
    <th>เลขตัวถัง</th>
    <th>วันเริ่ม</th>
    <th>วันสิ้นสุด</th>
    <th>ทุนประกัน</th>
    <th>รวม</th>
    <th>กลุ่มสินค้า</th>
    <th>งวด1</th>
    <th>งวด2</th>
    <th>งวด3</th>
    <th>งวด4</th>
    <th>จัดการ</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>
const STORAGE_KEY = "insuranceData"; // ✅ ใช้ key เดียวกับ script.js/ฟอร์ม

function renderTable(){

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    let total = 0;

    data.forEach((item,i)=>{
        total += Number(item.total||0);
        tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${item.requestName || "-"}</td>
<td>${item.createDate || "-"}</td>
<td>${item.company || "-"}</td>
<td>${item.customer || "-"}</td>
<td>${item.address || "-"}</td>
<td>${item.brand || "-"}</td>
<td>${item.plate || "-"}</td>
<td>${item.chassis || "-"}</td>
<td>${item.start || "-"}</td>
<td>${item.end || "-"}</td>
<td>${Number(item.sumInsured||0).toLocaleString()}</td>
<td>${Number(item.total||0).toLocaleString()}</td>
<td>${item.group || "-"}</td>
<td>${item.installment1 || "-"}</td>
<td>${item.installment2 || "-"}</td>
<td>${item.installment3 || "-"}</td>
<td>${item.installment4 || "-"}</td>
<td>
<button onclick="openDoc(${i})">📄</button>
<button onclick="deleteItem(${i})">🗑</button>
</td>
</tr>
`;
    });

    document.getElementById("summary").innerText =
    "💰 ยอดรวมทั้งหมด: " + total.toLocaleString() + " บาท";
}

renderTable();

function deleteItem(i){
    if(!confirm("ลบข้อมูล?")) return;

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    data.splice(i,1);

    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderTable();
}

function openDoc(i){
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    localStorage.setItem("pdfData",JSON.stringify(data[i]));
    location.href="contract_print.html";
}
</script>

</body>
</html>
