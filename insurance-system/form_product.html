        .flatpickr-year-select {
            font-family: "Kanit", sans-serif;
            font-weight: bold;
            font-size: 14px;
            color: rgba(0,0,0,.9);
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 0 4px;
            height: 34px;
            width: auto !important;
            min-width: 64px;
            display: inline-block !important;
            -webkit-appearance: menulist;
            appearance: menulist;
        }

        .installment-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
 
        .installment-options input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
 
        .installment-options label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            transition: all 0.15s ease-in-out;
            background: #fff;
            margin: 0;
        }
 
        .installment-options input[type="radio"]:checked + label {
            border-color: #2d6cdf;
            background: #2d6cdf;
            color: #fff;
        }
 
        .installment-options label:hover {
            border-color: #2d6cdf;

    <script type="module" src="script.js"></script>

    <!-- เพิ่มใหม่: โหลด auth.js เพื่อใช้ getEmployeeName() ตอนบันทึกข้อมูล -->

    <script>
        /* แก้ไข: เดิมมีการประกาศ let editingId / editingIndex ซ้ำที่นี่
           ทั้งที่ script.js ประกาศตัวแปร editingId ไว้แล้ว การประกาศ let
           ชื่อเดียวกันซ้ำในหน้าเดียวกันทำให้เกิด SyntaxError และ <script>
           ก้อนนี้ทั้งก้อนไม่ทำงานเลย (ปุ่มบันทึก/ไฟล์เอกสาร/เมนูใช้ไม่ได้)
           จึงตัดออก ใช้ editingId ตัวที่ประกาศไว้ใน script.js แทน */
 
        let editingId = null;
 
        function getInstallmentCount() {
            const checked = document.querySelector('input[name="installmentCount"]:checked');
            return checked ? checked.value : "";
        }

        /* เพิ่มใหม่: ปุ่มเลือก "กลุ่มสินค้า" แบบเดียวกับปุ่มจำนวนงวด
           ต้องซิงค์ค่ากลับเข้าช่อง input hidden #group เสมอ เพื่อให้โค้ดเดิม
           (collectFormData / editData ใน script.js) ที่อ่านค่าจาก #group ทำงานได้ตามปกติ ไม่ต้องแก้ที่อื่น */
        function setGroupValue(value) {
            const hiddenGroup = document.getElementById("group");
            if (hiddenGroup) hiddenGroup.value = value || "";

            document.querySelectorAll('input[name="groupOption"]').forEach(r => {
                r.checked = (r.value === value);
            });
        }

        function getGroupValue() {
            const checked = document.querySelector('input[name="groupOption"]:checked');
            return checked ? checked.value : (document.getElementById("group")?.value || "");
        }

        document.querySelectorAll('input[name="groupOption"]').forEach(r => {
            r.addEventListener("change", function () {
                setGroupValue(this.value);
            });
        });

        /* เพิ่มใหม่: ถ้าเลือกบริษัทอื่นที่ไม่ใช่ "วิริยะ" ให้ล็อกกลุ่มสินค้าเป็น
           "กลุ่ม 3 บรรทุกน้ำหนักเกิน" โดยอัตโนมัติ (ปุ่มกลุ่มอื่นจะถูกปิดใช้งานไว้ชั่วคราว)
           ถ้าเลือกบริษัท "วิริยะ" จะปลดล็อกให้เลือกกลุ่มได้ตามปกติทุกกลุ่ม */
        function applyGroupLockForCompany() {
            const companyEl = document.getElementById("company");
            const company = companyEl ? companyEl.value : "";
            const groupRadios = document.querySelectorAll('input[name="groupOption"]');

            if (company && company !== "วิริยะ") {
                setGroupValue("กลุ่ม 3 บรรทุกน้ำหนักเกิน");
                groupRadios.forEach(r => {
                    r.disabled = (r.value !== "กลุ่ม 3 บรรทุกน้ำหนักเกิน");
                });
            } else {
                groupRadios.forEach(r => {
                    r.disabled = false;
                });
            }
        }

        document.getElementById("company")?.addEventListener("change", applyGroupLockForCompany);
 
        function collectFormData(type) {
 
        const record = {
    type: type,
 
    // วันที่กรอกฟอร์ม
            createDate: new Date().toLocaleDateString("th-TH"),
 
            company: document.getElementById("company")?.value,
            requestName: document.getElementById("requestName")?.value,
            customer: document.getElementById("name")?.value,
            phone: document.getElementById("phone")?.value,
            address: document.getElementById("address")?.value,
            brand: document.getElementById("brand")?.value,
            plate: document.getElementById("plate")?.value,
            chassis: document.getElementById("chassis")?.value,
            start: document.getElementById("start")?.value,
            end: document.getElementById("end")?.value,
            sumInsured: document.getElementById("sumInsured")?.value,
            total: document.getElementById("total")?.value,
            group: document.getElementById("group")?.value,
            installmentCount: getInstallmentCount(),
            installment1: document.getElementById("installment1")?.value,
            installment2: document.getElementById("installment2")?.value,
            installment3: document.getElementById("installment3")?.value,
            installment4: document.getElementById("installment4")?.value,

            // เพิ่มใหม่: ชื่อพนักงานผู้แจ้งงานที่ล็อกอินอยู่ (จากระบบ login แบบง่าย auth.js)
            // ใช้ typeof เช็คกันไว้เผื่อ auth.js โหลดไม่ทันหรือไม่มีอยู่ จะได้ไม่ error
            // ข้อมูลเก่าที่ไม่มี field นี้จะยังใช้งานได้ตามปกติ (ไม่มี field นี้เฉยๆ)
            employeeName: (typeof getEmployeeName === "function") ? getEmployeeName() : ""
        };
 
        // แนบ id เฉพาะตอนแก้ไขข้อมูลเดิม (id คือ document id จริงจาก Firestore)
        // ถ้าเป็นข้อมูลใหม่จะไม่มี id -> saveRecord() จะสร้างเอกสารใหม่ด้วย addDoc
        if (editingId) {
            record.id = editingId;
        }
 
        return record;
    }
 
        document.getElementById("productForm").addEventListener("submit", async function (e) {
    e.preventDefault();
 
    if (!getInstallmentCount()) {
        alert("กรุณาเลือกจำนวนงวด");
        return;
    }
 
    const record = collectFormData("product");
 
    // บันทึกลง Firestore (แหล่งข้อมูลกลางเดียว ทุกเครื่องเห็นตรงกัน)
    // saveRecord() จะ alert "บันทึกข้อมูลเรียบร้อย" ให้เองแล้ว
    await window.saveRecord(record);
 
    // เก็บไว้เฉพาะข้อมูลชั่วคราวสำหรับเปิดเอกสาร PDF ของรายการนี้ทันที
    localStorage.setItem(
        "pdfData",
        JSON.stringify(record)
    );
 
    // เคลียร์ข้อมูลแก้ไขชั่วคราว (ใช้แล้วหมดหน้าที่)
    localStorage.removeItem("editIndex");
    localStorage.removeItem("editData");
 
    location.href="report.html";
 
});
 
    function openFiles() {
    const pdfData = collectFormData("product");
    if(!pdfData.company){
        alert("กรุณาเลือกบริษัทประกันภัย");
        return;
    }
    localStorage.setItem(
        "pdfData",
        JSON.stringify(pdfData)
    );
 
    window.location.href = "contract_print.html";
}
 
        /* เพิ่มใหม่: เปิดใช้ปฏิทินเลือกวันที่ (flatpickr) ให้ช่อง "วันเริ่ม" และ "วันสิ้นสุด"
           - ยังคงมีปฏิทินให้กดเลือกได้เหมือนของเดิม (input type="date")
           - บังคับรูปแบบการแสดงผลเป็น วว/ดด/ปปปป (วัน ขึ้นก่อน ตามด้วยเดือน แล้วปี) เสมอ
             ไม่ขึ้นกับการตั้งค่าภาษา/รูปแบบวันที่ของเครื่องผู้ใช้แต่ละคนอีกต่อไป
           - ใช้ภาษาไทยสำหรับชื่อเดือน/ชื่อวัน (l10n/th.js)
           - เปลี่ยนตัวเลือก "ปี" จากลูกศรขึ้น-ลงตัวเล็กที่กดยาก ให้เป็น dropdown กดง่าย
             เหมือนตัวเลือกเดือน */
        function attachYearDropdown(instance) {

            const calendarEl = instance.calendarContainer;
            if (!calendarEl) return;

            const yearInput = calendarEl.querySelector(".numInputWrapper input.cur-year");
            if (!yearInput || yearInput.dataset.dropdownReady === "true") return;

            const wrapper = yearInput.closest(".numInputWrapper");
            if (!wrapper) return;

            const select = document.createElement("select");
            select.className = "flatpickr-year-select";

            const centerYear = instance.currentYear;
            const startYear = centerYear - 10;
            const endYear = centerYear + 10;

            for (let y = startYear; y <= endYear; y++) {
                const option = document.createElement("option");
                option.value = String(y);
                option.textContent = String(y);
                if (y === centerYear) option.selected = true;
                select.appendChild(option);
            }

            select.addEventListener("change", function () {
                instance.changeYear(parseInt(this.value, 10));
            });

            wrapper.style.display = "none";
            wrapper.insertAdjacentElement("afterend", select);

            yearInput.dataset.dropdownReady = "true";
            instance._yearSelect = select;
        }

        function syncYearDropdown(instance) {
            if (instance._yearSelect) {
                instance._yearSelect.value = String(instance.currentYear);
            }
        }

        if (typeof flatpickr === "function") {

            const datePickerOptions = {
                dateFormat: "d/m/Y",
                allowInput: true,
                locale: (typeof flatpickr.l10ns !== "undefined" && flatpickr.l10ns.th) ? "th" : undefined,
                onReady: function (selectedDates, dateStr, instance) {
                    attachYearDropdown(instance);
                },
                onOpen: function (selectedDates, dateStr, instance) {
                    attachYearDropdown(instance);
                    syncYearDropdown(instance);
                },
                onMonthChange: function (selectedDates, dateStr, instance) {
                    syncYearDropdown(instance);
                },
                onYearChange: function (selectedDates, dateStr, instance) {
                    syncYearDropdown(instance);
                }
            };

            flatpickr("#start", datePickerOptions);
            flatpickr("#end", datePickerOptions);
        }

        const menuBtn = document.getElementById("menuBtn");
        const sidebar = document.querySelector(".sidebar");
        const overlay = document.getElementById("overlay");
 
        if (menuBtn && sidebar && overlay) {
 
            menuBtn.addEventListener("click", function () {
                sidebar.classList.toggle("show");
                overlay.classList.toggle("show");
            });
 
            overlay.addEventListener("click", function () {
                sidebar.classList.remove("show");
                overlay.classList.remove("show");
            });
 
        }
 
        window.addEventListener("DOMContentLoaded", function(){
 
    // ===== เพิ่มใหม่: ดึงชื่อผู้ Login จากระบบ Login เดิม (login.html) =====
    // login.html บันทึกชื่อผู้ใช้งานไว้ที่ localStorage/sessionStorage key "currentUser"
    // ถ้ามีการ Login อยู่ ให้เติมชื่อนี้ลงช่อง "ผู้แจ้ง" ทันทีที่เปิดหน้า
    // ถ้ายังไม่ได้ Login (ไม่มีค่าใน storage) ให้ปล่อยช่องว่างไว้ตามเดิม
    const currentUser = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
    if (currentUser) {
        document.getElementById("requestName").value = currentUser;
    }
    // ===== จบส่วนที่เพิ่มใหม่ =====
 
    const oldData = JSON.parse(localStorage.getItem("editData"));
 
    console.log("รับข้อมูลแก้ไข:", oldData);
 
 
    if(oldData){
 
        editingId = oldData.id;
 
 
        document.getElementById("company").value = oldData.company || "";
        document.getElementById("requestName").value = oldData.requestName || "";
        document.getElementById("name").value = oldData.customer || "";
        document.getElementById("phone").value = oldData.phone || "";
        document.getElementById("address").value = oldData.address || "";
 
        document.getElementById("brand").value = oldData.brand || "";
        document.getElementById("plate").value = oldData.plate || "";
        document.getElementById("chassis").value = oldData.chassis || "";
 
        // ข้อมูลเก่าบางรายการเคยบันทึกด้วย input type="date" (รูปแบบ ปปปป-ดด-วว)
        // แปลงให้เป็น วว/ดด/ปปปป ก่อน เพื่อให้ flatpickr แสดงผล/เข้าใจค่าได้ถูกต้อง
        // ส่วนข้อมูลใหม่ที่เป็น วว/ดด/ปปปป อยู่แล้วจะไม่ถูกแตะต้อง
        const legacyDateMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(oldData.start || "");
        document.getElementById("start").value = legacyDateMatch
            ? `${legacyDateMatch[3]}/${legacyDateMatch[2]}/${legacyDateMatch[1]}`
            : (oldData.start || "");

        const legacyEndMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(oldData.end || "");
        document.getElementById("end").value = legacyEndMatch
            ? `${legacyEndMatch[3]}/${legacyEndMatch[2]}/${legacyEndMatch[1]}`
            : (oldData.end || "");
 
        document.getElementById("sumInsured").value = oldData.sumInsured || "";
        document.getElementById("total").value = oldData.total || "";
        setGroupValue(oldData.group || "");
 
        if (oldData.installmentCount) {
            const radio = document.getElementById("installmentCount" + oldData.installmentCount);
            if (radio) radio.checked = true;
        }
 
        document.getElementById("installment1").value = oldData.installment1 || "";
        document.getElementById("installment2").value = oldData.installment2 || "";
        document.getElementById("installment3").value = oldData.installment3 || "";
        document.getElementById("installment4").value = oldData.installment4 || "";
 
    }
 
    // เพิ่มใหม่: ใช้กฎล็อกกลุ่มสินค้าตามบริษัทที่เลือกอยู่ (ทั้งกรณีเปิดฟอร์มใหม่และกรณีแก้ไขข้อมูลเดิม)
    applyGroupLockForCompany();
 
},500);
    </script>
