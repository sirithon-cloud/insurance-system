    <!-- เพิ่มใหม่: flatpickr บังคับให้แสดงผลเป็น วัน/เดือน/ปี เสมอ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <!-- เพิ่มใหม่: ภาษาไทยสำหรับปฏิทิน (ชื่อเดือน/ชื่อวันเป็นภาษาไทย) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/th.js"></script>

    <style>
        /* เพิ่มใหม่: ปุ่มเลือก "ปี" แบบ dropdown ให้กดง่ายเหมือนปุ่มเลือกเดือน
           (แทนที่ลูกศรขึ้น-ลงตัวเล็กๆ ของปีเดิมใน flatpickr ที่กดยากบนมือถือ) */
        .flatpickr-year-select {
            font-family: "Kanit", sans-serif;
            font-weight: bold;
            font-size: 14px;
            color: rgba(0,0,0,.9);
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 0 4px;
            height: 34px;
            width: auto !important;
            min-width: 64px;
            display: inline-block !important;
            -webkit-appearance: menulist;
            appearance: menulist;
        }

        .installment-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
 
        .installment-options input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
 
        .installment-options label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            transition: all 0.15s ease-in-out;
            background: #fff;
            margin: 0;
        }
 
        .installment-options input[type="radio"]:checked + label {
            border-color: #2d6cdf;
            background: #2d6cdf;
            color: #fff;
        }
 
        .installment-options label:hover {
            border-color: #2d6cdf;
        }

        /* เพิ่มใหม่: ปุ่มที่ถูกล็อก (disabled) ให้ดูจางลงชัดเจน แยกจากปุ่มที่เลือกได้ปกติ */
        .installment-options input[type="radio"]:disabled + label {
            opacity: .45;
            cursor: not-allowed;
        }
        .installment-options input[type="radio"]:disabled + label:hover {
            border-color: #ccc;
        }
    </style>
 
</head>

    <script>
        /* แก้ไข (สำคัญ): เดิมตรงนี้ไม่มีการประกาศ editingId เลยสักบรรทัด (ตัดออกไปทั้งหมด
           โดยเข้าใจผิดว่า script.js ประกาศ editingId ไว้ให้แล้วใช้ร่วมกันได้)
           แต่ script.js เป็น type="module" จึงมี scope ของตัวเองแยกขาดจากหน้านี้เสมอ
           ตัวแปร editingId ของ script.js เข้าถึงจากที่นี่ไม่ได้จริงๆ
           ผลคือถ้าเปิดฟอร์มมาเพื่อ "บันทึกข้อมูลใหม่" (ไม่ได้มาจากหน้าแก้ไข) editingId จะไม่เคย
           ถูกประกาศ/กำหนดค่าที่ไหนเลยทั้งไฟล์ พอกด "บันทึกข้อมูล" แล้ว collectFormData()
           ไปเช็ค if (editingId) จะเกิด ReferenceError: editingId is not defined ทันที
           ทำให้บันทึกข้อมูลใหม่ไม่ได้เลยสักรายการ (error เงียบๆ ใน console ไม่มี alert เตือน)
           แก้โดยเติมการประกาศตัวแปรนี้กลับมาที่หน้านี้ (เป็นของหน้านี้เท่านั้น ไม่ชนกับ script.js) */
        let editingId = null;
 
        function getInstallmentCount() {
            const checked = document.querySelector('input[name="installmentCount"]:checked');
            return checked ? checked.value : "";
        }

        /* ปุ่มเลือก "กลุ่มสินค้า" แบบเดียวกับปุ่มจำนวนงวด
           ต้องซิงค์ค่ากลับเข้าช่อง input hidden #group เสมอ เพื่อให้โค้ดเดิม
           (collectFormData ในหน้านี้) ที่อ่านค่าจาก #group ทำงานได้ตามปกติ ไม่ต้องแก้ที่อื่น */
        function setGroupValue(value) {
            const hiddenGroup = document.getElementById("group");
            if (hiddenGroup) hiddenGroup.value = value || "";

            document.querySelectorAll('input[name="groupOption"]').forEach(r => {
                r.checked = (r.value === value);
            });
        }

        function getGroupValue() {
            const checked = document.querySelector('input[name="groupOption"]:checked');
            return checked ? checked.value : (document.getElementById("group")?.value || "");
        }

        document.querySelectorAll('input[name="groupOption"]').forEach(r => {
            r.addEventListener("change", function () {
                setGroupValue(this.value);
            });
        });

        /* ถ้าเลือกบริษัทอื่นที่ไม่ใช่ "วิริยะ" ให้ตั้งค่าเริ่มต้นของกลุ่มสินค้าเป็น
           "กลุ่ม 3 บรรทุกน้ำหนักเกิน" ให้อัตโนมัติ (เพื่อความสะดวก เพราะบริษัทอื่นส่วนใหญ่ใช้กลุ่มนี้)
           แต่ยังคงเลือกกลุ่มอื่นได้ตามปกติเสมอ ไม่ปิดใช้งาน (disable) ปุ่มกลุ่มใดๆ ทั้งสิ้น

           แก้ไข (รอบ 1): เดิมฟังก์ชันนี้ถูกเรียกตอนโหลดข้อมูลเก่ามาแก้ไข (loadEditDataIntoForm) ด้วย
           ทำให้ค่ากลุ่มสินค้าที่บันทึกไว้จริงของลูกค้าถูกทับเป็น "กลุ่ม 3 บรรทุกน้ำหนักเกิน"
           แบบเงียบๆ ทุกครั้งที่บริษัทของรายการนั้นไม่ใช่วิริยะ (เช่น เดิมเลือกไว้เป็น "กลุ่ม 3"
           พอเปิดแก้ไขค่าจะเปลี่ยนเป็น "กลุ่ม 3 บรรทุกน้ำหนักเกิน" ทันที โดยพนักงานไม่ทันสังเกต)
           แก้โดยเพิ่มพารามิเตอร์ preserveValue: true สำหรับกรณีโหลดข้อมูลเดิมมาแก้ไขโดยเฉพาะ

           แก้ไข (รอบ 2): เดิมยังปิดใช้งาน (disable) ปุ่มกลุ่มอื่นทั้งหมดเมื่อบริษัทไม่ใช่วิริยะ
           ทำให้เลือกกลุ่มอื่นไม่ได้เลยแม้ต้องการ ตัดส่วน disable ออก เหลือแค่ตั้งค่าเริ่มต้นให้เฉยๆ
           ปุ่มกลุ่มทุกกลุ่มยังกดเลือกได้เสมอไม่ว่าจะเลือกบริษัทใด */
        function applyGroupLockForCompany(options) {
            const companyEl = document.getElementById("company");
            const company = companyEl ? companyEl.value : "";
            const groupRadios = document.querySelectorAll('input[name="groupOption"]');

            // ปุ่มกลุ่มสินค้าทุกกลุ่มเลือกได้เสมอ ไม่ล็อก/ปิดใช้งานอีกต่อไป
            groupRadios.forEach(r => {
                r.disabled = false;
            });

            // แก้ไข: เดิมใช้พารามิเตอร์ preserveValue ที่ส่งเข้ามาแค่ครั้งเดียวตอนโหลดข้อมูลแก้ไข
            // ทำให้ถ้าอยู่ระหว่างแก้ไขรายการเดิม (editingId มีค่า) แล้วพนักงานสลับเปลี่ยนบริษัทอีกครั้ง
            // (ทำให้ event "change" ยิงใหม่โดยไม่มี preserveValue) ค่ากลุ่มสินค้าจริงของลูกค้าเสี่ยงถูกทับ
            // เปลี่ยนมาเช็คจาก editingId ของหน้านี้โดยตรงแทน เพื่อให้ "อยู่ระหว่างแก้ไขข้อมูลเดิม" ไม่ถูกตั้งค่า
            // กลุ่มสินค้าอัตโนมัติทับให้เองเด็ดขาด ไม่ว่าจะสลับบริษัทกี่ครั้งก็ตาม
            if (company && company !== "วิริยะ" && !editingId && !getGroupValue()) {
                // ตั้งค่าเริ่มต้นให้เฉพาะตอนที่เป็นการบันทึกข้อมูลใหม่ และยังไม่ได้เลือกกลุ่มใดไว้เท่านั้น
                // (กันไม่ให้ไปทับค่าที่พนักงานเลือกเองอยู่แล้วเวลาสลับบริษัทไปมา หรือค่าจริงของข้อมูลที่กำลังแก้ไข)
                setGroupValue("กลุ่ม 3 บรรทุกน้ำหนักเกิน");
            }
        }

        document.getElementById("company")?.addEventListener("change", applyGroupLockForCompany);
 
        function collectFormData(type) {
 
        const record = {
    type: type,
 
            company: document.getElementById("company")?.value,
            requestName: document.getElementById("requestName")?.value,
            customer: document.getElementById("name")?.value,
            phone: document.getElementById("phone")?.value,
            address: document.getElementById("address")?.value,
            brand: document.getElementById("brand")?.value,
            plate: document.getElementById("plate")?.value,
            chassis: document.getElementById("chassis")?.value,
            start: document.getElementById("start")?.value,
            end: document.getElementById("end")?.value,
            sumInsured: document.getElementById("sumInsured")?.value,
            total: document.getElementById("total")?.value,
            group: document.getElementById("group")?.value,
            installmentCount: getInstallmentCount(),
            installment1: document.getElementById("installment1")?.value,
            installment2: document.getElementById("installment2")?.value,
            installment3: document.getElementById("installment3")?.value,
            installment4: document.getElementById("installment4")?.value
        };
 
        // แนบ id เฉพาะตอนแก้ไขข้อมูลเดิม (id คือ document id จริงจาก Firestore)
        // ถ้าเป็นข้อมูลใหม่จะไม่มี id -> saveRecord() จะสร้างเอกสารใหม่ด้วย addDoc
        //
        // แก้ไข (สำคัญ): เดิมใส่ createDate (วันที่แจ้งงาน) และ employeeName (ผู้แจ้งงานที่ล็อกอินอยู่)
        // เข้าไปใน record ทุกครั้งไม่ว่าจะบันทึกใหม่หรือแก้ไขข้อมูลเดิม ทำให้เวลาพนักงานคนอื่น
        // เปิดแก้ไขรายการเก่า (เช่น แก้แค่เบอร์โทร) แล้วกดบันทึก จะไปทับวันที่แจ้งงานจริง
        // เป็นวันที่กดบันทึกล่าสุด และทับชื่อผู้แจ้งงานจริงเป็นชื่อคนที่ล็อกอินอยู่ตอนนั้นแทน
        // ทำให้รายงานยอดขายรายเดือน/รายพนักงานผิดเพี้ยนย้อนหลัง
        //
        // แก้โดยใส่ 2 ฟิลด์นี้เฉพาะตอน "บันทึกข้อมูลใหม่" เท่านั้น (ไม่มี editingId)
        // ส่วนตอนแก้ไขข้อมูลเดิม จะไม่ส่ง 2 ฟิลด์นี้ไปเลย -> saveRecord() ใช้ merge:true
        // จึงไม่แตะค่าที่บันทึกไว้เดิมใน Firestore ทั้งสองฟิลด์นี้จะยังเป็นของเดิมเสมอ
        if (editingId) {
            record.id = editingId;
        } else {
            record.createDate = new Date().toLocaleDateString("th-TH");
            record.employeeName = (typeof getEmployeeName === "function") ? getEmployeeName() : "";
        }
 
        return record;
    }

        function attachYearDropdown(instance) {

            const calendarEl = instance.calendarContainer;
            if (!calendarEl) return;

            const yearInput = calendarEl.querySelector(".numInputWrapper input.cur-year");
            if (!yearInput || yearInput.dataset.dropdownReady === "true") return;

            const wrapper = yearInput.closest(".numInputWrapper");
            if (!wrapper) return;

            const select = document.createElement("select");
            select.className = "flatpickr-year-select";

            const centerYear = instance.currentYear;
            const startYear = centerYear - 10;
            const endYear = centerYear + 10;

            for (let y = startYear; y <= endYear; y++) {
                const option = document.createElement("option");
                option.value = String(y);
                option.textContent = String(y);
                if (y === centerYear) option.selected = true;
                select.appendChild(option);
            }

            select.addEventListener("change", function () {
                instance.changeYear(parseInt(this.value, 10));
            });

            wrapper.style.display = "none";
            wrapper.insertAdjacentElement("afterend", select);

            yearInput.dataset.dropdownReady = "true";
            instance._yearSelect = select;
        }

        function syncYearDropdown(instance) {
            if (instance._yearSelect) {
                instance._yearSelect.value = String(instance.currentYear);
            }
        }

        let startPicker = null;
        let endPicker = null;

        if (typeof flatpickr === "function") {

            const datePickerOptions = {
                dateFormat: "d/m/Y",
                allowInput: true,
                locale: (typeof flatpickr.l10ns !== "undefined" && flatpickr.l10ns.th) ? "th" : undefined,
                onReady: function (selectedDates, dateStr, instance) {
                    attachYearDropdown(instance);
                },
                onOpen: function (selectedDates, dateStr, instance) {
                    attachYearDropdown(instance);
                    syncYearDropdown(instance);
                },
                onMonthChange: function (selectedDates, dateStr, instance) {
                    syncYearDropdown(instance);
                },
                onYearChange: function (selectedDates, dateStr, instance) {
                    syncYearDropdown(instance);
                }
            };

            startPicker = flatpickr("#start", datePickerOptions);
            endPicker = flatpickr("#end", datePickerOptions);
        }

        const menuBtn = document.getElementById("menuBtn");
        const sidebar = document.querySelector(".sidebar");
        const overlay = document.getElementById("overlay");
 
        if (menuBtn && sidebar && overlay) {
 
            menuBtn.addEventListener("click", function () {
                sidebar.classList.toggle("show");
                overlay.classList.toggle("show");
            });
 
            overlay.addEventListener("click", function () {
                sidebar.classList.remove("show");
                overlay.classList.remove("show");
            });
 
        }

        /* แปลงวันที่แบบเก่า (ปปปป-ดด-วว จาก input type="date") ให้เป็น วว/ดด/ปปปป
           ใช้ทั้งตอนโหลดหน้า (DOMContentLoaded) และตอนกดปุ่ม "แก้ไขข้อมูล" (loadEditDataIntoForm) */
        function toDisplayDate(v) {
            const legacyMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(v || "");
            return legacyMatch ? `${legacyMatch[3]}/${legacyMatch[2]}/${legacyMatch[1]}` : (v || "");
        }

        /* รวมโค้ดเติมข้อมูลเดิมลงฟอร์มไว้ในฟังก์ชันเดียว ใช้ร่วมกันทั้ง 2 จุด
           1) ตอนเปิดหน้านี้มาจาก report.html (ผ่าน DOMContentLoaded ด้านล่าง)
           2) ตอนกดปุ่ม "✏️ แก้ไขข้อมูล" เอง (onclick="loadEditDataIntoForm()")
           สำคัญที่สุดคือฟังก์ชันนี้ตั้งค่า editingId ของ "หน้านี้เอง" ให้ถูกต้องเสมอ */
        function loadEditDataIntoForm() {

            const oldData = JSON.parse(localStorage.getItem("editData"));

            if (!oldData) {
                alert("ไม่พบข้อมูลที่ต้องการแก้ไข");
                return;
            }

            editingId = oldData.id;

            document.getElementById("company").value = oldData.company || "";
            document.getElementById("requestName").value = oldData.requestName || "";
            document.getElementById("name").value = oldData.customer || "";
            document.getElementById("phone").value = oldData.phone || "";
            document.getElementById("address").value = oldData.address || "";

            document.getElementById("brand").value = oldData.brand || "";
            document.getElementById("plate").value = oldData.plate || "";
            document.getElementById("chassis").value = oldData.chassis || "";

            const startVal = toDisplayDate(oldData.start);
            const endVal = toDisplayDate(oldData.end);

            // ใช้ setDate ของ flatpickr แทนการเซ็ต .value ตรงๆ เพื่อ sync ปฏิทินให้ตรงกับค่าจริงด้วย
            if (startPicker) startPicker.setDate(startVal, true, "d/m/Y");
            else document.getElementById("start").value = startVal;

            if (endPicker) endPicker.setDate(endVal, true, "d/m/Y");
            else document.getElementById("end").value = endVal;

            document.getElementById("sumInsured").value = oldData.sumInsured || "";
            document.getElementById("total").value = oldData.total || "";
            setGroupValue(oldData.group || "");

            if (oldData.installmentCount) {
                const radio = document.getElementById("installmentCount" + oldData.installmentCount);
                if (radio) radio.checked = true;
            }

            document.getElementById("installment1").value = oldData.installment1 || "";
            document.getElementById("installment2").value = oldData.installment2 || "";
            document.getElementById("installment3").value = oldData.installment3 || "";
            document.getElementById("installment4").value = oldData.installment4 || "";

            // ใช้กฎล็อกกลุ่มสินค้าตามบริษัทของข้อมูลเดิมที่โหลดมา
            // preserveValue: true เพื่อไม่ให้ทับค่ากลุ่มสินค้าจริงของลูกค้าที่โหลดมา (setGroupValue ด้านบน)
            applyGroupLockForCompany({ preserveValue: true });
        }
 
        window.addEventListener("DOMContentLoaded", function(){
 
    const currentUser = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
    if (currentUser) {
        document.getElementById("requestName").value = currentUser;
    }
 
    // แก้ไข: เดิมมีโค้ดเติมข้อมูลซ้ำอยู่ตรงนี้ทั้งก้อน รวมเป็นฟังก์ชันเดียวคือ
    // loadEditDataIntoForm() แล้วเรียกใช้ที่นี่แทน (เฉพาะกรณีมีข้อมูลที่ต้องแก้ไขจริง)
    if (localStorage.getItem("editData")) {
        loadEditDataIntoForm();
    } else {
        // ไม่ได้มาจากหน้าแก้ไข: ยังคงต้องเช็คกฎล็อกกลุ่มสินค้าตามบริษัทที่เลือกอยู่ (ถ้ามี)
        applyGroupLockForCompany();
    }
 
},500);
    </script>
