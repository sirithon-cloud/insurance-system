<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เข้าสู่ระบบ - วิริยะประกันภัย</title>
<script src="auth.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,sans-serif;
}

html,body{ height:100%; }

body{
    position:relative;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
}

/* พื้นหลังเคลื่อนไหว - Glassmorphism blobs */
.bg-blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.45;
    z-index:0;
    animation:blobMove ease-in-out infinite;
}

.blob-a{
    width:500px; height:500px;
    background: radial-gradient(circle, #667eea 0%, #764ba2 100%);
    top:-180px; left:-150px;
    animation-duration:18s;
}

.blob-b{
    width:450px; height:450px;
    background: radial-gradient(circle, #f093fb 0%, #f5576c 100%);
    bottom:-180px; right:-130px;
    animation-duration:22s;
}

.blob-c{
    width:350px; height:350px;
    background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
    top:40%; right:-160px;
    opacity:.35;
    animation-duration:15s;
}

.blob-d{
    width:300px; height:300px;
    background: radial-gradient(circle, #43e97b 0%, #38f9d7 100%);
    bottom:10%; left:-120px;
    opacity:.3;
    animation-duration:20s;
}

@keyframes blobMove{
    0%,100%{ transform:translate(0,0) scale(1) rotate(0deg); }
    33%{ transform:translate(60px,50px) scale(1.15) rotate(10deg); }
    66%{ transform:translate(-50px,-40px) scale(.9) rotate(-8deg); }
}

/* กล่องหลัก - Glassmorphism */
.login-card{
    position:relative;
    width:min(400px,90vw);
    padding:48px 38px;
    border-radius:24px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index:10;
    animation:cardIn .8s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes cardIn{
    0%{ opacity:0; transform:translateY(30px) scale(.95); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
}

/* โลโก้ - Insurance Shield */
.logo{
    width:90px; height:90px;
    margin:auto; margin-bottom:24px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(145deg, #667eea, #764ba2);
    box-shadow:
        0 10px 30px rgba(102, 126, 234, 0.4),
        0 0 60px rgba(102, 126, 234, 0.2),
        inset 0 2px 4px rgba(255,255,255,0.3);
    animation:float 3.5s ease-in-out infinite;
}

.logo svg{ width:44px; height:44px; }

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
}

/* หัวข้อ */
h1{
    color:#ffffff;
    font-size:28px;
    text-align:center;
    margin-bottom:6px;
    font-weight:700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.subtitle{
    color: rgba(255, 255, 255, 0.65);
    text-align:center;
    margin-bottom:36px;
    font-size:14px;
    letter-spacing:.5px;
}

/* input - Glass */
.form-group{ margin-bottom:22px; }

.input-wrap{
    position:relative;
    display:flex;
    align-items:center;
}

.input-icon{
    position:absolute;
    left:18px;
    width:20px; height:20px;
    color: rgba(255, 255, 255, 0.6);
    pointer-events:none;
    z-index:2;
}

.form-control{
    width:100%;
    height:56px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:0 20px 0 52px;
    color:#ffffff;
    font-size:15px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    transition:.3s;
}

.form-control::placeholder{ color: rgba(255, 255, 255, 0.4); }

.form-control:focus{
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(102, 126, 234, 0.6);
    box-shadow:
        0 0 0 3px rgba(102, 126, 234, 0.2),
        0 0 20px rgba(102, 126, 234, 0.15);
}

.form-control.is-invalid{
    background: rgba(244, 67, 54, 0.1);
    border-color: rgba(244, 67, 54, 0.5);
    box-shadow:
        0 0 0 3px rgba(244, 67, 54, 0.15),
        0 0 20px rgba(244, 67, 54, 0.1);
}

.field-error{
    display:none;
    color:#ff6b6b;
    font-size:12.5px;
    margin-top:8px;
    padding-left:6px;
}

.field-error.show{ display:block; }

.shake{
    animation:shake .4s ease;
}

@keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(7px); }
    60%{ transform:translateX(-5px); }
    80%{ transform:translateX(4px); }
}

/* ปุ่ม - Gradient Glow */
.btn-wrap{
    position:relative;
    width:100%;
    padding:16px 0 8px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-btn{
    position:relative;
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:#fff;
    font-size:17px;
    font-weight:700;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow:
        0 8px 25px rgba(102, 126, 234, 0.4),
        0 0 40px rgba(102, 126, 234, 0.15),
        inset 0 1px 0 rgba(255,255,255,0.3);
    transition:transform .15s ease, box-shadow .15s ease, filter .2s ease;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    z-index:3;
}

.login-btn::after{
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,0) 100%);
    transform:skewX(-20deg);
    animation:shine 3.5s ease-in-out infinite;
    z-index:1;
}

@keyframes shine{
    0%{ left:-60%; }
    45%{ left:130%; }
    100%{ left:130%; }
}

.btn-inner{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    gap:8px;
}

.login-btn:hover{
    filter:brightness(1.1);
    transform:translateY(-2px);
    box-shadow:
        0 12px 35px rgba(102, 126, 234, 0.5),
        0 0 50px rgba(102, 126, 234, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.3);
}

.login-btn:focus-visible{
    outline:none;
    box-shadow:
        0 8px 25px rgba(102, 126, 234, 0.4),
        0 0 0 4px rgba(102, 126, 234, 0.3);
}

.login-btn:active{
    transform:translateY(1px);
    filter:brightness(.95);
    box-shadow:
        0 4px 15px rgba(102, 126, 234, 0.3),
        inset 0 2px 4px rgba(0,0,0,0.2);
}

.login-btn:disabled{ cursor:not-allowed; }

.login-btn.is-success{
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    box-shadow:
        0 8px 25px rgba(67, 233, 123, 0.4),
        0 0 40px rgba(67, 233, 123, 0.15);
}

/* spinner */
.spinner{
    width:18px; height:18px;
    border-radius:50%;
    border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    animation:spin .7s linear infinite;
    display:none;
}

.is-loading .spinner{ display:inline-block; }
.is-loading .btn-text,
.is-success .btn-text{ display:none; }

.check-icon{ display:none; width:20px; height:20px; }

.is-success .check-icon{
    display:inline-block;
    animation:popIn .35s ease;
}

@keyframes spin{ to{ transform:rotate(360deg); } }

@keyframes popIn{
    0%{ transform:scale(0); opacity:0; }
    70%{ transform:scale(1.2); opacity:1; }
    100%{ transform:scale(1); }
}

/* เวลา */
.time{
    text-align:center;
    margin-top:28px;
    color: rgba(255, 255, 255, 0.5);
    line-height:1.7;
    font-size:13px;
}

.time .date-line{
    font-size:14px;
    color: rgba(255, 255, 255, 0.8);
    font-weight:600;
}

.time .clock-line{
    font-size:22px;
    font-weight:700;
    color: #667eea;
    letter-spacing:2px;
    text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
}

@media(max-width:400px){
    .login-card{ padding:36px 26px; }
    h1{ font-size:24px; }
    .logo{ width:80px; height:80px; }
}
</style>
</head>
<body>

<div class="bg-blob blob-a"></div>
<div class="bg-blob blob-b"></div>
<div class="bg-blob blob-c"></div>
<div class="bg-blob blob-d"></div>

<div class="login-card">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-4" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <h1>Welcome Back</h1>
    <div class="subtitle">กรอกชื่อพนักงานผู้แจ้งงานเพื่อเข้าสู่ระบบ</div>

    <form id="loginForm">
        <div class="form-group">
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                <input type="text" id="username" class="form-control" placeholder="ชื่อพนักงานผู้แจ้งงาน" autocomplete="username">
            </div>
            <div class="field-error" id="fieldError">กรุณากรอกชื่อพนักงานก่อนเข้าสู่ระบบ</div>
        </div>

        <div class="btn-wrap">
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-inner">
                    <span class="spinner"></span>
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="btn-text">Login</span>
                </span>
            </button>
        </div>
    </form>

    <div class="time">
        <div class="date-line" id="dateLine">-</div>
        <div class="clock-line" id="clockLine">--:--:--</div>
    </div>
</div>

<script>
const thaiDays = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
const thaiMonths = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                     "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

function updateTime(){
    const now = new Date();
    const day = thaiDays[now.getDay()];
    const date = now.getDate();
    const month = thaiMonths[now.getMonth()];
    const year = now.getFullYear() + 543;

    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ss = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("dateLine").textContent =
        `วัน${day}ที่ ${date} ${month} ${year}`;
    document.getElementById("clockLine").textContent = `${hh}:${mm}:${ss}`;
}

updateTime();
setInterval(updateTime, 1000);

const loginForm = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const usernameInput = document.getElementById("username");
const fieldError = document.getElementById("fieldError");

if (typeof getEmployeeName === "function" && getEmployeeName()) {
    window.location.href = "index.html";
}

loginForm.addEventListener("submit", (e)=>{
    e.preventDefault();

    if(loginBtn.classList.contains("is-loading") || loginBtn.classList.contains("is-success")) return;

    const name = usernameInput.value.trim();

    if(!name){
        usernameInput.classList.add("is-invalid");
        fieldError.classList.add("show");
        usernameInput.classList.remove("shake");
        void usernameInput.offsetWidth;
        usernameInput.classList.add("shake");
        usernameInput.focus();
        return;
    }

    usernameInput.classList.remove("is-invalid");
    fieldError.classList.remove("show");

    loginBtn.classList.add("is-loading");
    loginBtn.disabled = true;

    setTimeout(()=>{
        if (typeof setEmployeeName === "function") {
            setEmployeeName(name);
        }

        loginBtn.classList.remove("is-loading");
        loginBtn.classList.add("is-success");

        setTimeout(()=>{
            window.location.href = "index.html";
        }, 900);
    }, 1100);
});

usernameInput.addEventListener("input", ()=>{
    usernameInput.classList.remove("is-invalid");
    fieldError.classList.remove("show");
});
</script>

</body>
</html>
