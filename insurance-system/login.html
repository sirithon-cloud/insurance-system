<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เข้าสู่ระบบ - วิริยะประกันภัย</title>
<script src="auth.js"></script>
<style>
/* =========================================================
   RESET / BASE
========================================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Arial,sans-serif;
}

html,body{
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
    scrollbar-width:none;       /* Firefox */
    -ms-overflow-style:none;    /* IE / Edge เก่า */
}

/* ซ่อนแถบสกอลบาร์ทุกจุดในหน้า (Chrome/Safari/Edge ใหม่) */
*::-webkit-scrollbar{
    display:none;
    width:0;
    height:0;
}
*{
    scrollbar-width:none;
}

body{
    position:relative;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#050a1a;
}

/* =========================================================
   ANIMATED GRADIENT BACKGROUND + WAVE + GRID
========================================================= */
.bg-gradient{
    position:fixed;
    inset:0;
    z-index:0;
    background:linear-gradient(125deg,
        #030712 0%,
        #071233 22%,
        #0b1f5c 45%,
        #123a9e 65%,
        #0a1c4d 85%,
        #030712 100%);
    background-size:300% 300%;
    animation:gradientShift 16s ease infinite;
}

@keyframes gradientShift{
    0%{ background-position:0% 30%; }
    50%{ background-position:100% 70%; }
    100%{ background-position:0% 30%; }
}

.bg-grid{
    position:fixed;
    inset:-2px;
    z-index:1;
    background-image:
        linear-gradient(rgba(90,140,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,140,255,.08) 1px, transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(circle at 50% 40%, rgba(0,0,0,.9) 0%, transparent 72%);
            mask-image:radial-gradient(circle at 50% 40%, rgba(0,0,0,.9) 0%, transparent 72%);
    animation:gridDrift 26s linear infinite;
    opacity:.8;
}

@keyframes gridDrift{
    0%{ transform:translate(0,0); }
    100%{ transform:translate(46px,46px); }
}

.bg-wave{
    position:fixed;
    left:-10%;
    width:120%;
    height:260px;
    z-index:1;
    opacity:.18;
    filter:blur(2px);
}

.bg-wave svg{ width:100%; height:100%; display:block; }

.wave-1{ bottom:-40px; animation:waveMove 11s ease-in-out infinite; }
.wave-2{ bottom:-90px; opacity:.12; animation:waveMove 15s ease-in-out infinite reverse; }

@keyframes waveMove{
    0%,100%{ transform:translateX(0) scaleY(1); }
    50%{ transform:translateX(-3%) scaleY(1.08); }
}

/* =========================================================
   FLOATING BLOBS (with mouse parallax via JS transform vars)
========================================================= */
.bg-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:.55;
    z-index:1;
    will-change:transform;
    transition:transform .25s ease-out;
    animation:blobMove ease-in-out infinite;
}

.blob-a{
    width:520px; height:520px;
    background:radial-gradient(circle, #2154ff 0%, #0c1f66 70%, transparent 100%);
    top:-200px; left:-160px;
    animation-duration:19s;
}

.blob-b{
    width:460px; height:460px;
    background:radial-gradient(circle, #3ea0ff 0%, #0c3d8a 70%, transparent 100%);
    bottom:-190px; right:-140px;
    animation-duration:23s;
}

.blob-c{
    width:360px; height:360px;
    background:radial-gradient(circle, #63e0ff 0%, #0b4a91 75%, transparent 100%);
    top:38%; right:-180px;
    opacity:.4;
    animation-duration:16s;
}

.blob-d{
    width:320px; height:320px;
    background:radial-gradient(circle, #7fb8ff 0%, #12245c 75%, transparent 100%);
    bottom:8%; left:-140px;
    opacity:.35;
    animation-duration:21s;
}

@keyframes blobMove{
    0%,100%{ transform:translate(0,0) scale(1) rotate(0deg); }
    33%{ transform:translate(50px,45px) scale(1.12) rotate(8deg); }
    66%{ transform:translate(-45px,-35px) scale(.92) rotate(-8deg); }
}

/* =========================================================
   FLOATING PARTICLES
========================================================= */
.particles{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    overflow:hidden;
}

/* จุดแสงเรืองตามเมาส์ (spotlight glow effect เพิ่มใหม่) */
.cursor-glow{
    position:fixed;
    top:0;
    left:0;
    width:520px;
    height:520px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.16) 0%, rgba(160,200,255,.08) 40%, transparent 72%);
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:3;
    will-change:transform;
    transition:opacity .3s ease;
}

.particle{
    position:absolute;
    bottom:-20px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(150,190,255,.9) 0%, rgba(90,140,255,0) 70%);
    animation-name:particleRise;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

@keyframes particleRise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    8%{ opacity:1; }
    92%{ opacity:.7; }
    100%{ transform:translateY(-115vh) translateX(var(--drift, 30px)); opacity:0; }
}

/* ประกายดาวเรืองแสงตามเมาส์ (cursor sparkle trail) */
.cursor-sparkle{
    position:fixed;
    top:0; left:0;
    width:6px; height:6px;
    border-radius:50%;
    background:#bcd8ff;
    box-shadow:0 0 6px 2px rgba(150,200,255,.9);
    pointer-events:none;
    z-index:50;
    animation:sparkleFade .7s ease-out forwards;
}

@keyframes sparkleFade{
    0%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(0) translateY(-18px); opacity:0; }
}

/* ประกายดาวรูปกากบาทตอนคลิก (click star burst) */
.click-star{
    position:fixed;
    top:0; left:0;
    width:14px; height:14px;
    pointer-events:none;
    z-index:60;
    color:#ffd94d;
    filter:drop-shadow(0 0 6px rgba(255,214,80,.85));
    animation:starPop .6s cubic-bezier(.2,.8,.3,1) forwards;
}

@keyframes starPop{
    0%{ transform:translate(-50%,-50%) translate(0,0) scale(0) rotate(0deg); opacity:1; }
    60%{ transform:translate(-50%,-50%) translate(calc(var(--tx,0px)*.6), -10px) scale(1.15) rotate(90deg); opacity:1; }
    100%{ transform:translate(-50%,-50%) translate(var(--tx,0px), -30px) scale(.35) rotate(150deg); opacity:0; }
}

/* =========================================================
   FLOATING ICONS (decorative, subtle)
========================================================= */
.floating-icon{
    position:fixed;
    z-index:2;
    opacity:.18;
    color:#bcd4ff;
    filter:drop-shadow(0 0 10px rgba(120,170,255,.5));
    animation:iconFloat ease-in-out infinite;
    pointer-events:none;
}

@keyframes iconFloat{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-22px) rotate(8deg); }
}

/* =========================================================
   LOGIN CARD - GLASSMORPHISM + NEON BORDER
========================================================= */
.card-wrap{
    position:relative;
    z-index:10;
    perspective:900px;
    animation:zoomFadeIn .9s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes zoomFadeIn{
    0%{ opacity:0; transform:translateY(26px) scale(.94); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
}

.login-card{
    position:relative;
    width:min(408px, 90vw);
    padding:46px 38px 38px;
    border-radius:26px;

    background:rgba(255, 255, 255, 0.86);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);

    border:1px solid rgba(255,255,255,.6);
    box-shadow:
        0 30px 70px rgba(10,30,80,.28),
        0 0 0 1px rgba(255,255,255,.5) inset,
        inset 0 1px 0 rgba(255,255,255,.9);

    max-height:94vh;
    overflow-y:auto;

    transform-style:preserve-3d;
    transition:transform .12s ease-out;
    will-change:transform;
}

@keyframes cardFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-9px); }
}


@property --angle{
    syntax:'<angle>';
    initial-value:0deg;
    inherits:false;
}

@keyframes borderRotate{
    to{ --angle:360deg; }
}


/* soft glow behind the whole card */
.login-card::after{
    content:"";
    position:absolute;
    inset:-40px;
    z-index:-2;
    background:radial-gradient(circle at 50% 20%, rgba(70,130,255,.35), transparent 65%);
    filter:blur(20px);
    animation:pulseGlow 3.6s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%,100%{ opacity:.55; }
    50%{ opacity:.95; }
}

/* =========================================================
   LOGO
========================================================= */
.logo{
    position:relative;
    width:100%;
    max-width:340px;
    height:auto;
    margin:auto; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center;
    animation:logoFloat 3.4s ease-in-out infinite;
    filter:drop-shadow(0 8px 20px rgba(33,84,255,.35));
    cursor:pointer;
}

.logo.logo-spin{
    animation:logoFloat 3.4s ease-in-out infinite, logoSpinPop .8s cubic-bezier(.2,.8,.25,1);
}

@keyframes logoSpinPop{
    0%{ transform:rotate(0) scale(1); }
    55%{ transform:rotate(360deg) scale(1.12); }
    100%{ transform:rotate(360deg) scale(1); }
}

.logo img{
    width:100%;
    height:auto;
    object-fit:contain;
}

.logo-fallback-icon{
    display:none;
    width:170px;
    height:170px;
    color:#2154ff;
}

.logo.logo-fallback .logo-fallback-icon{
    display:block;
}

@keyframes logoFloat{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-7px) scale(1.04); }
}

h1{
    background:linear-gradient(90deg, #0b1f5c 0%, #2154ff 35%, #3ea0ff 55%, #2154ff 75%, #0b1f5c 100%);
    background-size:250% auto;
    -webkit-background-clip:text;
            background-clip:text;
    -webkit-text-fill-color:transparent;
    font-size:25px;
    text-align:center;
    margin-bottom:6px;
    font-weight:800;
    letter-spacing:.3px;
    animation:fadeInUp .8s ease .1s both, shimmerText 4.5s linear infinite;
}

@keyframes shimmerText{
    0%{ background-position:0% center; }
    100%{ background-position:250% center; }
}

.subtitle{
    color:rgba(30,45,90,.62);
    text-align:center;
    margin-bottom:30px;
    font-size:13.5px;
    letter-spacing:.4px;
    animation:fadeInUp .8s ease .2s both;
}

@keyframes fadeInUp{
    0%{ opacity:0; transform:translateY(10px); }
    100%{ opacity:1; transform:translateY(0); }
}

/* =========================================================
   FLOATING-LABEL INPUTS
========================================================= */
.form-group{
    margin-bottom:24px;
    animation:fadeInUp .8s ease both;
}
.form-group:nth-of-type(1){ animation-delay:.28s; }
.form-group:nth-of-type(2){ animation-delay:.36s; }

.input-wrap{
    position:relative;
    display:flex;
    align-items:center;
}

.input-wrap::after{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:20px;
    border:1.5px solid rgba(90,160,255,.55);
    opacity:0;
    pointer-events:none;
    transform:scale(1);
}

.input-wrap.pulse-ring::after{
    animation:inputPulseRing .6s ease-out;
}

@keyframes inputPulseRing{
    0%{ opacity:.9; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.06); }
}

.input-icon{
    position:absolute;
    left:18px;
    width:19px; height:19px;
    color:rgba(30,60,140,.45);
    pointer-events:none;
    z-index:2;
    transition:color .25s ease, filter .25s ease;
}

.form-control{
    width:100%;
    height:58px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:22px 20px 8px 52px;
    color:#0b1f5c;
    font-size:15.5px;
    background:rgba(240,245,255,.65);
    border:1px solid rgba(30,80,200,.14);
    backdrop-filter:blur(8px);
    transition:background .28s ease, border-color .28s ease, box-shadow .28s ease;
}

.form-control.has-toggle{
    padding-right:50px;
}

.form-control::placeholder{ color:transparent; }

/* floating label */
.floating-label{
    position:absolute;
    left:52px;
    top:50%;
    transform:translateY(-50%);
    color:rgba(30,50,110,.5);
    font-size:15px;
    pointer-events:none;
    transition:all .22s ease;
    z-index:2;
}

.form-control:focus ~ .floating-label,
.form-control:not(:placeholder-shown) ~ .floating-label{
    top:16px;
    left:52px;
    font-size:11.5px;
    color:#2154ff;
    transform:translateY(0);
}

.form-control:focus{
    background:rgba(255,255,255,.9);
    border-color:rgba(33,84,255,.55);
    box-shadow:
        0 0 0 4px rgba(60,130,255,.14),
        0 0 24px rgba(60,140,255,.18);
}

.form-control:focus ~ .input-icon{
    color:#2154ff;
    filter:drop-shadow(0 0 4px rgba(90,160,255,.5));
}

.form-control.is-invalid{
    background:rgba(255,70,70,.08);
    border-color:rgba(255,90,90,.55);
    box-shadow:
        0 0 0 4px rgba(255,70,70,.14),
        0 0 22px rgba(255,70,70,.18);
}

.field-error{
    max-height:0;
    overflow:hidden;
    color:#ff8080;
    font-size:12.5px;
    margin-top:0;
    padding-left:6px;
    opacity:0;
    transition:all .25s ease;
}

.field-error.show{
    max-height:30px;
    margin-top:8px;
    opacity:1;
}

.shake{ animation:shake .4s ease; }

@keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(7px); }
    60%{ transform:translateX(-5px); }
    80%{ transform:translateX(4px); }
}

/* password toggle button */
.toggle-password{
    position:absolute;
    right:16px;
    z-index:3;
    background:none;
    border:none;
    cursor:pointer;
    color:rgba(30,60,140,.45);
    width:26px; height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:color .2s ease, transform .2s ease;
}

.toggle-password:hover{
    color:#2154ff;
    transform:scale(1.12);
}

.toggle-password svg{ width:20px; height:20px; }
.toggle-password .eye-off{ display:none; }
.toggle-password.is-visible .eye{ display:none; }
.toggle-password.is-visible .eye-off{ display:block; }

/* =========================================================
   LOGIN BUTTON - GRADIENT / RIPPLE / SHINE / GLOW
========================================================= */
.btn-wrap{
    position:relative;
    width:100%;
    padding:8px 0 4px;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:fadeInUp .8s ease .44s both;
    transition:transform .18s ease-out;
    will-change:transform;
}

.login-btn{
    position:relative;
    width:100%;
    height:58px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:#fff;
    font-size:17px;
    font-weight:700;
    letter-spacing:.4px;
    background:linear-gradient(135deg, #2154ff 0%, #123a9e 55%, #0a2a7a 100%);
    background-size:200% 200%;
    box-shadow:
        0 10px 28px rgba(33,84,255,.45),
        0 0 46px rgba(60,140,255,.2),
        inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .16s ease, box-shadow .18s ease, filter .2s ease, background-position .6s ease;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    z-index:3;
    isolation:isolate;
}

/* shine sweep */
.login-btn::after{
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.4) 50%,
        rgba(255,255,255,0) 100%);
    transform:skewX(-20deg);
    animation:shine 3.2s ease-in-out infinite;
    z-index:1;
}

@keyframes shine{
    0%{ left:-60%; }
    45%{ left:130%; }
    100%{ left:130%; }
}

.btn-inner{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    gap:8px;
}

.login-btn:hover{
    filter:brightness(1.12);
    transform:translateY(-2px);
    background-position:100% 0;
    box-shadow:
        0 16px 38px rgba(33,84,255,.55),
        0 0 60px rgba(60,140,255,.32),
        inset 0 1px 0 rgba(255,255,255,.3);
}

.login-btn:active{
    transform:translateY(1px);
    filter:brightness(.96);
}

.login-btn:disabled{ cursor:not-allowed; }

.login-btn.is-success{
    background:linear-gradient(135deg, #17d67a 0%, #0a8f56 100%);
    box-shadow:
        0 10px 28px rgba(23,214,122,.45),
        0 0 46px rgba(23,214,122,.22);
}

/* ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.55);
    transform:scale(0);
    animation:rippleAnim .6s ease-out;
    pointer-events:none;
    z-index:2;
}

@keyframes rippleAnim{
    to{ transform:scale(3.2); opacity:0; }
}

/* spinner */
.spinner{
    width:19px; height:19px;
    border-radius:50%;
    border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    animation:spin .7s linear infinite;
    display:none;
}

.is-loading .spinner{ display:inline-block; }
.is-loading .btn-text,
.is-success .btn-text{ display:none; }

.check-icon{ display:none; width:21px; height:21px; }

.is-success .check-icon{
    display:inline-block;
    animation:popIn .35s ease;
}

@keyframes spin{ to{ transform:rotate(360deg); } }

@keyframes popIn{
    0%{ transform:scale(0); opacity:0; }
    70%{ transform:scale(1.25); opacity:1; }
    100%{ transform:scale(1); }
}

/* =========================================================
   CLOCK
========================================================= */
.time{
    text-align:center;
    margin-top:24px;
    color:rgba(30,50,110,.45);
    line-height:1.7;
    font-size:13px;
    animation:fadeInUp .8s ease .5s both;
}

.time .date-line{
    font-size:13.5px;
    color:rgba(20,40,100,.75);
    font-weight:600;
}

.time .clock-line{
    font-size:21px;
    font-weight:700;
    color:#2154ff;
    letter-spacing:2px;
    text-shadow:0 0 14px rgba(90,160,255,.3);
}

/* =========================================================
   RESPONSIVE
========================================================= */
@media(max-width:400px){
    .login-card{ padding:36px 24px 28px; }
    h1{ font-size:21px; }
    .logo{ max-width:260px; }
    .form-control{ height:54px; }
}

@media(min-width:1024px){
    .login-card{ padding:52px 46px 42px; }
}

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce){
    *{
        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.001ms !important;
    }
}
</style>
</head>
<body>

<!-- พื้นหลังเคลื่อนไหวหลายเลเยอร์ -->
<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="bg-wave wave-1">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
        <path fill="#1e4fd6" d="M0,100 C240,180 480,20 720,90 C960,160 1200,40 1440,100 L1440,200 L0,200 Z"></path>
    </svg>
</div>
<div class="bg-wave wave-2">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
        <path fill="#3ea0ff" d="M0,120 C240,40 480,180 720,110 C960,50 1200,150 1440,90 L1440,200 L0,200 Z"></path>
    </svg>
</div>

<div class="bg-blob blob-a" data-depth="18"></div>
<div class="bg-blob blob-b" data-depth="26"></div>
<div class="bg-blob blob-c" data-depth="14"></div>
<div class="bg-blob blob-d" data-depth="22"></div>

<div class="particles" id="particles"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ไอคอนลอยตกแต่ง -->
<svg class="floating-icon" style="top:14%;left:10%;width:34px;height:34px;animation-duration:6.5s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
<svg class="floating-icon" style="top:70%;left:8%;width:26px;height:26px;animation-duration:8s;animation-delay:1s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
<svg class="floating-icon" style="top:20%;right:9%;width:30px;height:30px;animation-duration:7.2s;animation-delay:.6s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 4v4M16 4v4M4 10h16"/></svg>
<svg class="floating-icon" style="bottom:12%;right:12%;width:28px;height:28px;animation-duration:9s;animation-delay:1.4s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><circle cx="12" cy="8" r="4"/></svg>

<div class="card-wrap" id="cardWrap">
    <div class="login-card" id="loginCard">

        <div class="logo">
            <img src="logo.png" alt="logo" onerror="this.style.display='none'; this.parentElement.classList.add('logo-fallback');">
            <svg class="logo-fallback-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>


        <form id="loginForm" autocomplete="off">

            <!-- ชื่อ-นามสกุล (ช่องเดียว) -->
            <div class="form-group">
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    <input type="text" id="fullName" class="form-control" placeholder=" " autocomplete="off">
                    <label for="fullName" class="floating-label">ชื่อ-นามสกุล</label>
                </div>
                <div class="field-error" id="fullNameError">กรุณากรอกชื่อ-นามสกุล</div>
            </div>

            <!-- รหัสผ่าน -->
            <div class="form-group">
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="10" width="16" height="10" rx="2"/>
                        <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
                    </svg>
                    <input type="password" id="password" class="form-control has-toggle" placeholder=" " autocomplete="new-password">
                    <label for="password" class="floating-label">รหัสผ่าน</label>

                    <button type="button" class="toggle-password" id="togglePassword" aria-label="แสดง/ซ่อนรหัสผ่าน">
                        <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.4 21.4 0 0 1 5.06-6.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 7 11 7a21.5 21.5 0 0 1-2.61 3.66"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
                    </button>
                </div>
                <div class="field-error" id="passwordError">กรุณากรอกรหัสผ่าน</div>
            </div>

            <div class="btn-wrap">
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-inner">
                        <span class="spinner"></span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none">
                            <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="btn-text">เข้าสู่ระบบ</span>
                    </span>
                </button>
            </div>
        </form>

        <div class="time">
            <div class="date-line" id="dateLine">-</div>
            <div class="clock-line" id="clockLine">--:--:--</div>
        </div>
    </div>
</div>

<script>
/* =========================================================
   นาฬิกา/วันที่ไทย
========================================================= */
const thaiDays = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
const thaiMonths = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                     "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

function updateTime(){
    const now = new Date();
    const day = thaiDays[now.getDay()];
    const date = now.getDate();
    const month = thaiMonths[now.getMonth()];
    const year = now.getFullYear() + 543;

    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ss = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("dateLine").textContent = `วัน${day}ที่ ${date} ${month} ${year}`;
    document.getElementById("clockLine").textContent = `${hh}:${mm}:${ss}`;
}
updateTime();
setInterval(updateTime, 1000);

/* =========================================================
   FLOATING PARTICLES (สร้างด้วย JS ล้วน ไม่ใช้ library)
========================================================= */
(function createParticles(){
    const wrap = document.getElementById("particles");
    const count = window.innerWidth < 480 ? 16 : 30;

    for(let i = 0; i < count; i++){
        const p = document.createElement("div");
        p.className = "particle";

        const size = 2 + Math.random() * 4;
        const left = Math.random() * 100;
        const duration = 9 + Math.random() * 10;
        const delay = Math.random() * 12;
        const drift = (Math.random() * 80 - 40) + "px";

        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = left + "vw";
        p.style.setProperty("--drift", drift);
        p.style.animationDuration = duration + "s";
        p.style.animationDelay = "-" + delay + "s";

        wrap.appendChild(p);
    }
})();

/* =========================================================
   MOUSE PARALLAX บน Blobs + จุดแสงตามเมาส์ (cursor glow)
========================================================= */
(function mouseParallax(){
    const blobs = document.querySelectorAll(".bg-blob");
    const glow = document.getElementById("cursorGlow");
    let rafId = null;
    let targetX = 0, targetY = 0;
    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;

    window.addEventListener("mousemove", (e) => {
        targetX = (e.clientX / window.innerWidth - 0.5);
        targetY = (e.clientY / window.innerHeight - 0.5);
        mouseX = e.clientX;
        mouseY = e.clientY;

        if(!rafId){
            rafId = requestAnimationFrame(applyParallax);
        }
    });

    window.addEventListener("mouseleave", () => {
        if(glow) glow.style.opacity = "0";
    });
    window.addEventListener("mouseenter", () => {
        if(glow) glow.style.opacity = "1";
    });

    function applyParallax(){
        blobs.forEach(b=>{
            const depth = parseFloat(b.dataset.depth || "16");
            b.style.transform = `translate(${targetX * depth}px, ${targetY * depth}px)`;
        });

        if(glow){
            glow.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%,-50%)`;
        }

        rafId = null;
    }
})();

/* =========================================================
   ลอยขึ้นลงต่อเนื่อง + เอียงการ์ด 3D ตามเมาส์ (รวมอยู่ในลูปเดียวกัน
   เพื่อไม่ให้ transform ของ CSS animation กับ JS ชนกัน)
========================================================= */
(function cardFloatAndTilt(){
    const card = document.getElementById("loginCard");
    if(!card) return;

    const maxTilt = 6; // องศาสูงสุดที่เอียงได้
    let targetRotX = 0, targetRotY = 0;
    let curRotX = 0, curRotY = 0;
    let isHover = false;

    card.addEventListener("mousemove", (e) => {
        isHover = true;
        const rect = card.getBoundingClientRect();
        const px = (e.clientX - rect.left) / rect.width;
        const py = (e.clientY - rect.top) / rect.height;

        targetRotY = (px - 0.5) * maxTilt * 2;
        targetRotX = (0.5 - py) * maxTilt * 2;
    });

    card.addEventListener("mouseleave", () => {
        isHover = false;
        targetRotX = 0;
        targetRotY = 0;
    });

    function loop(t){
        // ลอยขึ้นลงช้าๆ ต่อเนื่องตลอดเวลาด้วยคลื่น sine
        const floatY = Math.sin(t / 1500) * 9;

        // ผ่อนตามค่าเอียงเป้าหมายแบบนุ่มนวล (ease towards target)
        curRotX += (targetRotX - curRotX) * 0.08;
        curRotY += (targetRotY - curRotY) * 0.08;

        card.style.transform =
            `translateY(${floatY}px) rotateX(${curRotX}deg) rotateY(${curRotY}deg)`;

        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
})();

/* =========================================================
   ลูกเล่นเพิ่มเติม: ประกายดาวตามเมาส์ + คลิกแล้วเกิดดาวกระจาย
   + ปุ่มล็อกอินขยับตามเมาส์แบบแม่เหล็ก + โลโก้หมุนเมื่อกด
   + วงแหวนเรืองแสงรอบช่องกรอกตอนโฟกัส
========================================================= */
(function extraFunEffects(){

    /* --- ประกายดาวไล่ตามเมาส์ (throttled) --- */
    let lastSparkle = 0;
    window.addEventListener("mousemove", (e) => {
        const now = performance.now();
        if (now - lastSparkle < 45) return; // จำกัดความถี่ ไม่ให้รกจอ
        lastSparkle = now;

        const s = document.createElement("div");
        s.className = "cursor-sparkle";
        s.style.left = e.clientX + "px";
        s.style.top = e.clientY + "px";
        const hue = 200 + Math.random() * 40;
        s.style.background = `hsl(${hue},90%,80%)`;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 700);
    });

    /* --- ดาวกระจายตอนคลิกหน้าจอ --- */
    const starSvg = `<svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M12 0l2.9 8.3L24 12l-9.1 3.7L12 24l-2.9-8.3L0 12l9.1-3.7L12 0z"/></svg>`;

    document.addEventListener("click", (e) => {
        const count = 5;
        for (let i = 0; i < count; i++){
            const star = document.createElement("div");
            star.className = "click-star";
            star.innerHTML = starSvg;
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const dist = 18 + Math.random() * 14;
            star.style.left = e.clientX + "px";
            star.style.top = e.clientY + "px";
            star.style.setProperty("--tx", Math.cos(angle) * dist + "px");
            star.style.transform = `translate(-50%,-50%)`;
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 650);
        }
    });

    /* --- ปุ่มล็อกอินขยับตามเมาส์แบบแม่เหล็กเบาๆ --- */
    const btnWrap = document.querySelector(".btn-wrap");
    if (btnWrap){
        btnWrap.addEventListener("mousemove", (e) => {
            const rect = btnWrap.getBoundingClientRect();
            const relX = e.clientX - (rect.left + rect.width / 2);
            const relY = e.clientY - (rect.top + rect.height / 2);
            const strength = 0.18;
            btnWrap.style.transform = `translate(${relX * strength}px, ${relY * strength}px)`;
        });
        btnWrap.addEventListener("mouseleave", () => {
            btnWrap.style.transform = "translate(0,0)";
        });
    }

    /* --- คลิกโลโก้แล้วหมุนพร้อมดาวกระจาย (อีสเตอร์เอ้ก) --- */
    const logoEl = document.querySelector(".logo");
    if (logoEl){
        logoEl.addEventListener("click", () => {
            logoEl.classList.remove("logo-spin");
            void logoEl.offsetWidth;
            logoEl.classList.add("logo-spin");

            const rect = logoEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < 10; i++){
                const star = document.createElement("div");
                star.className = "click-star";
                star.innerHTML = starSvg;
                const angle = (Math.PI * 2 * i) / 10;
                const dist = 30 + Math.random() * 24;
                star.style.left = cx + "px";
                star.style.top = cy + "px";
                star.style.setProperty("--tx", Math.cos(angle) * dist + "px");
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 650);
            }
        });
    }

    /* --- วงแหวนเรืองแสงตอนโฟกัสช่องกรอก --- */
    document.querySelectorAll(".input-wrap").forEach((wrap) => {
        const input = wrap.querySelector(".form-control");
        if (!input) return;
        input.addEventListener("focus", () => {
            wrap.classList.remove("pulse-ring");
            void wrap.offsetWidth;
            wrap.classList.add("pulse-ring");
        });
    });

})();

/* =========================================================
   คอนเฟตตี้เมื่อ Login สำเร็จ
========================================================= */
function launchConfetti(){
    const colors = ["#2154ff","#3ea0ff","#7fb8ff","#17d67a","#ffd23f","#ffffff"];
    const count = window.innerWidth < 480 ? 40 : 70;

    for(let i = 0; i < count; i++){
        const piece = document.createElement("div");
        const size = 6 + Math.random() * 6;
        const startX = window.innerWidth / 2 + (Math.random() * 240 - 120);

        piece.style.position = "fixed";
        piece.style.left = startX + "px";
        piece.style.top = (window.innerHeight * 0.55) + "px";
        piece.style.width = size + "px";
        piece.style.height = size * (Math.random() > 0.5 ? 1 : 2.2) + "px";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        piece.style.opacity = "0.95";
        piece.style.zIndex = "999";
        piece.style.pointerEvents = "none";
        piece.style.transform = `translateY(0) rotate(0deg)`;
        piece.style.transition = `transform ${1.1 + Math.random() * 0.9}s cubic-bezier(.15,.7,.3,1), opacity .4s ease ${1.1 + Math.random() * 0.6}s`;

        document.body.appendChild(piece);

        const driftX = (Math.random() * 360 - 180);
        const riseY = -(200 + Math.random() * 260);
        const rotate = Math.random() * 720 - 360;

        requestAnimationFrame(() => {
            piece.style.transform = `translate(${driftX}px, ${riseY}px) rotate(${rotate}deg)`;
            piece.style.opacity = "0";
        });

        setTimeout(() => piece.remove(), 2200);
    }
}

/* =========================================================
   PASSWORD SHOW / HIDE
========================================================= */
const passwordInput = document.getElementById("password");
const toggleBtn = document.getElementById("togglePassword");

toggleBtn.addEventListener("click", () => {
    const isVisible = toggleBtn.classList.toggle("is-visible");
    passwordInput.type = isVisible ? "text" : "password";
});

/* =========================================================
   RIPPLE EFFECT บนปุ่ม Login
========================================================= */
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", function(e){
    const rect = loginBtn.getBoundingClientRect();
    const ripple = document.createElement("span");
    const size = Math.max(rect.width, rect.height);

    ripple.className = "ripple";
    ripple.style.width = ripple.style.height = size + "px";
    ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
    ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

    loginBtn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 650);
});

/* =========================================================
   FORM VALIDATION + LOGIN
========================================================= */
const loginForm = document.getElementById("loginForm");

const fullNameInput = document.getElementById("fullName");

const fullNameError = document.getElementById("fullNameError");
const passwordError = document.getElementById("passwordError");

/* ถ้า Login อยู่แล้ว ให้เด้งเข้าหน้าแรกทันที ไม่ต้อง Login ซ้ำ */
if (typeof isLoggedIn === "function" && isLoggedIn()) {
    window.location.href = "index.html";
}

function markInvalid(input, errorEl, message){
    input.classList.add("is-invalid");
    if (message) errorEl.textContent = message;
    errorEl.classList.add("show");

    input.classList.remove("shake");
    void input.offsetWidth;
    input.classList.add("shake");
}

function clearInvalid(input, errorEl){
    input.classList.remove("is-invalid");
    errorEl.classList.remove("show");
}

[fullNameInput, passwordInput].forEach((input, i) => {
    const errorEl = [fullNameError, passwordError][i];
    input.addEventListener("input", () => clearInvalid(input, errorEl));
});

loginForm.addEventListener("submit", (e) => {
    e.preventDefault();

    if (loginBtn.classList.contains("is-loading") || loginBtn.classList.contains("is-success")) return;

    const fullName = fullNameInput.value.trim();
    const password = passwordInput.value;

    let hasError = false;

    if (!fullName) {
        markInvalid(fullNameInput, fullNameError, "กรุณากรอกชื่อ-นามสกุล");
        hasError = true;
    } else {
        clearInvalid(fullNameInput, fullNameError);
    }

    if (!password) {
        markInvalid(passwordInput, passwordError, "กรุณากรอกรหัสผ่าน");
        hasError = true;
    } else {
        clearInvalid(passwordInput, passwordError);
    }

    if (hasError) {
        if (!fullName) fullNameInput.focus();
        else passwordInput.focus();
        return;
    }

    loginBtn.classList.add("is-loading");
    loginBtn.disabled = true;

    setTimeout(() => {

        const success = (typeof loginUser === "function") && loginUser(fullName, password);

        if (!success) {
            loginBtn.classList.remove("is-loading");
            loginBtn.disabled = false;
            markInvalid(passwordInput, passwordError, "รหัสผ่านไม่ถูกต้อง");
            passwordInput.focus();
            return;
        }

        loginBtn.classList.remove("is-loading");
        loginBtn.classList.add("is-success");
        launchConfetti();

        setTimeout(() => {
            window.location.href = "index.html";
        }, 900);

    }, 700);
});
</script>
