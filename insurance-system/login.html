<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ | Insurance Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --white:#FFFFFF;
    --bg-soft:#F6F9FD;
    --blue-900:#08172E;
    --blue-700:#0B4DA2;
    --blue-600:#155EEF;
    --blue-500:#2E7BFA;
    --blue-100:#E7F0FF;
    --yellow-500:#FFC93C;
    --yellow-600:#FFB800;
    --ink:#0B1C33;
    --ink-dim:rgba(11,28,51,0.55);
    --danger:#E0453A;
    --glass:rgba(255,255,255,0.66);
    --glass-border:rgba(21,94,239,0.18);
    --radius-lg:22px;
    --radius-md:13px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}

  body{
    font-family:'Kanit', sans-serif;
    min-height:100vh;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
    background:var(--bg-soft);
  }

  /* ---------- AI network scene ---------- */
  .scene{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    background:linear-gradient(180deg, var(--white) 0%, var(--bg-soft) 100%);
  }

  .grid-dim,
  .grid-bright{
    position:fixed;
    inset:0;
    background-image:radial-gradient(circle, rgba(21,94,239,0.5) 1px, transparent 1.6px);
    background-size:30px 30px;
  }
  .grid-dim{z-index:0; opacity:0.16;}
  .grid-bright{
    z-index:1;
    opacity:0.85;
    background-image:
      radial-gradient(circle, rgba(21,94,239,0.75) 1.3px, transparent 1.8px),
      radial-gradient(circle, rgba(255,184,0,0.7) 1.6px, transparent 2px);
    background-size:30px 30px, 90px 90px;
    background-position:0 0, 15px 15px;
    -webkit-mask-image:radial-gradient(circle 280px at var(--mx,50%) var(--my,30%), black, transparent 72%);
    mask-image:radial-gradient(circle 280px at var(--mx,50%) var(--my,30%), black, transparent 72%);
  }

  .circuits{
    position:fixed;
    inset:0;
    z-index:1;
    width:100%;
    height:100%;
  }
  .circuits path{
    fill:none;
    stroke:var(--blue-500);
    stroke-width:1.4;
    opacity:0.22;
    stroke-linecap:round;
  }

  .spark{
    position:fixed;
    top:0; left:0;
    width:6px; height:6px;
    border-radius:50%;
    z-index:1;
    opacity:0;
  }
  .spark-a{background:var(--yellow-500); box-shadow:0 0 9px 2px rgba(255,201,60,0.7);
    offset-path:path("M -60 160 C 300 110, 520 420, 730 660");
    animation:travel 6.5s linear infinite;}
  .spark-b{background:var(--blue-600); box-shadow:0 0 9px 2px rgba(21,94,239,0.55);
    offset-path:path("M 1500 120 C 1120 260, 900 460, 735 690");
    animation:travel 7.5s linear infinite 1.5s;}
  .spark-c{background:var(--yellow-600); box-shadow:0 0 9px 2px rgba(255,184,0,0.6);
    offset-path:path("M -60 720 C 260 770, 520 730, 730 705");
    animation:travel 5.5s linear infinite 0.7s;}
  .spark-d{background:var(--blue-500); box-shadow:0 0 9px 2px rgba(46,123,250,0.55);
    offset-path:path("M 1500 780 C 1160 820, 900 760, 735 705");
    animation:travel 8.5s linear infinite 2.4s;}

  @keyframes travel{
    0%{offset-distance:0%; opacity:0;}
    8%{opacity:1;}
    92%{opacity:1;}
    100%{offset-distance:100%; opacity:0;}
  }

  .sweep{
    position:fixed;
    inset:-20% -20%;
    z-index:1;
    background:linear-gradient(100deg, transparent 45%, rgba(21,94,239,0.05) 50%, rgba(255,201,60,0.06) 52%, transparent 58%);
    animation:sweepMove 9s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes sweepMove{
    0%{transform:translateX(-15%);}
    50%{transform:translateX(15%);}
    100%{transform:translateX(-15%);}
  }

  .content{
    position:relative;
    z-index:3;
    width:100%;
    max-width:420px;
    opacity:0;
    transform:translateY(24px);
    animation:fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.15s forwards;
  }

  @keyframes fadeUp{
    to{opacity:1; transform:translateY(0);}
  }

  .brand{
    text-align:center;
    color:var(--blue-700);
    margin-bottom:20px;
  }

  .brand-mark{
    position:relative;
    width:78px;
    height:78px;
    margin:0 auto 12px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .brand-mark .rings{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  .ring-outer{
    fill:none;
    stroke:var(--blue-500);
    stroke-width:2;
    stroke-dasharray:6 7;
    transform-origin:50px 50px;
    opacity:0;
    animation:ringFadeIn 0.7s ease-out 0.25s forwards, spinCW 16s linear infinite;
  }
  .ring-inner{
    fill:none;
    stroke:var(--yellow-500);
    stroke-width:2;
    stroke-dasharray:4 6;
    transform-origin:50px 50px;
    opacity:0;
    animation:ringFadeIn 0.7s ease-out 0.4s forwards, spinCCW 11s linear infinite;
  }
  @keyframes ringFadeIn{to{opacity:0.85;}}
  @keyframes spinCW{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
  @keyframes spinCCW{from{transform:rotate(360deg);} to{transform:rotate(0deg);}}

  .brand-mark i{
    font-size:23px;
    color:var(--blue-700);
  }

  .brand h1{
    font-size:20px;
    font-weight:600;
    letter-spacing:0.01em;
    margin-bottom:4px;
    color:var(--blue-700);
  }

  .brand p{
    font-size:12px;
    font-weight:400;
    letter-spacing:0.06em;
    color:var(--ink-dim);
  }

  .card{
    position:relative;
    background:var(--glass);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-lg);
    padding:32px 28px 26px;
    box-shadow:0 26px 60px -24px rgba(11,77,162,0.25), inset 0 1px 0 rgba(255,255,255,0.85);
    overflow:hidden;
  }

  .card::after{
    content:"";
    position:absolute;
    left:6%; right:6%;
    top:0;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--blue-500), var(--yellow-500), transparent);
    opacity:0;
    animation:scanSweep 4.5s ease-in-out 1.1s infinite;
    pointer-events:none;
  }
  @keyframes scanSweep{
    0%{top:0; opacity:0;}
    8%{opacity:0.6;}
    48%{top:100%; opacity:0.6;}
    58%{opacity:0;}
    100%{top:100%; opacity:0;}
  }

  .corner{
    position:absolute;
    width:20px; height:20px;
    opacity:0;
    animation:cornerIn 0.6s ease-out forwards;
  }
  .corner-tl{top:8px; left:8px; border-top:2px solid var(--blue-600); border-left:2px solid var(--blue-600); border-radius:6px 0 0 0; animation-delay:0.3s;}
  .corner-tr{top:8px; right:8px; border-top:2px solid var(--yellow-500); border-right:2px solid var(--yellow-500); border-radius:0 6px 0 0; animation-delay:0.4s;}
  .corner-bl{bottom:8px; left:8px; border-bottom:2px solid var(--yellow-500); border-left:2px solid var(--yellow-500); border-radius:0 0 0 6px; animation-delay:0.45s;}
  .corner-br{bottom:8px; right:8px; border-bottom:2px solid var(--blue-600); border-right:2px solid var(--blue-600); border-radius:0 0 6px 0; animation-delay:0.35s;}
  @keyframes cornerIn{
    from{opacity:0; transform:scale(0.6);}
    to{opacity:0.9; transform:scale(1);}
  }

  .card-title{
    text-align:center;
    color:var(--blue-700);
    font-size:17px;
    font-weight:600;
    margin-bottom:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .card-title i{font-size:13px; color:var(--yellow-500);}

  .field label{
    display:block;
    font-size:12px;
    font-weight:400;
    color:var(--blue-600);
    margin-bottom:8px;
    letter-spacing:0.02em;
  }

  .input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }

  .input-wrap i.leading{
    position:absolute;
    left:16px;
    font-size:14px;
    color:rgba(11,28,51,0.4);
    transition:color 0.25s ease;
  }

  .input-wrap input{
    width:100%;
    font-family:'Kanit', sans-serif;
    font-size:14.5px;
    font-weight:400;
    color:var(--ink);
    background:rgba(255,255,255,0.8);
    border:1.5px solid rgba(21,94,239,0.2);
    border-radius:var(--radius-md);
    padding:14px 15px 14px 44px;
    outline:none;
    transition:border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }

  .input-wrap input::placeholder{
    color:rgba(11,28,51,0.35);
    font-weight:300;
  }

  .input-wrap input:focus{
    border-color:var(--blue-500);
    background:var(--white);
    box-shadow:0 0 0 4px rgba(46,123,250,0.16);
  }

  .input-wrap:has(input:focus) i.leading{
    color:var(--blue-500);
  }

  .btn-login{
    width:100%;
    margin-top:24px;
    font-family:'Kanit', sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.02em;
    color:var(--white);
    background:linear-gradient(100deg, var(--blue-600), var(--blue-500));
    border:none;
    border-radius:var(--radius-md);
    padding:14px 0;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    box-shadow:0 14px 30px -10px rgba(11,77,162,0.45);
    transition:transform 0.18s ease, box-shadow 0.25s ease, filter 0.25s ease;
  }

  .btn-login::before{
    content:"";
    position:absolute;
    top:0;
    left:-60%;
    width:40%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,201,60,0.85), transparent);
    transform:skewX(-20deg);
    animation:shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer{
    0%{left:-60%;}
    50%{left:130%;}
    100%{left:130%;}
  }

  .btn-login:hover{
    filter:brightness(1.06);
    box-shadow:0 18px 36px -10px rgba(11,77,162,0.55);
    transform:translateY(-1px);
  }

  .btn-login:active{transform:translateY(0) scale(0.98);}

  .ripple-el{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    transform:scale(0);
    animation:rippleAnim 0.6s ease-out forwards;
    pointer-events:none;
  }
  @keyframes rippleAnim{
    to{transform:scale(3.4); opacity:0;}
  }

  .btn-login .btn-label,
  .btn-login .btn-spinner{
    display:flex;
    align-items:center;
    gap:9px;
    position:relative;
    z-index:1;
  }
  .btn-login .btn-spinner{display:none;}
  .btn-login.loading .btn-label{display:none;}
  .btn-login.loading .btn-spinner{display:flex;}
  .btn-login.loading{cursor:not-allowed;}

  .spinner{
    width:16px;
    height:16px;
    border:2.5px solid rgba(255,255,255,0.35);
    border-top-color:var(--white);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .error-msg{
    display:none;
    align-items:center;
    gap:8px;
    background:rgba(224,69,58,0.1);
    border:1px solid rgba(224,69,58,0.3);
    color:#B23127;
    font-size:12.5px;
    font-weight:400;
    padding:10px 13px;
    border-radius:10px;
    margin-bottom:16px;
  }
  .error-msg.show{display:flex;}

  .shake{animation:shakeErr 0.45s ease;}
  @keyframes shakeErr{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(7px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(4px);}
  }

  .datetime{
    text-align:center;
    margin-top:20px;
    color:var(--ink-dim);
  }
  .dt-time{
    font-family:'JetBrains Mono', monospace;
    font-size:18px;
    font-weight:600;
    color:var(--blue-700);
    letter-spacing:0.02em;
  }
  .dt-time::after{
    content:"";
    display:inline-block;
    width:2px; height:14px;
    background:var(--yellow-500);
    margin-left:4px;
    vertical-align:-2px;
    animation:blinkCursor 1s steps(1) infinite;
  }
  @keyframes blinkCursor{0%,49%{opacity:1;} 50%,100%{opacity:0;}}
  .dt-date{font-size:11px; font-weight:300; color:rgba(11,28,51,0.55); margin-top:5px; letter-spacing:0.02em;}

  .footnote{
    text-align:center;
    margin-top:16px;
    font-size:11px;
    font-weight:300;
    color:rgba(11,28,51,0.4);
  }

  /* Loading overlay */
  .loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(231,240,255,0.85);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.35s ease;
  }
  .loading-overlay.show{opacity:1; pointer-events:all;}

  .loading-card{
    background:rgba(255,255,255,0.98);
    border:1px solid rgba(21,94,239,0.14);
    border-radius:var(--radius-md);
    padding:30px 38px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    box-shadow:0 24px 50px -14px rgba(11,77,162,0.25);
    transform:scale(0.9);
    transition:transform 0.35s cubic-bezier(.22,1,.36,1);
  }
  .loading-overlay.show .loading-card{transform:scale(1);}

  .spinner-lg{
    width:36px;
    height:36px;
    border:3.5px solid var(--blue-100);
    border-top-color:var(--blue-600);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
  }
  .loading-text{font-size:14px; font-weight:500; color:var(--blue-700);}
  .loading-sub{font-size:12px; font-weight:300; color:var(--ink-dim);}

  @media (max-width:480px){
    .card{padding:26px 20px 22px;}
    .brand h1{font-size:17px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
    .grid-bright{opacity:0.5; -webkit-mask-image:none; mask-image:none;}
    .spark{display:none;}
  }
</style>
</head>
<body>

  <div class="scene">
    <div class="grid-dim"></div>
    <div class="grid-bright" id="gridBright"></div>
    <svg class="circuits" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <path d="M -60 160 C 300 110, 520 420, 730 660"></path>
      <path d="M 1500 120 C 1120 260, 900 460, 735 690"></path>
      <path d="M -60 720 C 260 770, 520 730, 730 705"></path>
      <path d="M 1500 780 C 1160 820, 900 760, 735 705"></path>
    </svg>
    <div class="spark spark-a"></div>
    <div class="spark spark-b"></div>
    <div class="spark spark-c"></div>
    <div class="spark spark-d"></div>
    <div class="sweep"></div>
  </div>

  <div class="content">

    <div class="brand">
      <div class="brand-mark">
        <svg class="rings" viewBox="0 0 100 100">
          <circle class="ring-outer" cx="50" cy="50" r="44"></circle>
          <circle class="ring-inner" cx="50" cy="50" r="34"></circle>
        </svg>
        <i class="fa-solid fa-car-side"></i>
      </div>
      <h1>Insurance Management System</h1>
      <p>ระบบบริหารงานประกันภัยกับคุณพลอย</p>
    </div>

    <div class="card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="card-title"><i class="fa-solid fa-key"></i> ลงชื่อเข้าสู่ระบบ</div>

      <div class="error-msg" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>กรุณากรอกชื่อผู้แจ้งก่อนเข้าสู่ระบบ</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="fullname">ชื่อผู้ใช้งาน (ผู้แจ้ง)</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user leading"></i>
            <input type="text" id="fullname" name="fullname" placeholder="กรอกชื่อของคุณ" autocomplete="name" required>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-label">
            <i class="fa-solid fa-key"></i>
            เข้าสู่ระบบ
          </span>
          <span class="btn-spinner">
            <span class="spinner"></span>
            กำลังเข้าสู่ระบบ...
          </span>
        </button>
      </form>
    </div>

    <div class="datetime">
      <div class="dt-time" id="dtTime">--:--:--</div>
      <div class="dt-date" id="dtDate">-</div>
    </div>

    <div class="footnote">&copy; 2026 ประกันภัยกับคุณพลอย </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="spinner-lg"></div>
      <div class="loading-text">กำลังเข้าสู่ระบบ...</div>
      <div class="loading-sub" id="loadingSub"></div>
    </div>
  </div>

<!-- เพิ่มใหม่: โหลด auth.js เพื่อใช้ฟังก์ชัน setEmployeeName() ร่วมกับหน้าอื่นๆ ในระบบ -->
<script src="auth.js"></script>

<script>
  const form = document.getElementById('loginForm');
  const btnLogin = document.getElementById('btnLogin');
  const fullnameInput = document.getElementById('fullname');
  const card = document.querySelector('.card');
  const errorMsg = document.getElementById('errorMsg');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingSub = document.getElementById('loadingSub');
  const gridBright = document.getElementById('gridBright');

  // ลูกเล่นใหม่: เครือข่าย AI สว่างขึ้นตามตำแหน่งเมาส์
  let targetX = window.innerWidth / 2, targetY = window.innerHeight * 0.3;
  let curX = targetX, curY = targetY;
  let rafPending = false;

  window.addEventListener('mousemove', (e) => {
    targetX = e.clientX;
    targetY = e.clientY;
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(updateGrid);
    }
  });

  function updateGrid() {
    curX += (targetX - curX) * 0.15;
    curY += (targetY - curY) * 0.15;
    gridBright.style.setProperty('--mx', curX + 'px');
    gridBright.style.setProperty('--my', curY + 'px');
    if (Math.abs(targetX - curX) > 0.5 || Math.abs(targetY - curY) > 0.5) {
      requestAnimationFrame(updateGrid);
    } else {
      rafPending = false;
    }
  }

  // Ripple effect ตอนกดปุ่ม
  btnLogin.addEventListener('click', function (e) {
    const rect = btnLogin.getBoundingClientRect();
    const ripple = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    ripple.className = 'ripple-el';
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btnLogin.appendChild(ripple);
    setTimeout(() => ripple.remove(), 650);
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorMsg.classList.remove('show');

    const name = fullnameInput.value.trim();

    if (!name) {
      showError('กรุณากรอกชื่อผู้แจ้งก่อนเข้าสู่ระบบ');
      return;
    }

    btnLogin.classList.add('loading');
    btnLogin.disabled = true;

    // บันทึกชื่อผู้ใช้งานไว้ใน LocalStorage / SessionStorage
    // ชื่อนี้จะถูกนำไปใช้เป็น "ผู้แจ้ง" ใน form_product.html และ form_car.html โดยอัตโนมัติ
    localStorage.setItem('currentUser', name);
    sessionStorage.setItem('currentUser', name);

    // เพิ่มใหม่: บันทึกชื่อพนักงานผ่านระบบ auth.js (คีย์ "employeeName")
    // ใช้ร่วมกันทุกหน้าเพื่อรู้ว่าใครเป็นผู้แจ้งงานในแต่ละรายการที่บันทึก
    if (typeof setEmployeeName === "function") {
        setEmployeeName(name);
    }

    loadingSub.textContent = name;
    loadingOverlay.classList.add('show');

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1200);
  });

  function showError(message) {
    errorMsg.querySelector('span').textContent = message;
    errorMsg.classList.add('show');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  // แสดงวันและเวลาปัจจุบัน
  function updateDateTime() {
    const now = new Date();
    const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const date = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('dtTime').textContent = time;
    document.getElementById('dtDate').textContent = date;
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);
</script>

</body>
</html>
