<!DOCTYPE html>
<html lang="th">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กราฟรายได้</title>
 
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
    <link rel="stylesheet" href="style.css">
 
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
 
    <style>
 
        .revenue-wrap{
            width:100%;
            max-width:1000px;
        }
 
        .filters{
            display:flex;
            flex-wrap:wrap;
            gap:14px;
            justify-content:center;
            margin-bottom:26px;
        }
 
        .filters select{
            width:auto;
            min-width:180px;
            background:var(--surface);
            font-weight:600;
        }
 
        .view-toggle{
            display:flex;
            gap:8px;
            background:var(--blue-light);
            padding:6px;
            border-radius:999px;
        }
 
        .view-toggle button{
            border:none;
            background:transparent;
            color:var(--blue-dark);
            font-family:'Kanit',sans-serif;
            font-weight:600;
            font-size:14px;
            padding:10px 20px;
            border-radius:999px;
            cursor:pointer;
            transition:.2s;
        }
 
        .view-toggle button.active{
            background:var(--blue);
            color:#fff;
            box-shadow:0 8px 18px rgba(47,111,237,.3);
        }
 
        .stat-cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:16px;
            margin-bottom:26px;
        }
 
        .stat-card{
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius-md);
            padding:20px;
            text-align:center;
            box-shadow:var(--shadow-soft);
        }
 
        .stat-card .label{
            font-size:13px;
            color:var(--text-soft);
            margin-bottom:8px;
            font-weight:600;
        }
 
        .stat-card .value{
            font-size:22px;
            font-weight:700;
            color:var(--navy);
        }
 
        .chart-card{
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius-lg);
            box-shadow:var(--shadow-card);
            padding:28px;
        }
 
        .chart-card h3{
            color:var(--navy);
            font-size:17px;
            font-weight:600;
            margin-bottom:18px;
            text-align:center;
        }
 
        canvas{
            max-width:100%;
        }
 
        .empty-state{
            text-align:center;
            color:var(--text-soft);
            padding:40px 20px;
            font-size:15px;
        }
 
        @media(max-width:640px){
 
            .stat-cards{
                grid-template-columns:1fr;
            }
 
            .filters select{
                width:100%;
            }
        }
 
    </style>
 
</head>
 
<body>
 
    <!-- TOPBAR -->
    <div class="topbar">
        <button id="menuBtn">☰</button>
        <img src="logo.png" class="toplogo" alt="logo">
        <span class="apptitle">กราฟรายได้</span>
    </div>
 
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <img src="logo.png" class="logo">
 
        <ul class="menu">
            <li><a href="index.html" class="menu-link">🏠 หน้าหลัก</a></li>
            <li><a href="report.html" class="menu-link">📊 รายงาน</a></li>
            <li><a href="revenue.html" class="menu-link">📈 กราฟรายได้</a></li>
        </ul>
    </aside>
 
    <!-- MAIN -->
    <main class="main">
 
        <h2 class="title">กราฟรายได้</h2>
        <p class="subtitle">ดูรายได้แยกตามบริษัทประกันภัย รายเดือนหรือรายปี</p>
 
        <div class="revenue-wrap">
 
            <div class="filters">
 
                <select id="companyFilter"></select>
 
                <select id="yearFilter"></select>
 
                <div class="view-toggle">
                    <button id="btnMonthly" class="active">รายเดือน</button>
                    <button id="btnYearly">รายปี</button>
                </div>
 
            </div>
 
            <div class="stat-cards">
 
                <div class="stat-card">
                    <div class="label">รายได้รวม</div>
                    <div class="value" id="statTotal">0 บาท</div>
                </div>
 
                <div class="stat-card">
                    <div class="label">เฉลี่ยต่อเดือน</div>
                    <div class="value" id="statAvg">0 บาท</div>
                </div>
 
                <div class="stat-card">
                    <div class="label">จำนวนงาน</div>
                    <div class="value" id="statCount">0 งาน</div>
                </div>
 
            </div>
 
            <div class="chart-card">
                <h3 id="chartTitle">รายได้รายเดือน</h3>
                <canvas id="revenueChart" height="110"></canvas>
                <div class="empty-state" id="emptyState" style="display:none;">
                    ยังไม่มีข้อมูลรายได้ในระบบ กรุณาเพิ่มข้อมูลจากฟอร์มบันทึกงานก่อน
                </div>
            </div>
 
        </div>
 
    </main>
 
    <script src="script.js"></script>
 
    <script>
 
        const monthNamesTH = [
            "ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.",
            "ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."
        ];
 
        // แปลงวันที่ createDate รูปแบบ dd/mm/yyyy(พ.ศ.) เป็น {year, month}
        function parseThaiDate(dateStr){
 
            if(!dateStr) return null;
 
            const parts = dateStr.split("/");
            if(parts.length !== 3) return null;
 
            const day = Number(parts[0]);
            const month = Number(parts[1]);
            const year = Number(parts[2]);
 
            if(!day || !month || !year) return null;
 
            return { year: year, month: month };
        }
 
        function baht(n){
            return Number(n||0).toLocaleString() + " บาท";
        }
 
        let allData = getData();
 
        // เตรียมข้อมูลวันที่ให้แต่ละ record + เติมค่า default ให้บริษัทที่ไม่มีข้อมูล
        allData.forEach(item=>{
            item._date = parseThaiDate(item.createDate);
            if(!item.company) item.company = "ไม่ระบุบริษัท";
        });
 
        // เอาเฉพาะรายการที่แปลงวันที่ได้ (ไม่บังคับว่าต้องมีบริษัท)
        const validData = allData.filter(item => item._date);
 
        // รายชื่อบริษัท
        const companies = [...new Set(validData.map(item => item.company))].sort();
 
        // รายปี (พ.ศ.) ที่มีข้อมูล
        const years = [...new Set(validData.map(item => item._date.year))].sort((a,b)=>b-a);
 
        const companyFilter = document.getElementById("companyFilter");
        const yearFilter = document.getElementById("yearFilter");
 
        companyFilter.innerHTML =
            `<option value="__all__">ทุกบริษัท</option>` +
            companies.map(c => `<option value="${c}">${c}</option>`).join("");
 
        if(years.length === 0){
            const currentYear = new Date().getFullYear() + 543;
            years.push(currentYear);
        }
 
        yearFilter.innerHTML = years.map(y => `<option value="${y}">ปี ${y}</option>`).join("");
 
        let currentView = "monthly";
 
        const btnMonthly = document.getElementById("btnMonthly");
        const btnYearly = document.getElementById("btnYearly");
        const chartTitle = document.getElementById("chartTitle");
        const emptyState = document.getElementById("emptyState");
        const canvasEl = document.getElementById("revenueChart");
 
        btnMonthly.addEventListener("click", () => {
            currentView = "monthly";
            btnMonthly.classList.add("active");
            btnYearly.classList.remove("active");
            yearFilter.style.display = "inline-block";
            render();
        });
 
        btnYearly.addEventListener("click", () => {
            currentView = "yearly";
            btnYearly.classList.add("active");
            btnMonthly.classList.remove("active");
            yearFilter.style.display = "none";
            render();
        });
 
        companyFilter.addEventListener("change", render);
        yearFilter.addEventListener("change", render);
 
        let chartInstance = null;
 
        function filteredByCompany(){
            const company = companyFilter.value;
            if(company === "__all__") return validData;
            return validData.filter(item => item.company === company);
        }
 
        function render(){
 
            try{
                renderChart();
            }catch(err){
                console.error("เกิดข้อผิดพลาดตอนแสดงกราฟ:", err);
                const emptyState = document.getElementById("emptyState");
                const canvasEl = document.getElementById("revenueChart");
                canvasEl.style.display = "none";
                emptyState.style.display = "block";
                emptyState.innerText = "เกิดข้อผิดพลาดในการแสดงกราฟ กรุณาเปิด Console (F12) เพื่อดูรายละเอียด";
            }
        }
 
        function renderChart(){
 
            const data = filteredByCompany();
 
            if(data.length === 0){
                emptyState.style.display = "block";
                canvasEl.style.display = "none";
                document.getElementById("statTotal").innerText = baht(0);
                document.getElementById("statAvg").innerText = baht(0);
                document.getElementById("statCount").innerText = "0 งาน";
                if(chartInstance) chartInstance.destroy();
                return;
            }
 
            emptyState.style.display = "none";
            canvasEl.style.display = "block";
 
            let labels = [];
            let values = [];
            let total = 0;
            let count = 0;
 
            if(currentView === "monthly"){
 
                const year = Number(yearFilter.value);
                const monthly = new Array(12).fill(0);
                const monthlyCount = new Array(12).fill(0);
 
                data.forEach(item=>{
                    if(item._date.year === year){
                        const idx = item._date.month - 1;
                        monthly[idx] += Number(item.total || 0);
                        monthlyCount[idx] += 1;
                    }
                });
 
                labels = monthNamesTH;
                values = monthly;
                total = monthly.reduce((a,b)=>a+b,0);
                count = monthlyCount.reduce((a,b)=>a+b,0);
 
                chartTitle.innerText = "รายได้รายเดือน ปี " + year;
 
            } else {
 
                const byYear = {};
 
                data.forEach(item=>{
                    const y = item._date.year;
                    byYear[y] = (byYear[y] || 0) + Number(item.total || 0);
                });
 
                const sortedYears = Object.keys(byYear).sort();
 
                labels = sortedYears.map(y => "ปี " + y);
                values = sortedYears.map(y => byYear[y]);
                total = values.reduce((a,b)=>a+b,0);
                count = data.length;
 
                chartTitle.innerText = "รายได้รายปี";
            }
 
            document.getElementById("statTotal").innerText = baht(total);
            document.getElementById("statAvg").innerText =
                baht(count > 0 ? Math.round(total / (currentView === "monthly" ? 12 : Math.max(labels.length,1))) : 0);
            document.getElementById("statCount").innerText = count + " งาน";
 
            const ctx = canvasEl.getContext("2d");
 
            if(chartInstance) chartInstance.destroy();
 
            const gradient = ctx.createLinearGradient(0,0,0,300);
            gradient.addColorStop(0, "#2F6FED");
            gradient.addColorStop(1, "#8C7CF0");
 
            chartInstance = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "รายได้ (บาท)",
                        data: values,
                        backgroundColor: gradient,
                        borderRadius: 10,
                        maxBarThickness: 46
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => ctx.parsed.y.toLocaleString() + " บาท"
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: (v) => v.toLocaleString()
                            },
                            grid: { color: "#E4EAF5" }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }
 
        render();
 
    </script>
 
    <script>
        // เช็คว่าโหลดไลบรารีกราฟ (Chart.js) จาก CDN สำเร็จหรือไม่
        window.addEventListener("load", function(){
            if(typeof Chart === "undefined"){
                const emptyState = document.getElementById("emptyState");
                const canvasEl = document.getElementById("revenueChart");
                if(emptyState && canvasEl){
                    canvasEl.style.display = "none";
                    emptyState.style.display = "block";
                    emptyState.innerText = "โหลดไลบรารีกราฟไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต แล้วรีเฟรชหน้านี้อีกครั้ง";
                }
            }
        });
    </script>
 
</body>
 
</html>
