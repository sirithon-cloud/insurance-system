<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=794, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>เอกสาร</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=block" rel="stylesheet">
<style>
 
    body{
    min-width:calc(210mm + 20px);
    margin:0;
    padding:0;
}
 
body {
    font-family:"Sarabun","TH Sarabun New",Tahoma,sans-serif;
    background:#e9ecef;
    padding:0 10px;
    font-size:13px;}
 
/* ================= เพิ่มเติม: ป้องกัน Font Rendering เพี้ยนข้ามอุปกรณ์ / ป้องกันข้อความล้น =================
   (ส่วนนี้เพิ่มใหม่ทั้งหมด ไม่ได้แก้ไขหรือลบกฎ CSS เดิมด้านบนแต่อย่างใด) */
html, body{
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
}
*, *::before, *::after{
    box-sizing:border-box;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}
.field-row > div, .num-block, .info-table td, table.grid td{
    overflow-wrap:break-word;
    word-break:break-word;
}
 
.btn-bar {
     max-width:900px; 
     margin:0 auto 15px; 
     display:flex; 
     gap:10px; 
     justify-content:flex-end; }
 
.btn-bar button { 
    padding:10px 18px; 
    border:none; 
    border-radius:6px; 
    cursor:pointer; 
    color:#fff; 
    font-size:14px; }
 
.btn-print { 
    background:#000; }
 
.btn-pdf {
     background:#0d6efd; }
 
.btn-jpg { 
    background:#198754; }
 
.small { 
    font-size:9px; 
    color:#333; 
    line-height:1.6; }
 
.pending-box { 
    text-align:center; 
    padding:60px 20px; 
    color:#c0392b; }
 
/* กรอบฟอร์มหลัก */
.app-box{
    border:none;
    padding:14px 18px;
}
 
/* หัวฟอร์ม: โลโก้ซ้าย / หัวเรื่อง-QR ขวา */
.form-top{
    display:flex;
    align-items:flex-start;
    gap:15px;
    border-bottom:none;
    padding-bottom:0px;
    margin-bottom:0px;
}
 
.form-top .small{
    font-size:12px;
    white-space:nowrap;
    margin-left:auto;
    margin-right:15px;
}
 
 
.form-top img.logo-img{ height:56px; }
.form-top .ttl{ text-align:center; flex:1; }
.form-top h1{ margin:0; font-size:16px; }
.form-title-underline{ text-align:center; font-weight:bold; font-size:15px; text-decoration:underline; margin-bottom:8px; }
 
.qr-corner{ text-align:center; }
.qr-corner img{ height:120px; }
.qr-corner .cap{ font-size:9px; background:#0b4fa242; padding:2px 4px; border-radius:4px; display:inline-block; margin-top:2px; }
 
/* ================= วิริยะ ================= */
.viriyah-content{
    border:2px solid #0B4EA2;
    border-radius:12px;
    padding:18px;
    margin:12px 0;
    line-height:1.3;
}
 
.viriyah-sign > div{
    border:2px solid #0B4EA2;
    border-radius:12px;
    padding:16px;
}
 
/* รายการหมายเลข 1,2,3... */
.num-block{ margin-bottom:8px; }
.num-block > .head{
    display:flex;
    gap:6px;
    color:#0B4EA2;   /* สีน้ำเงิน */
    font-weight:normal;
    font-size:10px;
    margin-left:20px;
}
.num-block > .head .no{ font-weight:normal; white-space:nowrap; }
.num-block .sub{ padding-left:18px; }
 
.field-line{ border-bottom:1px dotted #999; padding:0 4px; display:inline-block; min-width:60px; }
.field-row{ display:flex; gap:14px; flex-wrap:wrap; margin:4px 0; }
 
/* เพิ่มใหม่: ลดขนาดตัวอักษรเฉพาะบรรทัดข้อมูลรถ (ยี่ห้อ/ทะเบียนรถ/เลขตัวถัง/เลขเครื่องยนต์) เท่านั้น
   ป้องกันข้อความล้น/ชนกันตอน Export PDF/JPG โดยไม่กระทบขนาดตัวอักษรส่วนอื่นของเอกสาร
   ใช้ selector .document-page ...  เพื่อให้ specificity สูงกว่ากฎ .document-page * ที่มีอยู่เดิม */
.document-page .field-row-vehicle,
.document-page .field-row-vehicle *{
    font-size:10px !important;
}
.field-row-vehicle{ gap:8px; }
.field-row-vehicle > div{ min-width:108px; flex:1 1 0; }
.field-row-vehicle .lbl{ margin-right:2px; }
.field-row-vehicle .field-line{ min-width:40px; padding:0 2px; }
.field-row > div{ flex:1; min-width:140px; }
.field-row .lbl{ font-weight:bold; margin-right:4px; }
.receipt-fields .lbl{ display:inline-block; min-width:145px; font-weight:bold; margin-right:4px; vertical-align:top; }
 
.chk{ margin-right:14px; white-space:nowrap; }
.chk .box{ display:inline-block; width:11px; height:11px; border:1px solid #000; margin-right:3px; position:relative; top:1px; }
.chk .box.on::after{ content:"✓"; position:absolute; left:-1px; top:-4px; font-size:11px; }
 
table.grid{ width:100%; border-collapse:collapse; font-size:11.5px; margin-top:6px; }
table.grid th, table.grid td{ border:1px solid #000; padding:5px 6px; text-align:center; }
table.grid th{ background:#f0f2f5; }
 
.premium-table{
    width:85%;
    margin:12px auto;
    border-collapse:collapse;
    font-size:11px;
}
 
.premium-table td{
    border:1px solid #000;
    padding:4px 6px;
    text-align:center;
}
 
.premium-table .cap{
    font-size:9.5px;
    color:#333;
}
 
.premium-table .val{
    font-size:12px;
    font-weight:bold;
}
.sign-2col{ display:flex; justify-content:space-between; margin-top:35px; gap:20px; }
.sign-2col > div{ flex:1; text-align:center; }
 
.info-table{ width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
.info-table td{ border:1px solid #999; padding:6px 8px; }
.info-table td.lbl{ background:#f5f6f8; font-weight:bold; width:38%; }
 
.claim-box{ text-align:right; }
.claim-box .tt{ color:#c0392b; font-weight:bold; font-size:18px; }
.claim-box .ph{ color:#0d6efd; font-weight:bold; font-size:18px; }
 
.section-head{ background:none; color:#000; border-bottom:2px solid #000; padding:4px 2px; margin:16px 0 10px; font-size:14px; font-weight:bold; }
.amount-box { border:1px solid #000; padding:10px 15px; text-align:center; float:right; width:220px; margin-top:10px; }
.amount-box .num { font-size:20px; font-weight:bold; margin:6px 0; }
 
.sign-line2{
    text-align:center;
    font-weight:bold;
    color:#000;
    margin:18px 0 6px;
    padding-bottom:6px;
    border-bottom:1px dashed #888;
    font-size:10px;
}
 
 
.document-list{ max-width:900px; margin:0 auto; text-align:center; }
.document-list h2 { color:#002d72; margin-bottom:15px; }
 
.document-page{
    width:210mm;
    max-width:210mm;
    height:297mm;
    margin:0 auto 40px;
    background:#fff;
    border:0px solid #333333;
    padding:0px 0px 0px 0px;
    page-break-after:always;
    break-after:page;
    box-sizing:border-box;
    box-shadow:0 0 6px rgba(0,0,0,0.15);
    overflow:hidden;
    position:relative;
    flex-shrink:0;
}
 
.document-page:last-child{ page-break-after:auto; break-after:auto; }
 
.document-page > .app-box{
    min-height:100%;
    box-sizing:border-box;
}
 
/* กล่องในสุดที่ครอบเนื้อหาจริง ใช้สำหรับย่อขนาด (scale) ให้พอดี 1 หน้า A4
   เพิ่ม: ทำให้เป็น flex column สูงเต็มหน้า เพื่อให้เนื้อหาเอกสาร (เช่น carrier-app-form)
   สามารถกระจายเต็มพื้นที่ A4 ได้ด้วยตัวเว้นวรรคแบบยืดหยุ่น (flex spacer) แทนที่จะค้างชิดบน
   หมายเหตุ: เอกสารประเภทอื่นที่ไม่ได้ตั้ง flex-grow ของตัวเอง จะแสดงผลเหมือนเดิมทุกประการ */
.page-scale{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    transform-origin:top left;
    box-sizing:border-box;
}
 
/* ================= จัดรูปแบบเอกสารราชการ: ขนาดตัวอักษรเท่ากันทุกหน้า ระยะบรรทัดโปร่งขึ้น ================= */
.document-page, .document-page *{
    font-size:10.5px !important;
    line-height:1.7 !important;
}
.document-page h1{ font-size:17px !important; }
.document-page .form-title-underline{ font-size:15px !important; }
.document-page table.grid th,
.document-page table.grid td,
.document-page .premium-table td,
.document-page .info-table td{ line-height:1.5 !important; }
 
/* เพิ่มใหม่: ลดขนาดตัวอักษรเฉพาะเนื้อหา (ย่อหน้า) ของหน้า "หนังสือขอบอกเลิกสัญญาประกันภัย" (id="cancel") เล็กน้อย
   ป้องกันข้อความล้นหน้า โดยไม่กระทบหัวเรื่อง ลายเซ็น ข้อความท้ายหน้า หรือเอกสารหน้าอื่น */
#cancel p{
    font-size:11.5px !important;
}
 
/* เพิ่มใหม่: ลดขนาดตัวอักษรเฉพาะหัวข้อ (h1) ของหน้า "หนังสือขอบอกเลิกสัญญาประกันภัย" (id="cancel") เล็กน้อย
   ไม่กระทบตัวอักษรเนื้อหา ลายเซ็น หรือเอกสารหน้าอื่น */
#cancel h1{
    font-size:15px !important;
}
 
/* หน้าวิริยะ (ใบคำขอฯ ต้นแบบ): แก้เฉพาะขนาดตัวอักษรให้ใหญ่ขึ้นและบรรทัดห่างขึ้น ไม่แตะโครงสร้าง */
.viriyah-only-form, .viriyah-only-form *{
    font-size:12.5px !important;
    line-height:1.7 !important;
}
.viriyah-only-form .form-top .small{ font-size:12px !important; }
 
/* เพิ่มใหม่: ย่อพื้นที่เนื้อหาทั้งหมดของหน้า "ใบคำขอเอาประกันภัยวิริยะ" (main) เข้ามาเท่า ๆ กันทุกด้าน
   เพื่อให้มีขอบกระดาษมากขึ้นเวลา Export PDF/JPG โดยไม่ใช้ transform/scale ไม่ลดขนาดตัวอักษร
   และไม่เปลี่ยนตำแหน่งของแต่ละส่วนที่สัมพันธ์กัน (ปรับเฉพาะ width/max-width/padding/margin)
   ใช้ scope เฉพาะ .viriyah-main-shrink ซึ่งครอบเฉพาะหน้านี้เท่านั้น จึงไม่กระทบหน้าเอกสารอื่น */
.viriyah-main-shrink{
    box-sizing:border-box;
    width:100%;
    max-width:100%;
    height:100%;
    margin:0 auto;
    padding:12mm;
}
 
/* หน้าใบคำขอเอาประกันภัยความรับผิดของผู้ขนส่ง */
.carrier-app-form,
.carrier-app-form *{
    font-size:10px !important;
    line-height:1.4 !important;
}
 
.carrier-app-form h1{
    font-size:18px !important;
    font-weight:bold;
}
 
.carrier-app-form.app-box{
    padding:26px 32px !important;
    display:flex;
    flex-direction:column;
    flex:1 1 auto;
    min-height:0;
}

.carrier-app-form .claim-box > .tt{
    font-size:20px !important;
}

.carrier-app-form .claim-box > .ph{
    font-size:18px !important;
}


.carrier-app-form .num-block{ margin-bottom:8px; }
.carrier-app-form .num-block .sub{ margin-top:3px; }
.carrier-app-form .num-block > .head,
.carrier-app-form .num-block > .head .no{ font-size:11.5px !important; }
.carrier-app-form .num-block > .sub{ font-size:11.5px !important; }
.carrier-app-form .num-block > .sub.sub-keep{ font-size:10px !important; }
.carrier-app-form .qr-corner .cap{ font-size:9px !important; }
.carrier-app-form .qr-corner div[style*="color:red"]{ font-size:10px !important; }
.carrier-app-form .field-line{ min-width:0; }
.carrier-app-form .official-sign-space{ margin-top:36px !important; }
.carrier-app-form .premium-table{ margin:20px auto; }
.carrier-app-form .form-title-underline{ margin-bottom:14px; }
 
/* พื้นที่เว้นสำหรับลงลายมือชื่อในเอกสารราชการหน้าอื่นๆ */
.official-sign-space{ margin-top:110px !important; }
.qr-bottom{ text-align:center; margin-top:22px; }
.qr-bottom img{ height:85px; }
.qr-bottom .cap{ margin-top:4px; font-size:10px !important; }
 
@media print {
    @page{ size:A4; margin:0; }
    .btn-bar, .document-list{ display:none; }
    html, body{ background:#fff; padding:0; margin:0; min-width:0; width:auto; }
    .document-page{
        width:210mm; max-width:210mm; height:297mm; margin:0; padding:0mm 0mm 0mm 0mm;
        border:none; box-shadow:none; page-break-after:always; break-after:page;
        overflow:hidden;
    }
    .document-page:last-child{ page-break-after:auto; break-after:auto; }
    .document-page > .app-box{
        min-height:100%;
    }
}
 
/* ==========================================================
   AXA (แอกซ่า) - เอกสารต้นฉบับ 3 หน้าเต็ม (ใบเสนอราคา/ใบขอเอาประกันภัย)
   สโคปทั้งหมดไว้ใต้ .axa3 เพื่อไม่กระทบดีไซน์ของเอกสารบริษัทอื่น ๆ
   (ก็อปปี้ดีไซน์ต้นฉบับมาแบบคำต่อคำ เปลี่ยนเฉพาะสิ่งที่จำเป็นเพื่อให้ทำงานร่วมกับแอปได้:
   - เปลี่ยน .page เดิม เป็นใช้กลไก .document-page/.page-scale ของแอปแทน (ไม่ซ้ำซ้อนกรอบหน้า)
   - เปลี่ยนชื่อคลาส .chk เดิม เป็น .axa-chk เพื่อไม่ชนกับคลาส .chk ของแอป
   - เพิ่ม !important/สโคปให้ชนะกฎ font-size สากลของแอปที่ (.document-page *) ================= */
.axa3, .axa3 *{
    font-size:11px !important;
    line-height:1.65 !important;
    box-sizing:border-box;
}
.axa3{
    font-family:"Sarabun","TH Sarabun New",Tahoma,sans-serif;
    color:#1a1a1a;
    position:relative;
    width:100%;
    height:100%;
    padding:26px 28px 3px 28px;
    display:flex;
    flex-direction:column;
}
.axa3 .producer-code{
    position:absolute; top:22px; right:32px;
    font-style:italic; font-size:10px !important;
}
.axa3 .producer-code .line{
    display:inline-block; border-bottom:1px solid #1a1a1a; width:120px; margin-left:4px;
}
.axa3 .axa-logo{ position:absolute; top:20px; left:32px; height:44px; width:auto; }
#page1 .axa-logo{ height:60px !important; }
.axa3 .doc-title{ text-align:center; font-weight:700; font-size:18.5px !important; margin:8px 0 2px 0; }
.axa3 .doc-subtitle{ text-align:center; font-weight:700; font-size:17px !important; margin:0 0 6px 0; }
.axa3 .claim-notice{ text-align:center; color:#c0392b; font-weight:700; margin:2px 0 6px 0; font-size:14px !important; }
.axa3 .meta-row{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; font-size:11px !important; margin-bottom:2px; }
.axa3 .valid-note{ text-align:center; font-weight:700; text-decoration:underline; margin:3px 0 5px 0; font-size:11px !important; }
.axa3 table.info{ width:100%; table-layout:fixed; border-collapse:collapse; margin-bottom:0; }
.axa3 table.info td{ border:1px solid #333; vertical-align:top; padding:4px 8px; word-wrap:break-word; overflow-wrap:break-word; }
.axa3 table.info, .axa3 table.info *{ line-height:1.35 !important; }
.axa3 table.info td.label{ width:150px; font-weight:600; font-size:11px !important; }
.axa3 table.info td.colon{ width:20px; text-align:center; }
.axa3 .sub{ font-size:10.5px !important; color:#444; text-align:left; margin-top:1px; }
.axa3 .indent{ margin:2px 0 2px 12px; }
.axa3 .period-options{ display:flex; gap:22px; align-items:center; flex-wrap:wrap; }
.axa3 .period-options label{ display:inline-flex; align-items:center; gap:4px; font-weight:600; }
.axa3 .period-dates{ display:flex; gap:24px; margin-top:6px; align-items:baseline; flex-wrap:wrap; }
.axa3 .vehicle-fields{ display:flex; gap:18px; margin-top:6px; flex-wrap:wrap; }
.axa3 ol.limits{ margin:0; padding-left:15px; }
.axa3 ol.limits li{ margin-bottom:3px; }
.axa3 .amt-line{ display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:4px 10px; }
.axa3 .fill-line{ text-decoration:underline; font-weight:600; }
.axa3 .fill-line-block{ display:block; border-bottom:1px solid #000; font-weight:600; min-height:17px; width:100%; }
.axa3 .amt-fill{ text-decoration:underline; font-weight:600; min-width:90px; text-align:right; padding-right:4px; white-space:nowrap; }
.axa3 table.premium{ width:100%; border-collapse:collapse; font-size:11px !important; table-layout:fixed; margin-top:0; margin-bottom:6px; }
.axa3 table.premium, .axa3 table.premium *{ line-height:1.2 !important; }
.axa3 table.premium th, .axa3 table.premium td{ border:1px solid #333; padding:3px 3px; text-align:center; vertical-align:middle; word-break:break-word; }
.axa3 table.premium th{ font-weight:700; background:#fafafa; }
.axa3 table.premium td.axa-chk-amt{ text-align:center; font-weight:600; }
.axa3 table.premium td.axa-chk-amt .axa-box{ vertical-align:middle; margin-right:4px; }
/* กล่องติ๊กแบบขีดถูก (ใช้แทน input checkbox เดิม เพื่อให้แสดงผลถูกต้องตอน Export PDF/JPG) */
.axa3 .axa-box{
    display:inline-block;
    width:11px;
    height:11px;
    border:1px solid #000;
    position:relative;
    top:1px;
    margin-right:3px;
    vertical-align:middle;
    cursor:pointer;
}
.axa3 .axa-box.on::after{
    content:"✓";
    position:absolute;
    left:-1px;
    top:-4px;
    font-size:11px;
    line-height:1;
}
.axa3 .footer-company{ margin-top:auto !important; padding-top:6px; font-size:10px !important; line-height:1.3 !important; color:#002d72; }
#page1 .footer-company{ margin-bottom:18px !important; }
.axa3 .footer-company *{ font-size:10px !important; line-height:1.3 !important; color:#002d72; }
.axa3 .footer-company .th-name{ font-weight:700; }
.axa3 .page-num{ margin-top:auto; padding-top:10px; font-size:10px !important; color:#555; text-align:right; }
.axa3 table.detail{ width:100%; table-layout:fixed; border-collapse:collapse; margin-top:70px; }
.axa3 table.detail td{ border:1px solid #333; vertical-align:top; padding:7px 9px; word-wrap:break-word; overflow-wrap:break-word; }
.axa3 table.detail td.label{ width:150px; font-weight:600; font-size:11px !important; }
.axa3 table.detail td.colon{ width:20px; text-align:center; }
.axa3 table.detail p{ margin:0 0 5px 0; }
.axa3 table.detail p:last-child{ margin-bottom:0; }

   - แก้ไข: เปลี่ยนเฉพาะ "วันที่" (ตัวเลขวัน) ให้เป็นวันเดียวกับวันที่ลูกค้าเริ่ม (data.start) เสมอ
     ส่วน "เดือน" ยังคงคำนวณด้วยวิธีเดิม (บวก 30 วันต่อคู่งวด เพื่อกะเดือนถัดไป) 
   - กรณีเดือนนั้นไม่มีวันที่ตรงกับวันเริ่ม (เช่น เริ่มวันที่ 31 แต่เดือนถัดไปมีแค่ 30 วัน)
     จะใช้วันสุดท้ายของเดือนนั้นแทน เพื่อไม่ให้วันที่เพี้ยนข้ามเดือนไปอีก */
function getCustomerStartDay() {
    if (!data.start) return null;

    const s = String(data.start).trim();

    let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{3,4})$/);
    if (m) return parseInt(m[1], 10);

    m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return parseInt(m[3], 10);

    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.getDate();

    return null;
}

function applyCustomerStartDay(date, startDay) {
    if (!startDay) return date;

    const year = date.getFullYear();
    const month = date.getMonth();
    const lastDayOfMonth = new Date(year, month + 1, 0).getDate();

    return new Date(year, month, Math.min(startDay, lastDayOfMonth));
}

function getInstallmentDueDate(contractDate, installmentIndex, startDay) {
    const due = new Date(contractDate);
    due.setDate(due.getDate() + 30 * (installmentIndex + 1));
    return applyCustomerStartDay(due, startDay);
}

function numberToThaiText(numStr) {
    const num = Number(numStr || 0);
    if (isNaN(num) || num === 0) return "-";
    const numText = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
    const digitText = ["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
    function convert(n) {
        n = String(n);
        let result = "";
        const len = n.length;
        for (let i = 0; i < len; i++) {
            const digit = parseInt(n[i]);
            const place = len - i - 1;
            if (digit === 0) continue;
            if (place === 0 && digit === 1 && len > 1) result += "เอ็ด";
            else if (place === 1 && digit === 1) result += "สิบ";
            else if (place === 1 && digit === 2) result += "ยี่สิบ";
            else {
                result += numText[digit] + digitText[place % 6 > 0 || place === 0 ? place % 6 : 0];
                if (place >= 6) result += "ล้าน";
            }
        }
        return result;
    }
    const parts = num.toFixed(2).split(".");
    let baht = convert(parseInt(parts[0]));
    const satang = parseInt(parts[1]);
    return baht + "บาท" + (satang === 0 ? "ถ้วน" : convert(satang) + "สตางค์");
}

function toBuddhistDate(d) {
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy = d.getFullYear() + 543;
    return `${dd}/${mm}/${yyyy}`;
}

/* แปลงวันที่ที่กรอกเป็นสตริง (เช่น data.start / data.end) ให้เป็น พ.ศ. เสมอ
   รองรับรูปแบบ DD/MM/YYYY และ YYYY-MM-DD; ถ้าปีดูเหมือนเป็น พ.ศ. อยู่แล้ว (>=2400) จะไม่บวกซ้ำ */
function toBEDateStr(v) {
    if (!v || v === "-") return v;
    const s = String(v).trim();
    let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{3,4})$/);
    if (m) {
        const dd = m[1].padStart(2, "0");
        const mo = m[2].padStart(2, "0");
        let yyyy = parseInt(m[3], 10);
        if (yyyy < 2400) yyyy += 543;
        return `${dd}/${mo}/${yyyy}`;
    }
    m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) {
        let yyyy = parseInt(m[1], 10);
        const mo = m[2].padStart(2, "0");
        const dd = m[3].padStart(2, "0");
        if (yyyy < 2400) yyyy += 543;
        return `${dd}/${mo}/${yyyy}`;
    }
    const d = new Date(s);
    if (!isNaN(d.getTime())) return toBuddhistDate(d);
    return s;
}

function toThaiFullDate(d) {

   ไม่แก้ไข toBuddhistDate/toBEDateStr เดิม เพื่อไม่ให้กระทบหน้าเอกสารอื่น */
function toBEDateStrShort(v) {
    const s = toBEDateStr(v);
    if (!s || s === "-") return s;
    const parts = s.split("/");
    if (parts.length === 3) {

    return s;
}

function renderInvoice() {

        const parts = String(data.start).split("/");
        if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
        const d = new Date(data.start);
        return isNaN(d) ? new Date() : d;
    })();
 
    let instRows = "";
    installments.forEach((amt, i) => {
        const due = new Date(baseDate);
        due.setMonth(due.getMonth() + i);

                <td>${due.toLocaleDateString("th-TH")}</td>
                <td style="text-align:right;">${fmt(amt)}</td>

/* ==========================================================
   เอกสารที่ต้องแสดงของแต่ละบริษัท
========================================================== */
const COMPANY_DOCS = {
    "วิริยะ":   ["main", "contract", "cancel", "receipt"],
    "เมืองไทย": ["main", "contract", "cancel", "poa"],
    "AIG":      ["main", "poa", "cancel", "contract"],
    "แอกซ่า":   ["main", "contract", "poa"],
    "AXA":      ["main", "contract", "poa"],
    "KWI":      ["main", "contract", "cancel", "poa"],
    "กรุงเทพ":  ["main"]
};
 
const docArea=document.getElementById("docArea");
 
function getDocumentHTML(type){
 
    let company=data.company;
    const meta = COMPANY_META[company] || COMPANY_META["เมืองไทย"];
 
    if(type==="main"){
        if(company==="วิริยะ") return renderviriyahMain();
        if(company==="เมืองไทย") return renderMuangthaiMain();
        if(company==="AIG") return renderAigMain();
        if(company==="AXA" || company==="แอกซ่า") return renderAxaMain();
        if(company==="KWI") return renderKwiMain();
        if(company==="กรุงเทพ") return renderBangkokMain();
    }
 
    if(type==="contract"){
        if(company==="วิริยะ") return renderviriyahContract();
        return renderBrokerContract(meta.fullName);
    }
 
    if(type==="cancel"){
        return renderCancelLetter(meta.fullName);
    }
 
    if(type==="poa"){
        return renderPowerOfAttorney(meta.fullName);
    }
 
    if(type==="receipt"){
        if(company==="วิริยะ")
            return renderReceipt(AGENT_viriyah, "ประกันความรับผิดของผู้ขนส่งสินค้า");
        return renderReceipt(
            BROKER_GENERAL,
            data.type==="car" ? "ประกันรถยนต์" : "กรมธรรม์ประกันความรับผิดของผู้ขนส่ง"
        );
    }
 
    if(type==="invoice")
        return renderInvoice();
 
    return renderPending(type);
}
 
const docsForThisCompany = COMPANY_DOCS[data.company] || COMPANY_DOCS["เมืองไทย"];
 
docsForThisCompany.forEach(type=>{
    // getDocumentHTML อาจคืนค่าเป็นสตริงหน้าเดียว (ปกติ) หรืออาร์เรย์ของหลายหน้า
    // (เช่น เอกสาร AXA ต้นฉบับ 3 หน้า) — ทำให้แต่ละหน้าในอาร์เรย์กลายเป็น .document-page จริงแยกกัน
    const html = getDocumentHTML(type);
    const pagesHtml = Array.isArray(html) ? html : [html];

    pagesHtml.forEach((pageHtml, idx)=>{
        let div=document.createElement("div");
        div.className="document-page";
        div.id = pagesHtml.length > 1 ? `${type}_${idx+1}` : type;
        div.dataset.doctype = type;

        let inner=document.createElement("div");
        inner.className="page-scale";
        inner.innerHTML=pageHtml;

        div.appendChild(inner);
        docArea.appendChild(div);
    });
});
 
/* ==========================================================
   บังคับให้เนื้อหาแต่ละเอกสารพอดี 1 หน้า A4 เป๊ะ
   โดยย่อขนาด (scale) ทั้งกล่องลงอัตโนมัติถ้าเนื้อหายาวเกินหน้า
========================================================== */
function fitPagesToA4(){
    document.querySelectorAll(".document-page").forEach(page=>{
        const inner = page.querySelector(".page-scale");
        if(!inner) return;
 
        // รีเซ็ตก่อนวัดขนาดจริงทุกครั้ง
        inner.style.transform="none";
        inner.style.width="100%";
 
        const pageHeight = page.clientHeight;
        const contentHeight = inner.scrollHeight;
 
        if(contentHeight > pageHeight){
            const scale = pageHeight / contentHeight;
            inner.style.transform=`scale(${scale})`;
            inner.style.width=(100/scale)+"%";
        }
    });
}
 
// เรียกทันทีหลัง render และเรียกซ้ำหลังโลโก้/รูปโหลดเสร็จ (กันความสูงคลาดเคลื่อน)
fitPagesToA4();
window.addEventListener("load", fitPagesToA4);
window.addEventListener("beforeprint", fitPagesToA4);
setTimeout(fitPagesToA4, 500);
setTimeout(fitPagesToA4, 1500);
 
/* ==========================================================
   บันทึกเป็น JPG / PDF
========================================================== */
function safeFileName(s) {
    return (s || "ไฟล์").toString().trim().replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");
}
const fileBase = safeFileName(data.customer) + "_" + safeFileName(data.plate);
 
async function saveJPG() {
    await document.fonts.ready; // รอฟอนต์โหลดเสร็จจริงก่อน (เพิ่มใหม่ ป้องกันฟอนต์ยังไม่พร้อมตอน capture)
    fitPagesToA4();
    await new Promise(r => setTimeout(r, 100)); // รอ layout นิ่งก่อน capture
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); // เพิ่มใหม่ รอ repaint นิ่งอีกชั้น
 
    const pageLabels = {
        main: "ใบคำขอ",
        contract: "สัญญา",
        cancel: "ใบยกเลิก",
        poa: "หนังสือมอบอำนาจ",
        receipt: "ใบรับเงิน",
        invoice: "ใบแจ้งหนี้"
    };
 
    const pages = document.querySelectorAll(".document-page");
    const files = [];
 
    // capture ทีละหน้าแยกกัน เพื่อให้ได้ไฟล์ JPG ขนาด A4 คนละไฟล์ ไม่ติดกัน
    for (let i = 0; i < pages.length; i++) {
        const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#ffffff", useCORS: true, letterRendering: true });
        const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.95));
        const label = pageLabels[pages[i].dataset.doctype || pages[i].id] || pages[i].id || (i + 1);
        const fileName = `${fileBase}_${i + 1}_${label}.jpg`;
        files.push(new File([blob], fileName, { type: "image/jpeg" }));
    }
 
    // มือถือที่รองรับ: เปิดเมนูแชร์ของเครื่อง ส่งทุกภาพไปพร้อมกัน ผู้ใช้เลือกบันทึกแต่ละภาพเข้าแกลลอรี่ได้
    if (navigator.canShare && navigator.canShare({ files })) {
        try {
            await navigator.share({ files, title: fileBase });
            return;
        } catch (err) {
            // ผู้ใช้กดยกเลิก หรืออุปกรณ์แชร์ไม่สำเร็จ -> ดาวน์โหลดทีละไฟล์แทน
        }
    }
 
    // เบราว์เซอร์ที่ไม่รองรับการแชร์ไฟล์: ดาวน์โหลดทีละไฟล์แยกกัน (เว้นจังหวะกันเบราว์เซอร์บล็อก)
    for (const file of files) {
        const link = document.createElement("a");
        link.download = file.name;
        link.href = URL.createObjectURL(file);
        link.click();
        await new Promise(r => setTimeout(r, 300));
    }
}
 
async function downloadPDF() {
    const btn = document.querySelector(".btn-pdf");
    const originalText = btn.innerText;
    btn.innerText = "⏳ กำลังสร้าง PDF...";
    btn.disabled = true;
 
    try {
        await document.fonts.ready; // รอฟอนต์โหลดเสร็จจริงก่อน (เพิ่มใหม่ ป้องกันฟอนต์ยังไม่พร้อมตอน capture)
        fitPagesToA4();
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); // เพิ่มใหม่ รอ repaint นิ่งก่อน capture
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: "mm", format: "a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
 
        const pages = document.querySelectorAll(".document-page");
        for (let i = 0; i < pages.length; i++) {
            const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#ffffff", useCORS: true, letterRendering: true });
            const imgData = canvas.toDataURL("image/jpeg", 0.95);
            const ratio = Math.min(pageW / canvas.width, pageH / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;
            const x = (pageW - imgW) / 2;
            const y = 0;
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, "JPEG", x, y, imgW, imgH);
        }
        pdf.save(fileBase + ".pdf");
    } catch (err) {
        alert("สร้าง PDF ไม่สำเร็จ: " + err.message);
        console.error(err);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
 
document.title = fileBase;
 
 
</script>
 
</body>
