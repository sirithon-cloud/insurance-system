<style>
 
    body{
    min-width:calc(210mm + 20px);
    margin:0;
    padding:0;
}
 
body {
    font-family:"Sarabun","TH Sarabun New",Tahoma,sans-serif;
    background:#e9ecef;
    padding:0 10px;
    font-size:13px;}
 
/* ================= เพิ่มเติม: ป้องกัน Font Rendering เพี้ยนข้ามอุปกรณ์ / ป้องกันข้อความล้น =================
   (ส่วนนี้เพิ่มใหม่ทั้งหมด ไม่ได้แก้ไขหรือลบกฎ CSS เดิมด้านบนแต่อย่างใด) */
html, body{
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
}
*, *::before, *::after{
    box-sizing:border-box;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}
.field-row > div, .num-block, .info-table td, table.grid td{
    overflow-wrap:break-word;
    word-break:break-word;
}
 
.btn-bar {
     max-width:900px; 
     margin:0 auto 15px; 
     display:flex; 
     gap:10px; 
     justify-content:flex-end; }
 
.btn-bar button { 
    padding:10px 18px; 
    border:none; 
    border-radius:6px; 
    cursor:pointer; 
    color:#fff; 
    font-size:14px; }
 
.btn-print { 
    background:#000; }
 
.btn-pdf {
     background:#0d6efd; }
 
.btn-jpg { 
    background:#198754; }
 
.small { 
    font-size:9px; 
    color:#333; 
    line-height:1.6; }
 
.pending-box { 
    text-align:center; 
    padding:60px 20px; 
    color:#c0392b; }
 
/* กรอบฟอร์มหลัก */
.app-box{
    border:none;
    padding:14px 18px;
}
 
/* หัวฟอร์ม: โลโก้ซ้าย / หัวเรื่อง-QR ขวา */
.form-top{
    display:flex;
    align-items:flex-start;
    gap:15px;
    border-bottom:none;
    padding-bottom:0px;
    margin-bottom:0px;
}
 
.form-top .small{
    font-size:12px;
    white-space:nowrap;
    margin-left:auto;
    margin-right:15px;
}
 
 
.form-top img.logo-img{ height:56px; }
.form-top .ttl{ text-align:center; flex:1; }
.form-top h1{ margin:0; font-size:16px; }
.form-title-underline{ text-align:center; font-weight:bold; font-size:15px; text-decoration:underline; margin-bottom:8px; }
 
.qr-corner{ text-align:center; }
.qr-corner img{ height:120px; }
.qr-corner .cap{ font-size:9px; background:#0b4fa242; padding:2px 4px; border-radius:4px; display:inline-block; margin-top:2px; }
 
/* ================= วิริยะ ================= */
.viriyah-content{
    border:2px solid #0B4EA2;
    border-radius:12px;
    padding:18px;
    margin:12px 0;
    line-height:1.3;
}
 
.viriyah-sign > div{
    border:2px solid #0B4EA2;
    border-radius:12px;
    padding:16px;
}
 
/* รายการหมายเลข 1,2,3... */
.num-block{ margin-bottom:8px; }
.num-block > .head{
    display:flex;
    gap:6px;
    color:#0B4EA2;   /* สีน้ำเงิน */
    font-weight:normal;
    font-size:10px;
    margin-left:20px;
}
.num-block > .head .no{ font-weight:normal; white-space:nowrap; }
.num-block .sub{ padding-left:18px; }
 
.field-line{ border-bottom:1px dotted #999; padding:0 4px; display:inline-block; min-width:60px; }
.field-row{ display:flex; gap:14px; flex-wrap:wrap; margin:4px 0; }
 
/* เพิ่มใหม่: ลดขนาดตัวอักษรเฉพาะบรรทัดข้อมูลรถ (ยี่ห้อ/ทะเบียนรถ/เลขตัวถัง/เลขเครื่องยนต์) เท่านั้น
   ป้องกันข้อความล้น/ชนกันตอน Export PDF/JPG โดยไม่กระทบขนาดตัวอักษรส่วนอื่นของเอกสาร
   ใช้ selector .document-page ...  เพื่อให้ specificity สูงกว่ากฎ .document-page * ที่มีอยู่เดิม */
.document-page .field-row-vehicle,
.document-page .field-row-vehicle *{
    font-size:10px !important;
}
.field-row-vehicle{ gap:8px; }
.field-row-vehicle > div{ min-width:108px; flex:1 1 0; }
.field-row-vehicle .lbl{ margin-right:2px; }
.field-row-vehicle .field-line{ min-width:40px; padding:0 2px; }
.field-row > div{ flex:1; min-width:140px; }
.field-row .lbl{ font-weight:bold; margin-right:4px; }
.receipt-fields .lbl{ display:inline-block; min-width:145px; font-weight:bold; margin-right:4px; vertical-align:top; }
 
.chk{ margin-right:14px; white-space:nowrap; }
.chk .box{ display:inline-block; width:11px; height:11px; border:1px solid #000; margin-right:3px; position:relative; top:1px; }
.chk .box.on::after{ content:"✓"; position:absolute; left:-1px; top:-4px; font-size:11px; }
 
table.grid{ width:100%; border-collapse:collapse; font-size:11.5px; margin-top:6px; }
table.grid th, table.grid td{ border:1px solid #000; padding:5px 6px; text-align:center; }
table.grid th{ background:#f0f2f5; }
 
.premium-table{
    width:85%;
    margin:12px auto;
    border-collapse:collapse;
    font-size:11px;
}
 
.premium-table td{
    border:1px solid #000;
    padding:4px 6px;
    text-align:center;
}
 
.premium-table .cap{
    font-size:9.5px;
    color:#333;
}
 
.premium-table .val{
    font-size:12px;
    font-weight:bold;
}
.sign-2col{ display:flex; justify-content:space-between; margin-top:35px; gap:20px; }
.sign-2col > div{ flex:1; text-align:center; }
 
.info-table{ width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
.info-table td{ border:1px solid #999; padding:6px 8px; }
.info-table td.lbl{ background:#f5f6f8; font-weight:bold; width:38%; }
 
.claim-box{ text-align:right; }
.claim-box .tt{ color:#c0392b; font-weight:bold; font-size:18px; }
.claim-box .ph{ color:#0d6efd; font-weight:bold; font-size:18px; }
 
.section-head{ background:none; color:#000; border-bottom:2px solid #000; padding:4px 2px; margin:16px 0 10px; font-size:14px; font-weight:bold; }
.amount-box { border:1px solid #000; padding:10px 15px; text-align:center; float:right; width:220px; margin-top:10px; }
.amount-box .num { font-size:20px; font-weight:bold; margin:6px 0; }
 
.sign-line2{
    text-align:center;
    font-weight:bold;
    color:#000;
    margin:18px 0 6px;
    padding-bottom:6px;
    border-bottom:1px dashed #888;
    font-size:10px;
}
 
 
.document-list{ max-width:900px; margin:0 auto; text-align:center; }
.document-list h2 { color:#002d72; margin-bottom:15px; }
 
.document-page{
    width:210mm;
    max-width:210mm;
    height:297mm;
    margin:0 auto 40px;
    background:#fff;
    border:0px solid #333333;
    padding:0px 0px 0px 0px;
    page-break-after:always;
    break-after:page;
    box-sizing:border-box;
    box-shadow:0 0 6px rgba(0,0,0,0.15);
    overflow:hidden;
    position:relative;
    flex-shrink:0;
}
 
.document-page:last-child{ page-break-after:auto; break-after:auto; }
 
.document-page > .app-box{
    min-height:100%;
    box-sizing:border-box;
}
 
/* กล่องในสุดที่ครอบเนื้อหาจริง ใช้สำหรับย่อขนาด (scale) ให้พอดี 1 หน้า A4
   เพิ่ม: ทำให้เป็น flex column สูงเต็มหน้า เพื่อให้เนื้อหาเอกสาร (เช่น carrier-app-form)
   สามารถกระจายเต็มพื้นที่ A4 ได้ด้วยตัวเว้นวรรคแบบยืดหยุ่น (flex spacer) แทนที่จะค้างชิดบน
   หมายเหตุ: เอกสารประเภทอื่นที่ไม่ได้ตั้ง flex-grow ของตัวเอง จะแสดงผลเหมือนเดิมทุกประการ */
.page-scale{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    transform-origin:top left;
    box-sizing:border-box;
}
 
/* ================= จัดรูปแบบเอกสารราชการ: ขนาดตัวอักษรเท่ากันทุกหน้า ระยะบรรทัดโปร่งขึ้น ================= */
.document-page, .document-page *{
    font-size:10.5px !important;
    line-height:1.7 !important;
}
.document-page h1{ font-size:17px !important; }
.document-page .form-title-underline{ font-size:15px !important; }
.document-page table.grid th,
.document-page table.grid td,
.document-page .premium-table td,
.document-page .info-table td{ line-height:1.5 !important; }

   ป้องกันข้อความล้นหน้า โดยไม่กระทบหัวเรื่อง ลายเซ็น ข้อความท้ายหน้า หรือเอกสารหน้าอื่น */
#cancel p{
    font-size:11.5px !important;
}
 
/* เพิ่มใหม่: ลดขนาดตัวอักษรเฉพาะหัวข้อ (h1) ของหน้า "หนังสือขอบอกเลิกสัญญาประกันภัย" (id="cancel") เล็กน้อย
   ไม่กระทบตัวอักษรเนื้อหา ลายเซ็น หรือเอกสารหน้าอื่น */
#cancel h1{
    font-size:15px !important;
}
 
/* หน้าวิริยะ (ใบคำขอฯ ต้นแบบ): แก้เฉพาะขนาดตัวอักษรให้ใหญ่ขึ้นและบรรทัดห่างขึ้น ไม่แตะโครงสร้าง */

    font-size:12.5px !important;
    line-height:1.7 !important;
}
.viriyah-only-form .form-top .small{ font-size:12px !important; }
 
/* หน้าใบคำขอเอาประกันภัยความรับผิดของผู้ขนส่ง */
.carrier-app-form,
.carrier-app-form *{
    font-size:10px !important;
    line-height:1.4 !important;
}
 
.carrier-app-form h1{
    font-size:18px !important;
    font-weight:bold;
}
 
.carrier-app-form.app-box{
    padding:26px 32px !important;
    display:flex;
    flex-direction:column;
    flex:1 1 auto;
    min-height:0;
}

.carrier-app-form .claim-box > .tt{
    font-size:18px !important;
}

.carrier-app-form .claim-box > .ph{
    font-size:16px !important;
}


.carrier-app-form .num-block{ margin-bottom:8px; }
.carrier-app-form .num-block .sub{ margin-top:3px; }
.carrier-app-form .qr-corner .cap{ font-size:9px !important; }
.carrier-app-form .qr-corner div[style*="color:red"]{ font-size:10px !important; }
.carrier-app-form .field-line{ min-width:0; }
.carrier-app-form .official-sign-space{ margin-top:36px !important; }
.carrier-app-form .premium-table{ margin:20px auto; }
.carrier-app-form .form-title-underline{ margin-bottom:14px; }
 
/* พื้นที่เว้นสำหรับลงลายมือชื่อในเอกสารราชการหน้าอื่นๆ */
.official-sign-space{ margin-top:110px !important; }
.qr-bottom{ text-align:center; margin-top:22px; }
.qr-bottom img{ height:85px; }
.qr-bottom .cap{ margin-top:4px; font-size:10px !important; }
 
@media print {
    @page{ size:A4; margin:0; }
    .btn-bar, .document-list{ display:none; }
    html, body{ background:#fff; padding:0; margin:0; min-width:0; width:auto; }
    .document-page{
        width:210mm; max-width:210mm; height:297mm; margin:0; padding:0mm 0mm 0mm 0mm;
        border:none; box-shadow:none; page-break-after:always; break-after:page;
        overflow:hidden;
    }
    .document-page:last-child{ page-break-after:auto; break-after:auto; }
    .document-page > .app-box{
        min-height:100%;
    }
}
 
</style>

   จำนวนงวด / ยอดต่องวด จากข้อมูลที่บันทึกจริง (เพิ่มใหม่)
========================================================== */
function getInstallmentPlan() {
    let count = parseInt(data.installmentCount, 10);
    if (!count || count < 1) count = 1;
    const totalAmount = Number(data.total) || 0;
    const perInstallment = count > 0 ? totalAmount / count : totalAmount;
    return { count, perInstallment };
}
 
/* ==========================================================
   ตัวเลขเป็นข้อความไทย
========================================================== */
function numberToThaiText(numStr) {
    const num = Number(numStr || 0);
    if (isNaN(num) || num === 0) return "-";
    const numText = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
    const digitText = ["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
    function convert(n) {
        n = String(n);
        let result = "";
        const len = n.length;
        for (let i = 0; i < len; i++) {
            const digit = parseInt(n[i]);
            const place = len - i - 1;
            if (digit === 0) continue;
            if (place === 0 && digit === 1 && len > 1) result += "เอ็ด";
            else if (place === 1 && digit === 1) result += "สิบ";
            else if (place === 1 && digit === 2) result += "ยี่สิบ";
            else {
                result += numText[digit] + digitText[place % 6 > 0 || place === 0 ? place % 6 : 0];
                if (place >= 6) result += "ล้าน";
            }
        }
        return result;
    }
    const parts = num.toFixed(2).split(".");
    let baht = convert(parseInt(parts[0]));
    const satang = parseInt(parts[1]);
    return baht + "บาท" + (satang === 0 ? "ถ้วน" : convert(satang) + "สตางค์");
}

function renderInvoice() {
    const meta = companyMeta();
    const agent = meta.agent;
    const installments = [1, 2, 3, 4].map(i => Number(data["installment" + i]) || 0).filter(v => v > 0);
    const baseDate = (function () {
        if (!data.start) return new Date();
        const parts = String(data.start).split("/");
        if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
        const d = new Date(data.start);
        return isNaN(d) ? new Date() : d;
    })();
 
    let instRows = "";
    installments.forEach((amt, i) => {
        const due = new Date(baseDate);
        due.setMonth(due.getMonth() + i);
        instRows += `
            <tr>
                <td>งวดที่ ${i + 1}</td>
                <td>${due.toLocaleDateString("th-TH")}</td>
                <td style="text-align:right;">${fmt(amt)}</td>
                <td></td>
            </tr>`;
    });

                <td>${safe(data.plate)}</td>

            <tr>
                <td colspan="6" style="text-align:right;font-weight:bold;">รวม</td>
                <td style="font-weight:bold;">${fmt(data.total)}</td>
            </tr>
        </table>

function getDocumentHTML(type){
 
    let company=data.company;
    const meta = COMPANY_META[company] || COMPANY_META["เมืองไทย"];
 
    if(type==="main"){
        if(company==="วิริยะ") return renderviriyahMain();
        if(company==="เมืองไทย") return renderMuangthaiMain();
        if(company==="AIG") return renderAigMain();
        if(company==="AXA" || company==="AXA") return renderAxaMain();
        if(company==="KWI") return renderKwiMain();
        if(company==="กรุงเทพ") return renderBangkokMain();
    }
 
    if(type==="contract"){
        if(company==="วิริยะ") return renderviriyahContract();
        return renderBrokerContract(meta.fullName);
    }
 
    if(type==="cancel"){
        return renderCancelLetter(meta.fullName);
    }
 
    if(type==="poa"){
        return renderPowerOfAttorney(meta.fullName);
    }
 
    if(type==="receipt"){
        if(company==="วิริยะ")
            return renderReceipt(AGENT_viriyah, "ประกันความรับผิดของผู้ขนส่งสินค้า");
        return renderReceipt(

        );
    }
 
    if(type==="invoice")
        return renderInvoice();
 
    return renderPending(type);
}

/* ==========================================================
   บังคับให้เนื้อหาแต่ละเอกสารพอดี 1 หน้า A4 เป๊ะ
   โดยย่อขนาด (scale) ทั้งกล่องลงอัตโนมัติถ้าเนื้อหายาวเกินหน้า
========================================================== */
function fitPagesToA4(){
    document.querySelectorAll(".document-page").forEach(page=>{
        const inner = page.querySelector(".page-scale");
        if(!inner) return;
 
        // รีเซ็ตก่อนวัดขนาดจริงทุกครั้ง
        inner.style.transform="none";
        inner.style.width="100%";
 
        const pageHeight = page.clientHeight;
        const contentHeight = inner.scrollHeight;
 
        if(contentHeight > pageHeight){
            const scale = pageHeight / contentHeight;
            inner.style.transform=`scale(${scale})`;
            inner.style.width=(100/scale)+"%";
        }
    });
}

    await document.fonts.ready; // รอฟอนต์โหลดเสร็จจริงก่อน (เพิ่มใหม่ ป้องกันฟอนต์ยังไม่พร้อมตอน capture)
    fitPagesToA4();
    await new Promise(r => setTimeout(r, 100)); // รอ layout นิ่งก่อน capture
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); // เพิ่มใหม่ รอ repaint นิ่งอีกชั้น
 
    const pageLabels = {
        main: "ใบคำขอ",
        contract: "สัญญา",
        cancel: "ใบยกเลิก",
        poa: "หนังสือมอบอำนาจ",
        receipt: "ใบรับเงิน",
        invoice: "ใบแจ้งหนี้"
    };
 
    const pages = document.querySelectorAll(".document-page");
    const files = [];
 
    // capture ทีละหน้าแยกกัน เพื่อให้ได้ไฟล์ JPG ขนาด A4 คนละไฟล์ ไม่ติดกัน
    for (let i = 0; i < pages.length; i++) {
        const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#ffffff", useCORS: true, letterRendering: true });
        const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.95));
        const label = pageLabels[pages[i].id] || pages[i].id || (i + 1);
        const fileName = `${fileBase}_${i + 1}_${label}.jpg`;
        files.push(new File([blob], fileName, { type: "image/jpeg" }));
    }
 
    // มือถือที่รองรับ: เปิดเมนูแชร์ของเครื่อง ส่งทุกภาพไปพร้อมกัน ผู้ใช้เลือกบันทึกแต่ละภาพเข้าแกลลอรี่ได้
    if (navigator.canShare && navigator.canShare({ files })) {
        try {
            await navigator.share({ files, title: fileBase });
            return;
        } catch (err) {
            // ผู้ใช้กดยกเลิก หรืออุปกรณ์แชร์ไม่สำเร็จ -> ดาวน์โหลดทีละไฟล์แทน
        }
    }
 
    // เบราว์เซอร์ที่ไม่รองรับการแชร์ไฟล์: ดาวน์โหลดทีละไฟล์แยกกัน (เว้นจังหวะกันเบราว์เซอร์บล็อก)
    for (const file of files) {
        const link = document.createElement("a");
        link.download = file.name;
        link.href = URL.createObjectURL(file);
        link.click();
        await new Promise(r => setTimeout(r, 300));
    }
}
 
async function downloadPDF() {
    const btn = document.querySelector(".btn-pdf");
    const originalText = btn.innerText;
    btn.innerText = "⏳ กำลังสร้าง PDF...";
    btn.disabled = true;
 
    try {
        await document.fonts.ready; // รอฟอนต์โหลดเสร็จจริงก่อน (เพิ่มใหม่ ป้องกันฟอนต์ยังไม่พร้อมตอน capture)
        fitPagesToA4();
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); // เพิ่มใหม่ รอ repaint นิ่งก่อน capture
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: "mm", format: "a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
 
        const pages = document.querySelectorAll(".document-page");
        for (let i = 0; i < pages.length; i++) {
            const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#ffffff", useCORS: true, letterRendering: true });
            const imgData = canvas.toDataURL("image/jpeg", 0.95);
            const ratio = Math.min(pageW / canvas.width, pageH / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;
            const x = (pageW - imgW) / 2;
            const y = 0;
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, "JPEG", x, y, imgW, imgH);
        }
        pdf.save(fileBase + ".pdf");
    } catch (err) {
        alert("สร้าง PDF ไม่สำเร็จ: " + err.message);
        console.error(err);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
 
document.title = fileBase;
 
 
</script>
