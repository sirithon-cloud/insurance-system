<style>

<script>
/* ==========================================================
   ข้อมูลสำนักงาน/ตัวแทน-นายหน้า ต่อบริษัท
   (วิริยะ = ตัวแทน, บริษัทอื่น = นายหน้าประกันวินาศภัยกลาง)
========================================================== */
const AGENT_viriyah = {
    officeTitle: "สำนักงานตัวแทนประกันวินาศภัย",
    agentLine: "โดยนายณุพล วิทยาขาว",
    address: "168 หมู่ที่ 1 ตำบลหนองไผ่ อำเภอชุมแพ",
    province: "จังหวัดขอนแก่น โทรศัพท์ 094-284-1557",
    licenseNo: "5802002651",
    signerName: "นายณุพล วิทยาขาว",
    companyFullName: "บริษัท วิริยะประกันภัย จำกัด (มหาชน)"

const BROKER_GENERAL = {
    officeTitle: "สำนักงานนายหน้าประกันวินาศภัย",
    agentLine: "โดยคุณอรุณลักษณ์ มหาจตุพัฒน์",
    address: "166 หมู่ที่ 5 ตำบลโนนสะอาด อำเภอชุมแพ",
    province: "จังหวัดขอนแก่น โทรศัพท์ 094-284-1557",
    licenseNo: "6204051609",
    signerName: "นางสาวอรุณลักษณ์ มหาจตุพัฒน์"
};

/* ==========================================================
   ตัวเลขเป็นข้อความไทย
========================================================== */
function numberToThaiText(numStr) {
    const num = Number(numStr || 0);
    if (isNaN(num) || num === 0) return "-";
    const numText = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
    const digitText = ["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
    function convert(n) {
        n = String(n);
        let result = "";
        const len = n.length;
        for (let i = 0; i < len; i++) {
            const digit = parseInt(n[i]);
            const place = len - i - 1;
            if (digit === 0) continue;
            if (place === 0 && digit === 1 && len > 1) result += "เอ็ด";
            else if (place === 1 && digit === 1) result += "สิบ";
            else if (place === 1 && digit === 2) result += "ยี่สิบ";
            else {
                result += numText[digit] + digitText[place % 6 > 0 || place === 0 ? place % 6 : 0];
                if (place >= 6) result += "ล้าน";
            }
        }
        return result;
    }
    const parts = num.toFixed(2).split(".");
    let baht = convert(parseInt(parts[0]));
    const satang = parseInt(parts[1]);
    return baht + "บาท" + (satang === 0 ? "ถ้วน" : convert(satang) + "สตางค์");
}

function fmt(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2 }); }
function safe(v) { return (v === undefined || v === null || v === "") ? "-" : v; }

const today = new Date();
const todayThai = today.toLocaleDateString("th-TH", { year:"numeric", month:"2-digit", day:"2-digit" });
const nowThai = today.toLocaleTimeString("th-TH", { hour:"2-digit", minute:"2-digit" });


/* ==========================================================
   โหลดข้อมูลฟอร์มล่าสุด
   (แก้ไข: เดิมมีการอ้างถึง localStorage key "documentData" ซ้ำอีกจุด
   ท้ายไฟล์ ทั้งที่ไม่มีหน้าไหนเซ็ตค่านี้ไว้เลย ทำให้ customerName ไม่เคย
   ถูกเติมค่าจริง — ตัดออก แล้วใช้ตัวแปร data (จาก pdfData) แหล่งเดียวแทน)
========================================================== */
const data = JSON.parse(localStorage.getItem("pdfData"));
if (!data) {
    alert("กรุณากด 'ดู PDF' จากหน้าฟอร์มก่อน");
    window.location.href = "index.html";
}

/* แสดงชื่อลูกค้าที่หัวรายการเอกสาร */
if (data) {
    document.getElementById("customerName").innerText = data.customer || "-";
}

/* ==========================================================
   RENDER: ใบรับเงิน (ใช้ได้ทั้งวิริยะ และบริษัทอื่นๆ)
========================================================== */
function renderReceipt(info, typeLabel) {

            <div>

                <div class="small">${info.agentLine}</div>
                <div class="small">${info.address}</div>
                <div class="small">${info.province}</div>
            </div>
            <div style="text-align:right;">
                <h1 style="margin:0;">ใบรับเงิน</h1>
                <div class="small">วันที่ ${todayThai} ${nowThai} น.</div>
            </div>
        </div>

        <div class="small" style="border-bottom:1px solid #999;padding-bottom:10px;margin-bottom:15px;">
            ทะเบียนเลขที่ /เลขประจำตัวผู้เสียอากร<br>
            ใบอนุญาตเป็นนายหน้าประกันวินาศภัยที่ ${info.licenseNo}
        </div>

        <div class="doc-row"><div class="l" style="width:150px;">ได้รับเงินจาก</div><div class="v">${safe(data.customer)}</div></div>
        <div class="doc-row"><div class="l" style="width:150px;">ที่อยู่</div><div class="v">${safe(data.address)}</div></div>
        <div class="doc-row"><div class="l" style="width:150px;">รับเงินสำหรับ</div><div class="v">ค่างวดแบ่งชำระค่าเบี้ยประกันภัย</div></div>
        <div class="doc-row"><div class="l" style="width:150px;">ประเภท</div><div class="v">${typeLabel}</div></div>
        <div class="doc-row">
            <div style="flex:1;"><span class="l">เลขทะเบียน</span> <span class="v">${safe(data.plate)}</span></div>
            <div style="flex:1;"><span class="l">เลขตัวถัง</span> <span class="v">${safe(data.chassis)}</span></div>
        </div>

        <div class="amount-box">
            <div class="small">จำนวนเงิน</div>
            <div class="num">${fmt(data.total)}</div>
            <div class="small">${numberToThaiText(data.total)}</div>
        </div>

            - การทำรายการจะสมบูรณ์ เมื่อท่านได้รับเอกสารยืนยันความคุ้มครองหรือเอกสารเงื่อนไขความคุ้มครองพร้อมใบรับเงินฉบับนี้<br>
            - หากมีข้อสงสัยเพิ่มเติมเกี่ยวกับใบรับเงินฉบับนี้ สามารถติดต่อได้ที่โทรศัพท์ ${info.province.split("โทรศัพท์ ")[1] || ""}
        </div>
    `;
}

/* ==========================================================
   RENDER: ยกเลิก (หนังสือขอบอกเลิกสัญญาประกันภัย) — ใช้ร่วมกันได้ทุกบริษัท
========================================================== */
function renderCancelLetter(companyFullName) {
    return `

   RENDER: สัญญาวิริยะ - สัญญาคำขอแบ่งชำระค่าเบี้ยประกันภัย
========================================================== */
function toBuddhistDate(d) {
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy = d.getFullYear() + 543;
    return `${dd}/${mm}/${yyyy}`;
}

function renderviriyahContract() {
    const installments = [
        Number(data.installment1) || 0,
        Number(data.installment2) || 0,
        Number(data.installment3) || 0,
        Number(data.installment4) || 0
    ].filter(v => v > 0);

    const contractDate = new Date();
    let installmentRows = "";
    installments.forEach((amt, i) => {
        const due = new Date(contractDate);
        due.setDate(due.getDate() + 30 * (i + 1));
        installmentRows += `
            <div class="doc-row">
                <div style="flex:1;"><span class="l">งวดที่ ${i + 1} ยอดที่ต้องชำระ</span> <span class="v">${fmt(amt)} บาท</span></div>
                <div style="flex:1;"><span class="l">วันที่ครบกำหนด</span> <span class="v">${toBuddhistDate(due)}</span></div>
            </div>`;
    });

    return `
        <div class="small">168/1 หมู่ที่ 1 ตำบลหนองไผ่ อำเภอชุมแพ จังหวัดขอนแก่น 40130</div>
        <h1>สัญญาคำขอแบ่งชำระค่าเบี้ยประกันภัย</h1>
        <div style="text-align:right;" class="small">วันที่ ${toBuddhistDate(contractDate)}</div>

        <p style="margin-top:15px;line-height:1.9;">
            ข้าพเจ้า <b>${safe(data.customer)}</b> ที่อยู่ปัจจุบัน <b>${safe(data.address)}</b>
        </p>

        <p style="line-height:1.9;">
            สัญญาคำขอฉบับนี้ ทำไว้กับนายณุพล วิทยาขาว ("ตัวแทนประกัน") เพื่อเป็นหลักฐานแสดงว่า ข้าพเจ้าตกลงให้ตัวแทนประกันออก
            เงินชำระค่าเบี้ยประกันภัย จำนวน <b>${fmt(data.total)}</b> บาท ให้แก่บริษัทผู้รับประกันภัยแทนข้าพเจ้า รายละเอียดดังนี้
        </p>

        <div class="doc-row">
            <div style="flex:1;"><span class="l">กรมธรรม์ประกันภัยของรถยนต์คันหมายเลขทะเบียน</span> <span class="v">${safe(data.plate)}</span></div>
            <div style="flex:1;">ชำระให้แก่บริษัท วิริยะประกันภัย จำกัด (มหาชน)</div>
        </div>

        <p style="line-height:1.9;">
            โดยข้าพเจ้าตกลงแบ่งชำระเงินจำนวนดังกล่าวคืนให้แก่ตัวแทนประกัน เป็นจำนวน <b>${installments.length}</b> งวด
            จนครบเต็มจำนวนค่าเบี้ยประกันภัย กำหนดชำระทุกๆ 30 วัน นับจากวันที่ทำสัญญาคำขอฉบับนี้ จนครบเต็มจำนวน ตามรายละเอียดนี้
        </p>

        ${installmentRows}

        <p style="margin-top:20px;font-weight:bold;">ข้าพเจ้าขอตกลงผูกพันตามสัญญา เงื่อนไขและข้อตกลงดังต่อไปนี้</p>

        <ol class="small" style="line-height:1.9;padding-left:20px;">
            <li>ข้าพเจ้าตกลงส่งมอบและตกลงให้ตัวแทนประกันเป็นผู้ยึดถือ/เก็บรักษาต้นฉบับกรมธรรม์ประกันภัย (ซึ่งต่อไปในสัญญานี้เรียกว่า "กรมธรรม์ประกันภัย") และต้นฉบับใบเสร็จรับเงินค่าเบี้ยประกันภัยเพื่อเป็นประกันจนกว่าจะมีการชำระหนี้ครบถ้วนตามสัญญา</li>
            <li>ข้าพเจ้าตกลงแบ่งชำระค่าเบี้ยประกันภัยที่ตัวแทนประกันออกให้ จนครบเต็มจำนวนตามรายการดังกล่าวข้างต้น</li>
            <li>หากข้าพเจ้าผิดนัดชำระ ไม่ได้ชำระเงินค่างวดหนึ่งงวดใด ตามระยะเวลาที่กำหนดตามสัญญาคำขอฉบับนี้ ถือว่าข้าพเจ้าไม่ประสงค์ทำประกันอีกต่อไป ข้าพเจ้ายินยอมให้ยกเลิกกรมธรรม์ประกันภัยหรือบอกล้างสัญญาประกันภัยรถคันดังกล่าวในสัญญาคำขอฉบับนี้ได้ทันที โดยไม่จำเป็นต้องแจ้งให้ข้าพเจ้าทราบล่วงหน้าได้</li>
            <li>ข้าพเจ้าตกลงโอนสิทธิค่าเวนคืนกรมธรรม์ประกันภัย ค่าเบี้ยประกันภัยที่จ่ายคืนกรณีมีการยกเลิกกรมธรรม์ประกันภัย ให้แก่ตัวแทนประกัน โดยตัวแทนประกันสามารถนำเงินที่ได้รับตามสิทธิข้างต้นหักชำระหนี้ของข้าพเจ้าตามคำขอนี้ได้ และหากกรณีมีเงินหักชำระหนี้แล้วมีเงินคงเหลือ ข้าพเจ้าจะไม่ขอรับเงินคืน หรือหากกรณีหักชำระหนี้แล้วมียอดหนี้คงค้างอยู่เท่าใด ตัวแทนประกันก็จะไม่เรียกร้องเงินส่วนที่คงค้างคืนจากข้าพเจ้าด้วยเช่นกัน</li>
            <li>ข้าพเจ้าตกลงยินยอมให้ตัวแทนประกันมีอำนาจลงนามในเอกสารหรือกระทำการใดๆ อันจำเป็นเพื่อความสะดวกในการที่จะทำขึ้นใหม่ทดแทนซึ่งกรมธรรม์ประกันภัย หรือยกเลิกกรมธรรม์ประกันภัย หรือทำให้สิ้นผลผูกพันซึ่งกรมธรรม์ประกันภัย ทั้งนี้การยกเลิกกรมธรรม์ประกันภัยหรือทำให้สิ้นผลผูกพันของกรมธรรม์ประกันภัย ตัวแทนประกันไม่ต้องรับผิดชอบความเสียหายที่เกิดขึ้นภายหลังการยกเลิกหรือสิ้นผลผูกพันซึ่งกรมธรรม์ประกันภัยดังกล่าว</li>
            <li>
                กรณีมีเหตุการณ์อย่างหนึ่งอย่างใดดังต่อไปนี้ ให้ถือว่าข้าพเจ้ากระทำผิดเงื่อนไขข้อตกลงตามคำขอนี้ และให้ตัวแทนประกันมีสิทธิเรียกให้ข้าพเจ้าชำระเงินที่ค้างชำระทั้งสิ้นตามคำขอนี้ได้ทันที
                <ul style="margin-top:6px;">
                    <li>6.1 ข้าพเจ้าผิดนัด ไม่ชำระเงินจำนวนใดๆ ที่ถึงกำหนดชำระตามสัญญาคำขอนี้ หรือไม่ปฏิบัติตามเงื่อนไขข้อหนึ่งข้อใดในคำขอนี้</li>
                    <li>6.2 ข้าพเจ้าโอนกรรมสิทธิ์รถยนต์ที่เอาประกันให้แก่บุคคลภายนอก หรือเมื่อสิทธิตามกรมธรรม์ประกันภัยถูกโอน หรือตกแก่บุคคลภายนอก</li>
                    <li>6.3 ข้าพเจ้ากระทำการขอออกกรมธรรม์ประกันภัยฉบับใหม่ โดยไม่ส่งมอบกรมธรรม์ประกันภัยฉบับที่ออกใหม่นั้นให้แก่ตัวแทนประกันยึดถือไว้เพื่อเป็นหลักประกัน</li>
                </ul>
            </li>
        </ol>

        <p class="small" style="line-height:1.9;margin-top:10px;">
            หากข้าพเจ้าผิดนัดไม่ชำระเงินงวดหนึ่งงวดใดให้แก่ตัวแทนประกัน ข้าพเจ้าตกลงให้ตัวแทนประกันมีสิทธินำกรมธรรม์ประกันภัยไปยกเลิกต่อบริษัทผู้รับประกันภัยได้ทุกเมื่อ
            และให้ตัวแทนประกันมีสิทธิ์ได้รับเงินคืนค่าเบี้ยประกันภัย หรือเงินใดๆ จากผู้รับประกันภัยเพื่อนำมาหักชำระเงินที่คงค้างตามคำขอนี้ได้
        </p>

        <p class="small" style="line-height:1.9;">
            เมื่อตัวแทนประกันส่งคำบอกกล่าวหรือหนังสือติดต่อใดๆ ไปยังที่อยู่ของข้าพเจ้าตามที่ระบุไว้ในคำขอนี้ หรือที่อยู่ตามที่ข้าพเจ้าได้แจ้งเปลี่ยนแปลงครั้งหลังสุด
            ให้ถือว่าได้มีการส่งให้และข้าพเจ้าได้รับโดยชอบแล้ว หากกรณีมีข้อความใดในสัญญาฉบับนี้ขัดแย้ง และหรือไม่ตรงตามกับข้อความในสัญญาฉบับอื่น
            ข้าพเจ้าจะถือข้อความในสัญญานี้ใช้บังคับยึดเป็นสำคัญ และจะไม่นำข้อความในสัญญาอื่นขึ้นมาต่อสู้หรือหักล้างกับข้อความในสัญญาฉบับนี้
            ข้าพเจ้าได้อ่านและเข้าใจข้อความตามสัญญาคำขอฉบับนี้โดยตลอดแล้ว จึงได้ลงลายมือชื่อไว้เป็นสำคัญ
        </p>

        <div style="text-align:center;margin-top:60px;">
            <div class="sign-line" style="display:inline-block;width:250px;">ลงชื่อ ${safe(data.customer)} ผู้ขอ</div><br>
            <span class="small">${toBuddhistDate(contractDate)}</span>
        </div>
    `;
}

/* ==========================================================
   PENDING (แบบฟอร์มที่ยังไม่ได้ใส่เนื้อหา)
========================================================== */
function renderPending(label) {
    return `<div class="pending-box"><h2>🕒 ${label}</h2><p>แบบฟอร์มนี้ยังไม่ได้ใส่เนื้อหา — กำลังทยอยทำตามลำดับที่แจ้งไว้</p></div>`;
}

/* ==========================================================
   MAP: docKey -> renderer
========================================================== */
const DOCS_TO_SHOW = [
    {
        id:"main",
        title:"ใบคำขอ"
    },
    {
        id:"contract",
        title:"สัญญา"
    },
    {
        id:"receipt",
        title:"ใบรับเงิน"
    },
    {
        id:"cancel",
        title:"เลิกสัญญา"
    },
    {
        id:"invoice",
        title:"ใบเสร็จ"
    }
];

/* ==========================================================
   เลือกเอกสารจาก docKey
   (แก้ไข: เดิมมีการเช็ค localStorage.getItem("selectDocument") ก่อนแสดงผล
   แต่ไม่มีหน้าไหนในระบบเซ็ตค่านี้ไว้เลย เป็นโค้ดที่ไม่มีวันทำงาน — ตัดออก
   ให้เลือกเอกสารจาก data.docKey ตรงๆ เพียงทางเดียว)
========================================================== */
const docArea=document.getElementById("docArea");

function getDocumentHTML(type){

    let company=data.company;
    // วิริยะ
    if(company==="วิริยะ"){

        if(type==="main")
            return renderviriyahMain();

        if(type==="contract")
            return renderviriyahContract();

        if(type==="receipt")
            return renderReceipt(
                AGENT_viriyah,
                "ประกันความรับผิดของผู้ขนส่งสินค้า"
            );

        if(type==="cancel")
            return renderCancelLetter(
                AGENT_viriyah.companyFullName
            );

        return renderPending("ใบเสร็จ");

    }
    // บริษัทอื่น

    else{

        if(type==="receipt"){

            return renderReceipt(
                BROKER_GENERAL,
                data.type==="car"
                ?"ประกันรถยนต์"
                :"กรมธรรม์ประกันความรับผิดของผู้ขนส่ง"
            );

        }

        return renderPending(
            DOCS_TO_SHOW.find(x=>x.id===type).title
        );

    }

}

DOCS_TO_SHOW.forEach(doc=>{
    let div=document.createElement("div");
    div.className="document-page";
    div.id=doc.id;
    div.innerHTML=
    getDocumentHTML(doc.id);
    docArea.appendChild(div);

});


/* ==========================================================
   บันทึกเป็น JPG / ตั้งชื่อไฟล์ = ชื่อลูกค้า_ทะเบียน
========================================================== */
function safeFileName(s) {
    return (s || "ไฟล์").toString().trim().replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");
}
const fileBase = safeFileName(data.customer) + "_" + safeFileName(data.plate);

    function scrollToDoc(id){

    document.getElementById(id)
    ?.scrollIntoView({
        behavior:"smooth"
    });

}

function saveJPG() {
    html2canvas(docArea, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
        const link = document.createElement("a");
        link.download = fileBase + ".jpg";
        link.href = canvas.toDataURL("image/jpeg", 0.95);
        link.click();
    });
}

// ตั้งชื่อไฟล์ตอนพิมพ์เป็น PDF ด้วย (เบราว์เซอร์ที่รองรับ)
document.title = fileBase;

</script>
