/* ==========================================================

function numberToThaiText(numStr) {
    const num = Number(numStr || 0);
    if (isNaN(num) || num === 0) return "-";
    const numText = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
    const digitText = ["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
    function convert(n) {
        n = String(n);
        let result = "";
        const len = n.length;
        for (let i = 0; i < len; i++) {
            const digit = parseInt(n[i]);
            const place = len - i - 1;
            if (digit === 0) continue;
            if (place === 0 && digit === 1 && len > 1) result += "เอ็ด";
            else if (place === 1 && digit === 1) result += "สิบ";
            else if (place === 1 && digit === 2) result += "ยี่สิบ";
            else {
                result += numText[digit] + digitText[place % 6 > 0 || place === 0 ? place % 6 : 0];
                if (place >= 6) result += "ล้าน";
            }
        }
        return result;
    }
    const parts = num.toFixed(2).split(".");
    let baht = convert(parseInt(parts[0]));
    const satang = parseInt(parts[1]);
    return baht + "บาท" + (satang === 0 ? "ถ้วน" : convert(satang) + "สตางค์");
}

function fmt(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2 }); }

function toBuddhistDate(d) {
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy = d.getFullYear() + 543;
    return `${dd}/${mm}/${yyyy}`;
}

    let installmentRows = "";

            <div style="flex:1;">ชำระให้แก่บริษัท วิริยะประกันภัย จำกัด (มหาชน)</div>
        </div>

        <p style="line-height:1.9;">
            โดยข้าพเจ้าตกลงแบ่งชำระเงินจำนวนดังกล่าวคืนให้แก่ตัวแทนประกัน เป็นจำนวน <b>${installments.length}</b> งวด
            จนครบเต็มจำนวนค่าเบี้ยประกันภัย กำหนดชำระทุกๆ 30 วัน นับจากวันที่ทำสัญญาคำขอฉบับนี้ จนครบเต็มจำนวน ตามรายละเอียดนี้
        </p>

        ${installmentRows}

        <p style="margin-top:20px;font-weight:bold;">ข้าพเจ้าขอตกลงผูกพันตามสัญญา เงื่อนไขและข้อตกลงดังต่อไปนี้</p>

        <ol class="small" style="line-height:1.9;padding-left:20px;">

            <li>ข้าพเจ้าตกลงโอนสิทธิค่าเวนคืนกรมธรรม์ประกันภัย ค่าเบี้ยประกันภัยที่จ่ายคืนกรณีมีการยกเลิกกรมธรรม์ประกันภัย ให้แก่ตัวแทนประกัน โดยตัวแทนประกันสามารถนำเงินที่ได้รับตามสิทธิข้างต้นหักชำระหนี้ของข้าพเจ้าตามคำขอนี้ได้ และหากกรณีมีเงินหักชำระหนี้แล้วมีเงินคงเหลือ ข้าพเจ้าจะไม่ขอรับเงินคืน หรือหากกรณีหักชำระหนี้แล้วมียอดหนี้คงค้างอยู่เท่าใด ตัวแทนประกันก็จะไม่เรียกร้องเงินส่วนที่คงค้างคืนจากข้าพเจ้าด้วยเช่นกัน</li>
            <li>ข้าพเจ้าตกลงยินยอมให้ตัวแทนประกันมีอำนาจลงนามในเอกสารหรือกระทำการใดๆ อันจำเป็นเพื่อความสะดวกในการที่จะทำขึ้นใหม่ทดแทนซึ่งกรมธรรม์ประกันภัย หรือยกเลิกกรมธรรม์ประกันภัย หรือทำให้สิ้นผลผูกพันซึ่งกรมธรรม์ประกันภัย ทั้งนี้การยกเลิกกรมธรรม์ประกันภัยหรือทำให้สิ้นผลผูกพันของกรมธรรม์ประกันภัย ตัวแทนประกันไม่ต้องรับผิดชอบความเสียหายที่เกิดขึ้นภายหลังการยกเลิกหรือสิ้นผลผูกพันซึ่งกรมธรรม์ประกันภัยดังกล่าว</li>

                <ul style="margin-top:6px;">

                </ul>

            และให้ตัวแทนประกันมีสิทธิ์ได้รับเงินคืนค่าเบี้ยประกันภัย หรือเงินใดๆ จากผู้รับประกันภัยเพื่อนำมาหักชำระเงินที่คงค้างตามคำขอนี้ได้
        </p>

        <p class="small" style="line-height:1.9;">
            เมื่อตัวแทนประกันส่งคำบอกกล่าวหรือหนังสือติดต่อใดๆ ไปยังที่อยู่ของข้าพเจ้าตามที่ระบุไว้ในคำขอนี้ หรือที่อยู่ตามที่ข้าพเจ้าได้แจ้งเปลี่ยนแปลงครั้งหลังสุด
            ให้ถือว่าได้มีการส่งให้และข้าพเจ้าได้รับโดยชอบแล้ว หากกรณีมีข้อความใดในสัญญาฉบับนี้ขัดแย้ง และหรือไม่ตรงตามกับข้อความในสัญญาฉบับอื่น
            ข้าพเจ้าจะถือข้อความในสัญญานี้ใช้บังคับยึดเป็นสำคัญ และจะไม่นำข้อความในสัญญาอื่นขึ้นมาต่อสู้หรือหักล้างกับข้อความในสัญญาฉบับนี้
            ข้าพเจ้าได้อ่านและเข้าใจข้อความตามสัญญาคำขอฉบับนี้โดยตลอดแล้ว จึงได้ลงลายมือชื่อไว้เป็นสำคัญ

        <div style="text-align:center;margin-top:60px;">

                    <li>6.3 ข้าพเจ้ากระทำการขอออกกรมธรรม์ประกันภัยฉบับใหม่ โดยไม่ส่งมอบกรมธรรม์ประกันภัยฉบับที่ออกใหม่นั้นให้แก่นายหน้าประกันยึดถือไว้เพื่อเป็นหลักประกัน</li>

        <p class="small" style="line-height:1.9;margin-top:10px;">

            และให้นายหน้าประกันมีสิทธิ์ได้รับเงินคืนค่าเบี้ยประกันภัย หรือเงินใดๆ จากผู้รับประกันภัยเพื่อนำมาหักชำระเงินที่คงค้างตามคำขอนี้ได้

/* ==========================================================
   PENDING (แบบฟอร์มที่ยังไม่ได้ใส่เนื้อหา)
========================================================== */
function renderPending(label) {
    return `<div class="pending-box"><h2>🕒 ${label}</h2><p>แบบฟอร์มนี้ยังไม่ได้ใส่เนื้อหา — กำลังทยอยทำตามลำดับที่แจ้งไว้</p></div>`;
}

/* ==========================================================
   เอกสารที่ต้องแสดงของแต่ละบริษัท (ตรงตามชีตใน Excel)
   — แสดงอัตโนมัติทั้งหมดตามบริษัทที่เลือกไว้ในฟอร์ม ไม่มีปุ่มให้เลือกซ้ำ
========================================================== */
const COMPANY_DOCS = {
    "วิริยะ":   ["main", "contract", "cancel", "receipt"],
    "เมืองไทย": ["main", "contract", "cancel", "poa"],
    "AIG":      ["main", "poa", "cancel", "contract"],
    "แอกซ่า":   ["main", "contract", "poa"],
    "AXA":      ["main", "contract", "poa"],
    "KWI":      ["main", "contract", "cancel", "poa"],
    "กรุงเทพ":  ["main"]
};

const docArea=document.getElementById("docArea");

function getDocumentHTML(type){

    let company=data.company;
    const meta = COMPANY_META[company] || COMPANY_META["เมืองไทย"];

    if(type==="main"){
        if(company==="วิริยะ") return renderviriyahMain();
        if(company==="เมืองไทย") return renderMuangthaiMain();
        if(company==="AIG") return renderAigMain();
        if(company==="แอกซ่า" || company==="AXA") return renderAxaMain();
        if(company==="KWI") return renderKwiMain();
        if(company==="กรุงเทพ") return renderBangkokMain();
    }

    if(type==="contract"){
        if(company==="วิริยะ") return renderviriyahContract();
        return renderBrokerContract(meta.fullName);
    }

    if(type==="cancel"){
        return renderCancelLetter(meta.fullName);
    }

    if(type==="poa"){
        return renderPowerOfAttorney(meta.fullName);
    }

    if(type==="receipt"){
        if(company==="วิริยะ")
            return renderReceipt(AGENT_viriyah, "ประกันความรับผิดของผู้ขนส่งสินค้า");
        return renderReceipt(
            BROKER_GENERAL,
            data.type==="car" ? "ประกันรถยนต์" : "กรมธรรม์ประกันความรับผิดของผู้ขนส่ง"
        );
    }

    if(type==="invoice")
        return renderInvoice();

    return renderPending(type);
}

const docsForThisCompany = COMPANY_DOCS[data.company] || COMPANY_DOCS["เมืองไทย"];

docsForThisCompany.forEach(type=>{
    let div=document.createElement("div");
    div.className="document-page";
    div.id=type;
    div.innerHTML=getDocumentHTML(type);
    docArea.appendChild(div);
});


/* ==========================================================
   บันทึกเป็น JPG / ตั้งชื่อไฟล์ = ชื่อลูกค้า_ทะเบียน
========================================================== */
function safeFileName(s) {
    return (s || "ไฟล์").toString().trim().replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");
}
const fileBase = safeFileName(data.customer) + "_" + safeFileName(data.plate);

function saveJPG() {
    html2canvas(docArea, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
        const link = document.createElement("a");
        link.download = fileBase + ".jpg";
        link.href = canvas.toDataURL("image/jpeg", 0.95);
        link.click();
    });
}

/* ==========================================================
   ดาวน์โหลด PDF จริง (ไฟล์เดียว หลายหน้า) — ไม่ใช้หน้าต่างพิมพ์ของเบราว์เซอร์
   ใช้ html2canvas แปลงแต่ละ .document-page เป็นรูป แล้วต่อเป็น PDF ด้วย jsPDF
========================================================== */
async function downloadPDF() {
    const btn = document.querySelector(".btn-pdf");
    const originalText = btn.innerText;
    btn.innerText = "⏳ กำลังสร้าง PDF...";
    btn.disabled = true;

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: "mm", format: "a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();

        const pages = document.querySelectorAll(".document-page");
        for (let i = 0; i < pages.length; i++) {
            const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#ffffff" });
            const imgData = canvas.toDataURL("image/jpeg", 0.95);

            // คำนวณอัตราส่วนให้พอดีหน้ากระดาษ A4 (เผื่อขอบไว้เล็กน้อย)
            const ratio = Math.min(pageW / canvas.width, pageH / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;
            const x = (pageW - imgW) / 2;
            const y = 0;

            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, "JPEG", x, y, imgW, imgH);
        }

        pdf.save(fileBase + ".pdf");
    } catch (err) {
        alert("สร้าง PDF ไม่สำเร็จ: " + err.message);
        console.error(err);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

// ตั้งชื่อไฟล์ตอนพิมพ์เป็น PDF ด้วย (เบราว์เซอร์ที่รองรับ)
document.title = fileBase;

</script>
